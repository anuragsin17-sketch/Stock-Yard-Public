name: Past Performance Backtest

on:
  workflow_dispatch:
    inputs:
      years:
        description: 'Lookback years (1, 3, 5, 10)'
        required: false
        default: '10'
  schedule:
    # Every Sunday at 1:00 AM IST (19:30 UTC Saturday)
    - cron: '30 19 * * 6'

permissions:
  contents: write

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance numpy scipy

    - name: Run backtest
      run: |
        YEARS="${{ github.event.inputs.years }}"
        YEARS="${YEARS:-10}"
        echo "🔄 Running backtest for last ${YEARS} year(s)..."
        echo "Start time: $(date -u)"
        python backtest_performance.py --years "$YEARS" --stocks 752 --capital 50000
        echo "End time: $(date -u)"

    - name: Verify output
      run: |
        if [ -f "backtest_performance.json" ]; then
          echo "✅ backtest_performance.json created"
          echo "📊 File size: $(wc -c < backtest_performance.json) bytes"
          python -c "
        import json
        with open('backtest_performance.json') as f:
            d = json.load(f)
        s = d.get('summary', {})
        print(f\"Trades: {s.get('total_trades', 0)}\")
        print(f\"Win Rate: {s.get('win_rate', 0)}%\")
        print(f\"Total P&L: {s.get('total_pnl', 0):,.0f}\")
        print(f\"Stocks: {len(d.get('stocks', []))}\")
          "
        else
          echo "❌ backtest_performance.json not found"
          exit 1
        fi

    - name: Commit results
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add backtest_performance.json
        git commit -m "📊 Backtest update: $(date '+%Y-%m-%d %H:%M UTC') - Run #${{ github.run_number }}" || echo "ℹ️ No changes"
        for i in {1..3}; do
          git push origin main 2>/dev/null || git push origin master 2>/dev/null && break
          sleep 5
        done
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Deploy to public repo
      if: success()
      run: |
        git clone https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/anuragsin17-sketch/Stock-Yard-Public.git public-repo 2>&1 || exit 0
        cp backtest_performance.json public-repo/
        cd public-repo
        git config user.name "GitHub Action"
        git config user.email "action@github.com"
        git add backtest_performance.json
        git commit -m "📊 Backtest update: $(date '+%Y-%m-%d %H:%M UTC')" || true
        git push origin HEAD 2>&1 && echo "✅ Deployed" || echo "⚠️ Deploy failed"
        cd ..
        rm -rf public-repo
      env:
        DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
