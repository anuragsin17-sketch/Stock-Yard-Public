name: Stock Yard Screener

on:
  workflow_dispatch:
  schedule:
    # Market hours: 9:15 AM - 3:30 PM IST = 3:45 UTC - 10:00 UTC
    # Run every 30 minutes during market hours (Monday-Friday)
    - cron: '0,30 4-9 * * 1-5'  # 9:15 AM - 2:30 PM IST (every 30 min)
    - cron: '0 10 * * 1-5'      # 3:30 PM IST exact (catch market close)
    
    # Pre-market scan (before 9:15 AM)
    - cron: '15 4 * * 1-5'      # 9:15 AM IST
    
    # Post-market scan (after 3:30 PM)
    - cron: '30 10 * * 1-5'     # 4:00 PM IST

permissions:
  contents: write

jobs:
  screen-stocks:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance requests numpy openpyxl scipy
    
    - name: Test basic functionality
      run: |
        echo "🧪 Testing basic Python functionality..."
        python -c "import pandas as pd; import yfinance as yf; print('✅ Dependencies OK')"
        echo "✅ Basic tests completed"
    
    - name: Run Yahoo Finance screener
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        RUN_TIME: ${{ github.event.schedule }}
      run: |
        echo "🚀 Starting Stock Yard Screener with Yahoo Finance data..."
        echo "Scheduled run time: ${RUN_TIME:-manual}"
        echo "Current UTC time: $(date -u)"
        echo "Current IST time: $(TZ='Asia/Kolkata' date)"
        echo "GitHub Event: ${{ github.event_name }}"
        echo "Workflow run number: ${{ github.run_number }}"
        
        # Check if secrets are available
        if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
          echo "⚠️ TELEGRAM_BOT_TOKEN not set"
        else
          echo "✅ TELEGRAM_BOT_TOKEN is configured"
        fi
        
        if [ -z "$TELEGRAM_CHAT_ID" ]; then
          echo "⚠️ TELEGRAM_CHAT_ID not set"
        else
          echo "✅ TELEGRAM_CHAT_ID is configured"
        fi
        
        # Simple execution with fallback
        echo "🔄 Starting screener..."
        python screener.py || {
          echo "⚠️ Screener failed, creating fallback data..."
          echo '{"timestamp":"'$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)'","golden_stocks":[],"volume_breakout_stocks":[],"w_pattern_stocks":[],"elliott_wave_stocks":[],"diagnostics":{"total_stocks_processed":0,"successful_downloads":0,"failed_downloads":0,"golden_matches":0,"volume_breakout_matches":0,"w_pattern_matches":0,"elliott_wave_matches":0,"errors":["Screener execution failed"]}}' > data.json
        }
        
        echo "✅ Screener execution completed"
    
    - name: Run trendline scanner
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        echo "📊 Running trendline scanner..."
        # Check if today is Sunday (day 0) - run full scan
        DAY_OF_WEEK=$(date +%u)
        if [ "$DAY_OF_WEEK" -eq "7" ]; then
          echo "🔄 Sunday - Running FULL trendline scan (recalculates all trendlines)"
          python update_feed.py || {
            echo "⚠️ Full trendline scanner failed, creating empty data..."
            echo '[]' > trendline_screen.json
          }
        else
          echo "⚡ Weekday - Running FAST price-only update (uses cached trendlines)"
          python update_trendline_prices.py || {
            echo "⚠️ Price update failed, falling back to full scan..."
            python update_feed.py || echo '[]' > trendline_screen.json
          }
        fi
        echo "✅ Trendline scanner completed"

    - name: Send Telegram alerts (Volume + Trendline)
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        echo "📣 Sending Telegram alerts with buttons..."
        
        # Install requests if needed
        pip install requests --quiet 2>/dev/null || true
        
        # Send alerts for new stocks
        python -c "
        import json
        import os
        from telegram_trade_bot import TelegramTradeBot
        
        bot = TelegramTradeBot()
        
        # Load trendline data
        try:
            with open('trendline_screen.json') as f:
                stocks = json.load(f)
        except:
            stocks = []
        
        # Send alerts for each stock (limit to 5)
        for stock in stocks[:5]:
            ticker = stock.get('ticker', 'N/A')
            price = stock.get('current_price', 0)
            target = stock.get('target_exit', 0)
            stoploss = stock.get('stop_loss', 0)
            signal_type = stock.get('tab_type', 'unknown')
            confluence = stock.get('confluence_score', 0)
            
            if price and target and stoploss:
                print(f'📨 Alert: {ticker}')
                bot.send_trade_alert_with_buttons(ticker, price, target, stoploss, signal_type, confluence)
        " || echo "⚠️ Alert sending skipped"
        
        echo "✅ Telegram alerts sent"

    - name: Monitor open positions (Angel One)
      env:
        ANGEL_API_KEY:      ${{ secrets.ANGEL_API_KEY }}
        ANGEL_CLIENT_ID:    ${{ secrets.ANGEL_CLIENT_ID }}
        ANGEL_PASSWORD:     ${{ secrets.ANGEL_PASSWORD }}
        ANGEL_TOTP_SECRET:  ${{ secrets.ANGEL_TOTP_SECRET }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        echo "📡 Monitoring open positions..."
        python angel_monitor.py || echo "⚠️ Monitor failed, continuing..."
        echo "✅ Position monitoring completed"
    
    - name: Verify results
      run: |
        if [ -f "data.json" ]; then
          echo "✅ data.json created successfully"
          echo "📊 File size: $(wc -c < data.json) bytes"
          echo "📄 First 10 lines:"
          head -10 data.json
        else
          echo "❌ data.json not found - creating fallback"
          echo '{"timestamp":"2024-12-19T16:30:00.000Z","golden_stocks":[],"volume_breakout_stocks":[],"w_pattern_stocks":[],"elliott_wave_stocks":[],"diagnostics":{"total_stocks_processed":0,"successful_downloads":0,"failed_downloads":0,"golden_matches":0,"volume_breakout_matches":0,"w_pattern_matches":0,"elliott_wave_matches":0,"errors":["Screener execution failed"]}}' > data.json
        fi
        - name: Check Open Positions for Target or SL Hits
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python check_alerts.py

    - name: Commit and Push structural changes back to UI
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add radar_trades.json || true
        git commit -m "chore: cloud workflow auto-synced alert logs" || echo "No changes"
        git push || echo "Push failed"

    - name: Commit and push results
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        # Run our separate Python script cleanly
        python update_html.py || echo "⚠️ update_html.py failed, continuing..."
        
        # Inject build timestamp into HTML for cache busting
        BUILD_TIME=$(date -u +%Y%m%d%H%M%S)
        sed -i "s/<!-- BUILD_TIMESTAMP: will be replaced by workflow -->/<!-- BUILD: ${BUILD_TIME} -->/" index.html || true
        
        # Commit changes to private repo
        git add data.json index.html trendline_screen.json
        git add radar_trades.json alerted_today.json notify_new_stocks.py previous_stocks.json 2>/dev/null || true
        
        # Create commit message with run context and better formatting
        RUN_CONTEXT="${{ github.event.schedule }}"
        if [ -z "$RUN_CONTEXT" ]; then
          RUN_CONTEXT="manual"
        fi
        
        CURRENT_TIME=$(date '+%Y-%m-%d %H:%M:%S UTC')
        COMMIT_MSG="🔄 Auto-update: $CURRENT_TIME [$RUN_CONTEXT] - Run #${{ github.run_number }}"
        
        echo "📝 Commit message: $COMMIT_MSG"
        git commit -m "$COMMIT_MSG" || echo "ℹ️ No changes to commit"
        
        # Push to private repo
        for i in {1..3}; do
          if git push origin main 2>/dev/null || git push origin master 2>/dev/null; then
            echo "✅ Successfully pushed to private repo (attempt $i)"
            break
          else
            echo "⚠️ Push failed (attempt $i), retrying in 5 seconds..."
            sleep 5
          fi
        done
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Deploy dashboard data to EC2
      run: |
        echo "🚀 Deploying trendline data to GitHub Pages..."
        
        # Check if trendline_screen.json exists
        if [ -f "trendline_screen.json" ]; then
          echo "📊 Found trendline_screen.json, size: $(wc -c < trendline_screen.json) bytes"
          echo "✅ Data ready for GitHub Pages deployment"
        else
          echo "⚠️ trendline_screen.json not found"
        fi
    
    - name: Deploy to public repository
      run: |
        echo "🚀 Deploying to public repository..."
        echo "Testing token access..."
        
        # Test if token works
        curl -s -o /dev/null -w "%{http_code}" \
          -H "Authorization: token ${{ secrets.DEPLOY_TOKEN }}" \
          https://api.github.com/repos/anuragsin17-sketch/Stock-Yard-Public \
          | xargs -I{} echo "API response code: {}"
        
        # Clone the public repository with verbose output
        git clone --verbose https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/anuragsin17-sketch/Stock-Yard-Public.git public-repo 2>&1 || {
          echo "❌ Clone failed - checking token..."
          echo "Token length: ${#DEPLOY_TOKEN}"
          exit 1
        }
        
        echo "✅ Cloned successfully"
        
        # Copy files to public repo
        cp index.html public-repo/
        cp trade.html public-repo/
        cp data.json public-repo/
        cp trendline_screen.json public-repo/ || true
        cp radar_trades.json public-repo/ || true
        cp "Stock List.csv" public-repo/ || true
        cp backtest_performance.json public-repo/ || true
        
        # Navigate to public repo
        cd public-repo
        
        # Configure git
        git config user.name "GitHub Action"
        git config user.email "action@github.com"
        
        # Add and commit changes
        git add -A
        git diff --cached --stat
        git commit -m "🔄 Auto-update: $(date '+%Y-%m-%d %H:%M:%S UTC') - Run #${{ github.run_number }}" || echo "ℹ️ No changes to commit"
        
        # Push
        git push origin main 2>&1 && echo "✅ Deployed to GitHub Pages" || echo "❌ Push failed"
        
        cd ..
        rm -rf public-repo
      env:
        DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}