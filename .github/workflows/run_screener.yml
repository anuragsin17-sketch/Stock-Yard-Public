name: Stock Yard Screener

on:
  workflow_dispatch:
  schedule:
    # Daily runs at specific IST times (7 days a week)
    - cron: '30 4 * * *'     # 10:00 AM IST (04:30 UTC)
    - cron: '30 8 * * *'     # 02:00 PM IST (08:30 UTC)
    - cron: '30 14 * * *'    # 08:00 PM IST (14:30 UTC)
    - cron: '10 11 * * *'    # 04:40 PM IST (11:10 UTC) - DRY RUN TEST

permissions:
  contents: write

jobs:
  screen-stocks:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance requests numpy openpyxl
    
    - name: Run Yahoo Finance screener
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        RUN_TIME: ${{ github.event.schedule }}
      run: |
        echo "🚀 Starting Stock Yard Screener with Yahoo Finance data..."
        echo "Scheduled run time: ${RUN_TIME:-manual}"
        echo "Current UTC time: $(date -u)"
        echo "Current IST time: $(TZ='Asia/Kolkata' date)"
        echo "GitHub Event: ${{ github.event_name }}"
        echo "Workflow run number: ${{ github.run_number }}"
        
        # Check if secrets are available
        if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
          echo "⚠️ TELEGRAM_BOT_TOKEN not set"
        else
          echo "✅ TELEGRAM_BOT_TOKEN is configured"
        fi
        
        if [ -z "$TELEGRAM_CHAT_ID" ]; then
          echo "⚠️ TELEGRAM_CHAT_ID not set"
        else
          echo "✅ TELEGRAM_CHAT_ID is configured"
        fi
        
        # Set timeout and memory limits for large dataset
        echo "🔄 Starting screener with 20-minute timeout..."
        timeout 20m python screener.py || {
          echo "⚠️ Screener timed out or failed, creating fallback data..."
          echo '{"timestamp":"'$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)'","golden_stocks":[],"volume_breakout_stocks":[],"w_pattern_stocks":[],"elliott_wave_stocks":[],"diagnostics":{"total_stocks_processed":0,"successful_downloads":0,"failed_downloads":0,"golden_matches":0,"volume_breakout_matches":0,"w_pattern_matches":0,"elliott_wave_matches":0,"errors":["Screener execution timed out or failed"]}}' > data.json
        }
        
        echo "✅ Screener execution completed"
    
    - name: Verify results
      run: |
        if [ -f "data.json" ]; then
          echo "✅ data.json created successfully"
          echo "📊 File size: $(wc -c < data.json) bytes"
          echo "📄 First 10 lines:"
          head -10 data.json
        else
          echo "❌ data.json not found - creating fallback"
          echo '{"timestamp":"2024-12-19T16:30:00.000Z","golden_stocks":[],"volume_breakout_stocks":[],"w_pattern_stocks":[],"elliott_wave_stocks":[],"diagnostics":{"total_stocks_processed":0,"successful_downloads":0,"failed_downloads":0,"golden_matches":0,"volume_breakout_matches":0,"w_pattern_matches":0,"elliott_wave_matches":0,"errors":["Screener execution failed"]}}' > data.json
        fi
    
    - name: Commit and push results
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        # Run our separate Python script cleanly
        python update_html.py
        
        # Commit changes to private repo (including positions.json)
        git add data.json index.html positions.json
        
        # Create commit message with run context and better formatting
        RUN_CONTEXT="${{ github.event.schedule }}"
        if [ -z "$RUN_CONTEXT" ]; then
          RUN_CONTEXT="manual"
        fi
        
        CURRENT_TIME=$(date '+%Y-%m-%d %H:%M:%S UTC')
        COMMIT_MSG="🔄 Auto-update: $CURRENT_TIME [$RUN_CONTEXT] - Run #${{ github.run_number }}"
        
        echo "📝 Commit message: $COMMIT_MSG"
        git commit -m "$COMMIT_MSG" || echo "ℹ️ No changes to commit"
        
        # Push to private repo
        for i in {1..3}; do
          if git push origin main 2>/dev/null || git push origin master 2>/dev/null; then
            echo "✅ Successfully pushed to private repo (attempt $i)"
            break
          else
            echo "⚠️ Push failed (attempt $i), retrying in 5 seconds..."
            sleep 5
          fi
        done
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Deploy to public repository
      run: |
        echo "🚀 Deploying to public repository..."
        
        # Clone the public repository
        git clone https://x-access-token:${{ secrets.DEPLOY_TOKEN }}@github.com/anuragsin17-sketch/Stock-Yard-Public.git public-repo
        
        # Copy files to public repo (including positions.json)
        cp index.html public-repo/
        cp data.json public-repo/
        cp positions.json public-repo/
        
        # Navigate to public repo
        cd public-repo
        
        # Configure git
        git config user.name "GitHub Action"
        git config user.email "action@github.com"
        
        # Add and commit changes
        git add index.html data.json positions.json
        git commit -m "🔄 Auto-update: $(date '+%Y-%m-%d %H:%M:%S UTC') - Run #${{ github.run_number }}" || echo "ℹ️ No changes to commit"
        
        # Push to public repo
        for i in {1..3}; do
          if git push origin main 2>/dev/null || git push origin master 2>/dev/null; then
            echo "✅ Successfully deployed to public repo (attempt $i)"
            break
          else
            echo "⚠️ Deploy failed (attempt $i), retrying in 5 seconds..."
            sleep 5
          fi
        done
        
        cd ..
        rm -rf public-repo
        
        echo "✅ Deployment complete!"
      env:
        DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}