name: Stock Yard Screener

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * 1-5' # Runs automatically Monday-Friday at 4:30 PM IST

permissions:
  contents: write

jobs:
  screen-stocks:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Live Python Screener Script
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python screener.py

    - name: Commit and Push Updated Live Data
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add data.json
        git commit -m "Update live screening results - $(date '+%Y-%m-%d %H:%M:%S')" || echo "No data changes detected"
        git push origin main
