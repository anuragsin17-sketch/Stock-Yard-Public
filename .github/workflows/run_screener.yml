    - name: Commit and push results
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        # Run our new separate Python script cleanly
        python update_html.py
        
        # Commit changes
        git add data.json index.html
        
        # Create commit message with run context
        RUN_CONTEXT="${{ github.event.schedule }}"
        if [ -z "$RUN_CONTEXT" ]; then
          RUN_CONTEXT="manual"
        fi
        
        COMMIT_MSG="📊 Live update: $(date '+%Y-%m-%d %H:%M:%S UTC') [$RUN_CONTEXT]"
        git commit -m "$COMMIT_MSG" || echo "No changes to commit"
        
        # Push with retry logic
        for i in {1..3}; do
          if git push origin main 2>/dev/null || git push origin master 2>/dev/null; then
            echo "✅ Successfully pushed changes (attempt $i)"
            break
          else
            echo "⚠️ Push failed (attempt $i), retrying in 5 seconds..."
            sleep 5
          fi
        done
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}