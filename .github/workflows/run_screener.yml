name: Stock Yard Screener

on:
  # Run Monday to Friday at 4:30 PM IST (11:00 AM UTC)
  schedule:
    - cron: '0 11 * * 1-5'
  
  # Allow manual trigger
  workflow_dispatch:

jobs:
  screen-stocks:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: List files for debugging
      run: |
        echo "Current directory contents:"
        ls -la
        echo "Looking for CSV file:"
        find . -name "*.csv" -type f
    
    - name: Run stock screener
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
      run: |
        echo "Starting Stock Yard Screener..."
        python screener.py || echo "Screener completed with warnings"
    
    - name: Check if data.json was created
      run: |
        if [ -f "data.json" ]; then
          echo "data.json created successfully"
          echo "File size: $(wc -c < data.json) bytes"
          echo "First few lines:"
          head -10 data.json
        else
          echo "data.json not found, creating minimal file"
          echo '{"timestamp":"'$(date -Iseconds)'","fibonacci_stocks":[],"volume_breakout_stocks":[],"w_pattern_stocks":[],"diagnostics":{"total_stocks_processed":0,"successful_downloads":0,"failed_downloads":0,"fibonacci_matches":0,"volume_breakout_matches":0,"w_pattern_matches":0,"errors":["GitHub Action execution - no data generated"]}}' > data.json
        fi
    
    - name: Commit and push results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add data.json
        git diff --staged --quiet || git commit -m "Update screening results - $(date '+%Y-%m-%d %H:%M:%S')"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Upload results as artifact
      uses: actions/upload-artifact@v3
      with:
        name: screening-results
        path: data.json
        retention-days: 30