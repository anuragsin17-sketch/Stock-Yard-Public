name: Stock Yard Screener

on:
  workflow_dispatch:
  schedule:
    # Market hours: 9:15 AM - 3:30 PM IST = 3:45 UTC - 10:00 UTC
    # Run every 30 minutes during market hours (Monday-Friday)
    - cron: '0,30 4-9 * * 1-5'
    - cron: '0 10 * * 1-5'

permissions:
  contents: write

jobs:
  screen-and-trade:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance requests numpy openpyxl scipy pyotp smartapi-python
    
    - name: Run trendline scanner
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        echo "Running trendline scanner..."
        python update_feed.py || python update_trendline_prices.py || echo "Scanner completed"
        
        echo "Updating trendline prices with live market data..."
        python update_trendline_prices_live.py || echo "Live price update completed"
    
    - name: Place Orders via EC2 API
      run: |
        echo "Scanning signals and placing orders..."
        python3 << 'PYEOF'
        import json
        import requests
        from datetime import datetime
        
        EC2_API = "http://32.194.58.75:5000"
        ORDERS_LOG = 'angel_orders.json'
        RADAR_LOG = 'radar_trades.json'
        
        # Load existing orders to avoid duplicates
        existing_orders = {}
        rejected_orders = {}
        all_orders = []
        try:
          with open(ORDERS_LOG) as f:
            all_orders = json.load(f)
            if isinstance(all_orders, list):
              for order in all_orders:
                ticker = order.get('symbol', '')
                if ticker:
                  # Track both placed and rejected orders
                  if order.get('status') == 'rejected':
                    rejected_orders[ticker] = {
                      'reason': order.get('rejection_reason', 'Unknown'),
                      'shortfall': order.get('shortfall', 0),
                      'rejected_at': order.get('rejected_at')
                    }
                  else:
                    existing_orders[ticker] = order.get('order_id')
        except:
          all_orders = []
        
        # Load existing radar trades
        radar_trades = []
        try:
          with open(RADAR_LOG) as f:
            radar_trades = json.load(f)
            if not isinstance(radar_trades, list):
              radar_trades = []
        except:
          radar_trades = []
        
        print(f"Already placed orders: {len(existing_orders)}")
        if existing_orders:
          print(f"  Symbols: {', '.join(existing_orders.keys())}")
        
        print(f"Previously rejected orders: {len(rejected_orders)}")
        if rejected_orders:
          for ticker, details in rejected_orders.items():
            print(f"  {ticker}: {details['reason']} (Shortfall: ₹{details['shortfall']:,.0f})")
        
        try:
          with open('trendline_screen.json') as f:
            stocks = json.load(f)
        except:
          print("No signals file found")
          stocks = []
        
        print(f"\nFound {len(stocks)} total signals")
        
        critical = [s for s in stocks if s.get('notificationTrigger', False)]
        print(f"Critical signals: {len(critical)}")
        
        # Filter OUT stocks that already have orders OR were previously rejected
        new_orders = [s for s in critical if s.get('ticker') not in existing_orders and s.get('ticker') not in rejected_orders]
        print(f"New signals (NOT yet ordered or rejected): {len(new_orders)}")
        
        orders_placed = 0
        orders_rejected = 0
        for stock in new_orders[:5]:
          ticker = stock.get('ticker', 'N/A')
          price = stock.get('currentPrice', 0)
          target = stock.get('positionSizing', {}).get('pivotTargetExit', 0)
          stoploss = stock.get('positionSizing', {}).get('strictStopLoss', 0)
          qty = stock.get('positionSizing', {}).get('sharesToBuy', 1)
          
          if price and target and stoploss:
            print(f"\n📊 Placing order: {ticker}")
            print(f"   Price: Rs{price} | Target: Rs{target} | SL: Rs{stoploss} | Qty: {qty}")
            
            try:
              response = requests.post(
                f"{EC2_API}/api/place-order",
                json={
                  'symbol': ticker,
                  'quantity': qty,
                  'entry_price': price,
                  'target_price': target,
                  'stop_loss': stoploss
                },
                timeout=30
              )
              
              result = response.json()
              if result.get('success'):
                order_id = result.get('order_id')
                print(f"   ✓ SUCCESS! Order ID: {order_id}")
                orders_placed += 1
                
                # SAVE order to angel_orders.json to prevent re-ordering
                new_order_record = {
                  'symbol': ticker,
                  'order_id': order_id,
                  'quantity': qty,
                  'entry_price': price,
                  'target_price': target,
                  'stop_loss': stoploss,
                  'placed_at': datetime.now().isoformat(),
                  'status': 'placed'
                }
                all_orders.append(new_order_record)
                
                # ALSO ADD TO RADAR TRADES for dashboard tracking
                radar_record = {
                  'ticker': ticker,
                  'order_id': order_id,
                  'entry_price': price,
                  'current_price': price,
                  'target': target,
                  'stop_loss': stoploss,
                  'quantity': qty,
                  'status': 'Open',
                  'source': 'Trendline',
                  'triggered_at': datetime.now().isoformat(),
                  'placed_at': datetime.now().isoformat()
                }
                radar_trades.append(radar_record)
              else:
                error = result.get('error', 'Unknown error')
                validation_failed = result.get('validation_failed', False)
                shortfall = result.get('shortfall', 0)
                
                if validation_failed:
                  print(f"   ❌ VALIDATION FAILED: {error}")
                  if shortfall > 0:
                    print(f"      Shortfall: ₹{shortfall:,.0f}")
                  orders_rejected += 1
                  
                  # SAVE rejected order to prevent re-triggering
                  rejected_order_record = {
                    'symbol': ticker,
                    'quantity': qty,
                    'entry_price': price,
                    'target_price': target,
                    'stop_loss': stoploss,
                    'status': 'rejected',
                    'rejection_reason': error,
                    'shortfall': shortfall,
                    'rejected_at': datetime.now().isoformat()
                  }
                  all_orders.append(rejected_order_record)
                else:
                  print(f"   ✗ FAILED: {error}")
            except Exception as e:
              print(f"   ✗ ERROR: {e}")
          else:
            print(f"\n⊘ Skipping {ticker} - Missing price/target/SL data")
        
        # Save all orders back to file
        try:
          with open(ORDERS_LOG, 'w') as f:
            json.dump(all_orders, f, indent=2)
          print(f"\n✅ Saved {len(all_orders)} total orders to {ORDERS_LOG}")
        except Exception as e:
          print(f"❌ Error saving orders: {e}")
        
        # Save radar trades for dashboard
        try:
          with open(RADAR_LOG, 'w') as f:
            json.dump(radar_trades, f, indent=2)
          print(f"✅ Saved {len(radar_trades)} trades to Radar tab ({RADAR_LOG})")
        except Exception as e:
          print(f"❌ Error saving radar trades: {e}")
        
        print(f"✅ Completed: {orders_placed} NEW orders placed, {orders_rejected} rejected")
        PYEOF
    
    - name: Commit results
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add trendline_screen.json angel_orders.json radar_trades.json 2>/dev/null || true
        git commit -m "Auto-update: Orders placed and radar trades updated $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || true
        git push || true
