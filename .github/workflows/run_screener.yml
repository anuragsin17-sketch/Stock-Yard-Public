name: Stock Yard Screener

on:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * 1-5'

permissions:
  contents: write

jobs:
  screen-stocks:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance requests numpy openpyxl
    
    - name: Run Yahoo Finance screener
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
      run: |
        echo "Starting Stock Yard Screener with Yahoo Finance data..."
        python screener.py
        echo "Screener execution completed"
    
    - name: Verify results
      run: |
        if [ -f "data.json" ]; then
          echo "data.json created successfully"
          echo "File size: $(wc -c < data.json) bytes"
          head -10 data.json
        else
          echo "data.json not found - creating fallback"
          echo '{"timestamp":"2024-12-19T16:30:00.000Z","fibonacci_stocks":[],"volume_breakout_stocks":[],"w_pattern_stocks":[],"diagnostics":{"total_stocks_processed":0,"successful_downloads":0,"failed_downloads":0,"fibonacci_matches":0,"volume_breakout_matches":0,"w_pattern_matches":0,"errors":["Screener execution failed"]}}' > data.json
        fi
    
    - name: Commit and push results
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add data.json
        git commit -m "Update live screening results - $(date '+%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
        git push origin main || git push origin master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}