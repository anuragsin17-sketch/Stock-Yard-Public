name: Stock Yard Screener

on:
  workflow_dispatch:
  schedule:
    # Multiple daily runs for 24/7 live feel (IST market hours)
    - cron: '30 3 * * 1-5'   # 9:00 AM IST - Pre-market
    - cron: '0 6 * * 1-5'    # 11:30 AM IST - Mid-morning
    - cron: '30 8 * * 1-5'   # 2:00 PM IST - Mid-day
    - cron: '0 11 * * 1-5'   # 4:30 PM IST - Post-market
    - cron: '30 13 * * 1-5'  # 7:00 PM IST - Evening update

permissions:
  contents: write

jobs:
  screen-stocks:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance requests numpy openpyxl
    
    - name: Run Yahoo Finance screener
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        RUN_TIME: ${{ github.event.schedule }}
      run: |
        echo "Starting Stock Yard Screener with Yahoo Finance data..."
        echo "Scheduled run time: ${RUN_TIME:-manual}"
        echo "Current UTC time: $(date -u)"
        echo "Current IST time: $(TZ='Asia/Kolkata' date)"
        
        # Set timeout and memory limits for large dataset
        timeout 25m python screener.py || {
          echo "⚠️ Screener timed out or failed, creating fallback data..."
          echo '{"timestamp":"'$(date -u +%Y-%m-%dT%H:%M:%S.%3NZ)'","fibonacci_stocks":[],"volume_breakout_stocks":[],"w_pattern_stocks":[],"diagnostics":{"total_stocks_processed":0,"successful_downloads":0,"failed_downloads":0,"fibonacci_matches":0,"volume_breakout_matches":0,"w_pattern_matches":0,"errors":["Screener execution timed out or failed"]}}' > data.json
        }
        
        echo "Screener execution completed"
    
    - name: Verify results
      run: |
        if [ -f "data.json" ]; then
          echo "data.json created successfully"
          echo "File size: $(wc -c < data.json) bytes"
          head -10 data.json
        else
          echo "data.json not found - creating fallback"
          echo '{"timestamp":"2024-12-19T16:30:00.000Z","fibonacci_stocks":[],"volume_breakout_stocks":[],"w_pattern_stocks":[],"diagnostics":{"total_stocks_processed":0,"successful_downloads":0,"failed_downloads":0,"fibonacci_matches":0,"volume_breakout_matches":0,"w_pattern_matches":0,"errors":["Screener execution failed"]}}' > data.json
        fi
    
    - name: Commit and push results
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        
        # Update HTML with latest data for live embedding
        if [ -f "data.json" ]; then
          echo "Updating HTML with latest screening data..."
          python -c "
import json
import re
from datetime import datetime

# Read the latest data
with open('data.json', 'r') as f:
    latest_data = json.load(f)

# Read the HTML file
with open('index.html', 'r') as f:
    html_content = f.read()

# Update the embedded LIVE_DATA
data_str = json.dumps(latest_data, indent=2)
pattern = r'const LIVE_DATA = \{[^}]+\};'
replacement = f'const LIVE_DATA = {data_str};'

# Replace the embedded data
updated_html = re.sub(pattern, replacement, html_content, flags=re.DOTALL)

# Write back to HTML
with open('index.html', 'w') as f:
    f.write(updated_html)

print('HTML updated with latest data')
"
        fi
        
        # Commit changes
        git add data.json index.html
        
        # Create commit message with run context
        RUN_CONTEXT="${{ github.event.schedule }}"
        if [ -z "$RUN_CONTEXT" ]; then
          RUN_CONTEXT="manual"
        fi
        
        COMMIT_MSG="📊 Live update: $(date '+%Y-%m-%d %H:%M:%S UTC') [$RUN_CONTEXT]"
        git commit -m "$COMMIT_MSG" || echo "No changes to commit"
        
        # Push with retry logic
        for i in {1..3}; do
          if git push origin main 2>/dev/null || git push origin master 2>/dev/null; then
            echo "✅ Successfully pushed changes (attempt $i)"
            break
          else
            echo "⚠️ Push failed (attempt $i), retrying in 5 seconds..."
            sleep 5
          fi
        done
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}