name: Stock Yard Screener

on:
  workflow_dispatch:
  push:
    branches:
      - main
  schedule:
    # Market hours: 9:15 AM - 3:30 PM IST = 3:45 UTC - 10:00 UTC
    # Run every 30 minutes during market hours (Monday-Friday)
    - cron: '0,30 4-9 * * 1-5'
    - cron: '0 10 * * 1-5'

permissions:
  contents: write

jobs:
  screen-stocks:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance requests numpy openpyxl scipy pyotp smartapi-python
    
    - name: Run trendline scanner
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        echo "Running trendline scanner..."
        python update_feed.py || python update_trendline_prices.py || echo "Scanner failed"
    
    - name: Auto-Execute Trades via EC2 API
      run: |
        echo "Auto-executing trades via EC2 API..."
        python3 << 'PYEOF'
        import json
        import requests
        
        EC2_API = "http://32.194.58.75:5000"
        
        try:
          with open('trendline_screen.json') as f:
            stocks = json.load(f)
        except:
          stocks = []
        
        print(f"Found {len(stocks)} signals")
        
        critical = [s for s in stocks if s.get('notificationTrigger', False)]
        print(f"Critical signals: {len(critical)}")
        
        for stock in critical[:5]:
          ticker = stock.get('ticker', 'N/A')
          price = stock.get('currentPrice', 0)
          target = stock.get('positionSizing', {}).get('pivotTargetExit', 0)
          stoploss = stock.get('positionSizing', {}).get('strictStopLoss', 0)
          qty = stock.get('positionSizing', {}).get('sharesToBuy', 1)
          
          if price and target and stoploss:
            print(f"Placing order: {ticker} x{qty} @ Rs{price}")
            try:
              response = requests.post(
                f"{EC2_API}/api/place-order",
                json={
                  'symbol': ticker,
                  'quantity': qty,
                  'entry_price': price,
                  'target_price': target,
                  'stop_loss': stoploss
                },
                timeout=30
              )
              
              result = response.json()
              if result.get('success'):
                print(f"✓ Order placed: {result.get('order_id')}")
              else:
                print(f"✗ Order failed: {result.get('error')}")
            except Exception as e:
              print(f"✗ Error: {e}")
        PYEOF
    
    - name: Commit results
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add radar_trades.json trendline_screen.json || true
        git commit -m "Auto-update: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || true
        git push || true
