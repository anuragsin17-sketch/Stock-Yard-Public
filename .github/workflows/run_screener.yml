name: Stock Yard Screener

on:
  workflow_dispatch:
  schedule:
    # Market hours: 9:15 AM - 3:30 PM IST = 3:45 UTC - 10:00 UTC
    # Run every 30 minutes during market hours (Monday-Friday)
    - cron: '0,30 4-9 * * 1-5'
    - cron: '0 10 * * 1-5'

permissions:
  contents: write

jobs:
  screen-and-trade:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas yfinance requests numpy openpyxl scipy pyotp smartapi-python
    
    - name: Run trendline scanner
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        echo "Running trendline scanner..."
        python update_feed.py || python update_trendline_prices.py || echo "Scanner completed"
    
    - name: Place Orders via EC2 API
      run: |
        echo "Scanning signals and placing orders..."
        python3 << 'PYEOF'
        import json
        import requests
        from datetime import datetime
        
        EC2_API = "http://32.194.58.75:5000"
        ORDERS_LOG = 'angel_orders.json'
        
        # Load existing orders to avoid duplicates
        existing_orders = {}
        try:
          with open(ORDERS_LOG) as f:
            orders = json.load(f)
            if isinstance(orders, list):
              for order in orders:
                ticker = order.get('symbol', '')
                if ticker:
                  existing_orders[ticker] = order.get('order_id')
        except:
          pass
        
        print(f"Already placed orders: {len(existing_orders)}")
        if existing_orders:
          print(f"  Symbols: {', '.join(existing_orders.keys())}")
        
        try:
          with open('trendline_screen.json') as f:
            stocks = json.load(f)
        except:
          print("No signals file found")
          stocks = []
        
        print(f"\nFound {len(stocks)} total signals")
        
        critical = [s for s in stocks if s.get('notificationTrigger', False)]
        print(f"Critical signals: {len(critical)}")
        
        # Filter OUT stocks that already have orders
        new_orders = [s for s in critical if s.get('ticker') not in existing_orders]
        print(f"New signals (NOT yet ordered): {len(new_orders)}")
        
        orders_placed = 0
        for stock in new_orders[:5]:
          ticker = stock.get('ticker', 'N/A')
          price = stock.get('currentPrice', 0)
          target = stock.get('positionSizing', {}).get('pivotTargetExit', 0)
          stoploss = stock.get('positionSizing', {}).get('strictStopLoss', 0)
          qty = stock.get('positionSizing', {}).get('sharesToBuy', 1)
          
          if price and target and stoploss:
            print(f"\n📊 Placing order: {ticker}")
            print(f"   Price: Rs{price} | Target: Rs{target} | SL: Rs{stoploss} | Qty: {qty}")
            
            try:
              response = requests.post(
                f"{EC2_API}/api/place-order",
                json={
                  'symbol': ticker,
                  'quantity': qty,
                  'entry_price': price,
                  'target_price': target,
                  'stop_loss': stoploss
                },
                timeout=30
              )
              
              result = response.json()
              if result.get('success'):
                order_id = result.get('order_id')
                print(f"   ✓ SUCCESS! Order ID: {order_id}")
                orders_placed += 1
              else:
                error = result.get('error', 'Unknown error')
                print(f"   ✗ FAILED: {error}")
            except Exception as e:
              print(f"   ✗ ERROR: {e}")
          else:
            print(f"\n⊘ Skipping {ticker} - Missing price/target/SL data")
        
        print(f"\n✅ Completed: {orders_placed} NEW orders placed")
        PYEOF
    
    - name: Commit results
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add trendline_screen.json angel_orders.json 2>/dev/null || true
        git commit -m "Auto-update: Orders placed $(date -u '+%Y-%m-%d %H:%M:%S UTC')" || true
        git push || true
