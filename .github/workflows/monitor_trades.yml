name: Trade Monitor - Every Hour (Market Hours)

on:
  schedule:
    # IST market hours: 9:15 AM - 3:30 PM IST = 3:45 AM - 10:00 AM UTC
    # Run every 30 minutes during market hours Mon-Fri
    - cron: '15,45 3 * * 1-5'    # 3:15, 3:45 UTC (9:45, 10:15 AM IST)
    - cron: '15,45 4 * * 1-5'    # 4:15, 4:45 UTC (9:45, 10:15 AM IST)
    - cron: '0,30 5 * * 1-5'     # 5:00, 5:30 UTC
    - cron: '0,30 6 * * 1-5'     # 6:00, 6:30 UTC
    - cron: '0,30 7 * * 1-5'     # 7:00, 7:30 UTC
    - cron: '0,30 8 * * 1-5'     # 8:00, 8:30 UTC
    - cron: '0,30 9 * * 1-5'     # 9:00, 9:30 UTC
    - cron: '0 10 * * 1-5'       # 10:00 UTC (3:30 PM IST - market close)
  
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  monitor-trades:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install yfinance requests

    - name: Run Trade Monitor
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        echo "🔍 Running Trade Monitor (Trendline only)..."
        python angel_monitor.py
        echo "✅ Monitor check completed"

    - name: Commit updates
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add radar_trades.json || true
        git diff --staged --quiet || git commit -m "📊 Trade Monitor: Updated radar_trades.json (Trendline → Radar)"
        git push || true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
