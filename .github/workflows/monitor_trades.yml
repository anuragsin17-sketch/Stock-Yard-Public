name: Trade Monitor - Every 15 Minutes

on:
  schedule:
    # Run every 15 minutes during market hours (9:15 AM to 3:30 PM IST)
    # IST is UTC+5:30, so 9:15 AM IST = 3:45 AM UTC
    # 3:30 PM IST = 10:00 AM UTC
    - cron: '*/15 3-10 * * 1-5'  # Every 15 min, Mon-Fri, 3:45 AM - 10:00 AM UTC (9:15 AM - 3:30 PM IST)
  
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  monitor-trades:
    runs-on: self-hosted  # Runs on your PC

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install yfinance requests

    - name: Run Trade Monitor
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        echo "🔍 Running Trade Monitor..."
        python angel_monitor.py
        echo "✅ Monitor check completed"

    - name: Commit updates
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add radar_trades.json 2>$null
        git commit -m "📊 Trade Monitor: Updated radar_trades.json" 2>$null
        if ($LASTEXITCODE -eq 0) { git push }
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      shell: pwsh
