    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
        }
        .mono {
            font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', 'Monaco', monospace;
        }
        body {
            -webkit-text-size-adjust: 100%;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: #0A0E14;
        }
        .mobile-card {
            background: rgba(20, 25, 35, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
        }
        .status-dot {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .touch-btn {
            min-height: 48px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }
        .touch-btn:active {
            transform: scale(0.98);
            background: rgba(16, 79, 87, 0.8);
        }
        .scroll-container {
            -webkit-overflow-scrolling: touch;
            overflow-scrolling: touch;
        }
        .pill-tab {
            background: rgba(20, 25, 35, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            transition: all 0.3s ease;
            padding: 12px 20px;
        }
        .pill-tab.active {
            background: linear-gradient(135deg, #065F46, #047857);
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 24px rgba(4, 120, 87, 0.25);
        }
        .stock-card {
            background: rgba(20, 25, 35, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            transition: all 0.2s ease;
            padding: 20px;
        }
        .stock-card:active {
            transform: translateY(-2px);
            border-color: rgba(4, 120, 87, 0.3);
        }
        .price-indicator {
            background: linear-gradient(135deg, #065F46, #047857);
            border-radius: 12px;
            padding: 6px 12px;
            font-weight: 600;
        }
        .signal-badge {
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .position-filter-btn {
            background: rgba(20, 25, 35, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }
        .position-filter-btn.active {
            background: linear-gradient(135deg, #065F46, #047857);
            border-color: rgba(16, 185, 129, 0.3);
        }
        .position-filter-btn:hover {
            border-color: rgba(4, 120, 87, 0.3);
        }
    </style>
</head>

            // URL: ?confirm=AXISBANK&price=1031&qty=48&stop=949&target=1237&source=Trendline
            if (confirmParam) {
                const price = parseFloat(urlParams.get('price') || '0');
                const qty = parseInt(urlParams.get('qty') || '0');
                const stop = parseFloat(urlParams.get('stop') || '0');
                const target = parseFloat(urlParams.get('target') || '0');
                const source = urlParams.get('source') || 'Trendline';

                // Switch to trendline tab and show confirmation after data loads
                setTimeout(() => {
                    switchTab('trendline');

                    // Show confirmation dialog - ONLY 4 PARAMETERS
                    const confirmed = confirm(
                        `📥 CONFIRM TRADE - ANGEL ONE\n\n` +
                        `Stock: ${confirmParam}\n` +
                        `Action: BUY\n` +
                        `Entry Price: ₹${price.toFixed(2)}\n` +
                        `Quantity: ${qty}\n\n` +
                        `⚠️ This will place a REAL LIMIT ORDER in Angel One.\n` +
                        `Click OK to confirm.`
                    );

                    if (confirmed) {
                        // Add to Radar
                        const trades = JSON.parse(localStorage.getItem('radarTrades') || '[]');
                        const exists = trades.find(t => t.ticker === confirmParam && t.status === 'Open');
                        if (!exists) {
                            trades.push({
                                ticker: confirmParam,
                                entryTrigger: price,
                                targetExit: target,
                                stopLoss: stop,
                                positionSize: qty * price,
                                quantity: qty,
                                takenAt: new Date().toISOString(),
                                status: 'Open',
                                source: source
                            });
                            localStorage.setItem('radarTrades', JSON.stringify(trades));
                        }

                        // Place order via Angel One
                        placeAngelOrder(confirmParam, 'BUY', qty, price, stop, target, source);
                    } else {
                        alert(`❌ Trade cancelled for ${confirmParam}`);
                    }

                    // Clean URL (remove params after handling)

        // Fetch live prices for priority stocks (AT ENTRY or radar status)
        async function fetchLivePricesForPriorityStocks() {
            if (!screeningData) return;
            
            console.log('🔴 Fetching live prices for priority stocks...');
            
            // Collect all priority stocks (AT ENTRY or radar status)
            const priorityStocks = [];
            
            // Check volume breakout stocks
            screeningData.volume_breakout_stocks?.forEach(stock => {
                if (stock.radar_status === 'Active' || stock.near_breakout_low) {
                    priorityStocks.push({
                        symbol: stock.symbol,
                        type: 'volume',
                        entryPrice: stock.radar_trigger_price,
                        currentPrice: stock.current_price
                    });
                }
            });
            
            if (priorityStocks.length === 0) {
                console.log('📊 No priority stocks found for live price updates');
                return;
            }
            
            console.log(`🎯 Updating live prices for ${priorityStocks.length} priority stocks`);
            
            // Fetch live prices in batches to avoid rate limiting
            const batchSize = 5;
            for (let i = 0; i < priorityStocks.length; i += batchSize) {
                const batch = priorityStocks.slice(i, i + batchSize);
                
                await Promise.all(batch.map(async (stock) => {
                    try {
                        const response = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${stock.symbol}.NS`);
                        if (response.ok) {
                            const data = await response.json();
                            const livePrice = data.chart.result[0].meta.regularMarketPrice;
                            
                            // Update the stock data in screeningData
                            updateStockPrice(stock.symbol, stock.type, livePrice);
                            
                            console.log(`📈 ${stock.symbol}: ₹${livePrice.toFixed(2)} (was ₹${stock.currentPrice})`);
                        }
                    } catch (error) {
                        console.warn(`Failed to fetch live price for ${stock.symbol}:`, error);
                    }
                }));
                
                // Small delay between batches to avoid rate limiting
                if (i + batchSize < priorityStocks.length) {
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
            }
            
            // Update UI with new prices
            updateUI();
            console.log('✅ Live price updates completed');
        }
        
        // Update stock price in screeningData
        function updateStockPrice(symbol, type, newPrice) {
            const stockArrays = {
                'volume': 'volume_breakout_stocks'
            };
            
            const arrayName = stockArrays[type];
            if (!arrayName || !screeningData[arrayName]) return;
            
            const stock = screeningData[arrayName].find(s => s.symbol === symbol);
            if (stock) {
                const oldPrice = stock.current_price;
                stock.current_price = newPrice;
                
                // Recalculate distance percentages
                if (type === 'volume' && stock.radar_trigger_price) {
                    stock.distance_to_trigger_abs_percent = Math.abs(((newPrice - stock.radar_trigger_price) / stock.radar_trigger_price) * 100);
                }
                
                // Update change indicator
                const change = ((newPrice - oldPrice) / oldPrice) * 100;
                stock.live_change_percent = change;
                stock.is_live_updated = true;
            }
        }
        
        // Fetch real-time NIFTY and SENSEX data
        async function fetchIndexData() {
            try {
                async function fetchWithProxy(symbol) {
                    const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`;
                    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`;
                    const resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(5000) });
                    if (!resp.ok) throw new Error('proxy failed');
                    return await resp.json();
                }

                const [niftyData, sensexData] = await Promise.all([
                    fetchWithProxy('%5ENSEI'),
                    fetchWithProxy('%5EBSESN')
                ]);

                function updateIndex(data, elementId) {
                    const meta = data.chart.result[0].meta;
                    const price = meta.regularMarketPrice;
                    const prevClose = meta.previousClose || meta.chartPreviousClose || meta.regularMarketPreviousClose;
                    const el = document.getElementById(elementId);
                    if (prevClose && prevClose > 0) {
                        const pct = ((price - prevClose) / prevClose) * 100;
                        el.textContent = `${price.toFixed(0)} (${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%)`;
                        el.className = `text-xs font-semibold mono ${pct >= 0 ? 'text-emerald-400' : 'text-red-400'}`;
                    } else {
                        el.textContent = `${price.toFixed(0)}`;
                        el.className = 'text-xs font-semibold mono text-emerald-400';
                    }
                }

                updateIndex(niftyData, 'nifty50Price');
                updateIndex(sensexData, 'sensexPrice');

            } catch (error) {
                console.warn('Index data fetch failed:', error);
                document.getElementById('nifty50Price').textContent = 'N/A';
                document.getElementById('sensexPrice').textContent = 'N/A';
            }
        }
        
        // Load data (try fetch first, fallback to embedded)
        async function loadData() {
            console.log('📱 Loading data...');
            hideError();
            
            try {
                // Try to fetch updated data first
                const response = await fetch('./data.json', {
                    method: 'GET',
                    headers: { 'Cache-Control': 'no-cache' },
                    cache: 'no-store'
                });
                
                if (response.ok) {
                    const text = await response.text();
                    const fetchedData = JSON.parse(text.trim().replace(/^\uFEFF/, ''));
                    
                    if (fetchedData && fetchedData.timestamp) {
                        console.log('✅ Fetched fresh data from server');
                        screeningData = fetchedData;
                        updateUI();
                        updateStatus(true);
                        return;
                    }
                }
            } catch (error) {
                console.log('⚠️ Fetch failed, using embedded data:', error.message);
            }
            
            // Use embedded data as reliable fallback
            console.log('📦 Using embedded live data');
            screeningData = LIVE_DATA;
            updateUI();
            updateStatus(true);
        }

        // Place order via GitHub Actions (credentials stay in GitHub Secrets)
        async function placeAngelOrder(symbol, action, qty, price, stopLoss, target, source) {
            // GitHub PAT stored in localStorage (user sets it once)
            const pat = localStorage.getItem('github_pat');
            const repo = 'anuragsin17-sketch/Stock-Yard';

            if (!pat) {
                const userPat = prompt(
                    '🔑 Enter your GitHub Personal Access Token (PAT)\n\n' +
                    'This is stored locally in your browser only.\n' +
                    'Create one at: github.com/settings/tokens\n' +
                    'Required scope: repo (for workflow dispatch)\n\n' +
                    'PAT:'
                );
                if (!userPat) {
                    alert('❌ PAT required to place orders. Trade added to Radar only.');
                    switchTab('performance');
                    return;
                }
                localStorage.setItem('github_pat', userPat.trim());
            }

            const storedPat = localStorage.getItem('github_pat');

            try {
                // Show loading
                const loadingMsg = `⏳ Placing order for ${symbol}...`;
                console.log(loadingMsg);

                const response = await fetch(
                    `https://api.github.com/repos/${repo}/dispatches`,
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `token ${storedPat}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            event_type: 'place_trade',
                            client_payload: {
                                action: action,
                                symbol: symbol,
                                token: '',
                                quantity: qty.toString(),
                                price: price.toFixed(2),
                                stop_loss: stopLoss.toFixed(2),
                                target: target.toFixed(2),
                                source: source
                            }
                        })
                    }
                );

                if (response.status === 204) {
                    alert(
                        `✅ Order dispatched to Angel One!\n\n` +
                        `${action} ${qty} shares of ${symbol} @ ₹${price.toFixed(2)}\n\n` +
                        `GitHub Actions is processing your order.\n` +
                        `You will receive a Telegram notification when done.\n\n` +
                        `Check Actions tab for status.`
                    );
                    switchTab('performance');
                } else if (response.status === 401) {
                    localStorage.removeItem('github_pat');
                    alert('❌ Invalid PAT token. Please try again.');
                } else {
                    const err = await response.text();
                    alert(`❌ Failed to dispatch order: ${response.status}\n${err}`);
                }

            } catch (error) {
                alert(`❌ Network error: ${error.message}\nTrade added to Radar only.`);
                switchTab('performance');
            }
        }

        // Take Trade from Volume tab - manual only
        window.takeVolumeTrade = function(symbol, companyName) {
            const entryEl = document.getElementById(`vol_entry_${symbol}`);
            const posEl = document.getElementById(`vol_pos_${symbol}`);
            const entry = parseFloat(entryEl ? entryEl.value : 0);
            const positionSize = parseFloat(posEl ? posEl.value : 50000);

            if (!entry || entry <= 0) {
                alert('Please set a valid Entry Trigger price first');
                return;
            }

            const target = parseFloat((entry * 1.20).toFixed(2));
            const stopLoss = parseFloat((entry * 0.92).toFixed(2));
            const qty = Math.floor(positionSize / entry);

            // Confirmation dialog - ONLY 4 PARAMETERS
            const confirmed = confirm(
                `📥 CONFIRM TRADE - ANGEL ONE\n\n` +
                `Stock: ${symbol}\n` +
                `Action: BUY\n` +
                `Entry Price: ₹${entry.toFixed(2)}\n` +
                `Quantity: ${qty}\n\n` +
                `⚠️ This will place a REAL LIMIT ORDER in Angel One.\n` +
                `Click OK to confirm.`
            );

            if (!confirmed) return;

            // Add to Radar
            const trades = JSON.parse(localStorage.getItem('radarTrades') || '[]');
            const exists = trades.find(t => t.ticker === symbol && t.status === 'Open');
            if (!exists) {
                trades.push({
                    ticker: symbol,
                    companyName: companyName,
                    entryTrigger: entry,
                    targetExit: target,
                    stopLoss: stopLoss,
                    positionSize: positionSize,
                    quantity: qty,
                    takenAt: new Date().toISOString(),
                    status: 'Open',
                    source: 'Volume'
                });
                localStorage.setItem('radarTrades', JSON.stringify(trades));
            }

            // Trigger Angel One order via GitHub Actions
            placeAngelOrder(symbol, 'BUY', qty, entry, stopLoss, target, 'Volume');
        };

                                            class="py-2 px-3 rounded-lg text-xs touch-btn"
                                            style="background: rgba(100,116,139,0.2); color: #94A3B8;">🗑️</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                // Trendline pagination
                const trendTotalPages = Math.ceil(trendlineStocks.length / TAB_PAGE_SIZE);
                if (trendPage > trendTotalPages) trendPage = 1;
                const pagedTrendStocks = trendlineStocks.slice((trendPage-1)*TAB_PAGE_SIZE, trendPage*TAB_PAGE_SIZE);

                pagedTrendStocks.forEach(stock => {
                    // Get saved overrides from localStorage
                    const savedKey = `trendline_${stock.ticker}`;
                    const saved = JSON.parse(localStorage.getItem(savedKey) || '{}');
                    const entryTrigger = saved.entryTrigger || stock.triggerPrice;
                    const targetExit = saved.targetExit || stock.positionSizing.pivotTargetExit;
                    const stopLoss = saved.stopLoss || stock.positionSizing.strictStopLoss;

                    // Determine status badge
                    let statusBadge = '';
                    if (stock.notificationTrigger || stock.distanceRemaining <= 1.0) {
                        statusBadge = '<span class="px-3 py-1.5 text-xs rounded-full mono tracking-wide animate-pulse" style="background: rgba(220, 38, 38, 0.2); color: #DC2626;">🎯 CRITICAL ENTRY</span>';
                    } else if (stock.distanceRemaining <= 5.0) {
                        statusBadge = '<span class="px-3 py-1.5 text-xs rounded-full mono tracking-wide" style="background: rgba(234, 179, 8, 0.2); color: #EAB308;">👀 WATCHLIST</span>';
                    } else {
                        statusBadge = '<span class="px-3 py-1.5 text-xs rounded-full mono tracking-wide" style="background: rgba(59, 130, 246, 0.2); color: #3B82F6;">📊 MONITORING</span>';
                    }

                    const chartUrl = `https://in.tradingview.com/chart/?symbol=NSE:${stock.ticker}`;
                    const stockNameHtml = `<a href="${chartUrl}" target="_blank" class="font-bold text-slate-100 hover:text-blue-400 transition-colors">${stock.ticker}</a>`;

                    html += `
                        <div class="stock-card mb-4">
                            <div class="flex justify-between items-start">
                                <div class="flex-1">
                                    <div class="text-lg font-bold mb-1">${stockNameHtml}</div>
                                    <div class="text-xs text-slate-400 mb-3">${stock.patternZone} | Wicks: ${stock.wickTouches || '-'} | ${stock.timeframe || 'monthly'}</div>

                                    <div class="text-lg font-bold mono flex items-center mb-3" style="color: #047857;">
                                        ₹${stock.currentPrice.toLocaleString()}
                                        <span class="text-xs ml-2 text-slate-400">Distance: ${stock.distanceRemaining.toFixed(2)}%</span>
                                    </div>

                                    <!-- Editable Entry Trigger -->
                                    <div class="mb-2">
                                        <div class="text-xs text-slate-500 mb-1">Entry Trigger</div>
                                        <div class="flex items-center space-x-2">
                                            <span class="text-xs mono" style="color: #3B82F6;">₹</span>
                                            <input type="number"
                                                id="entry_${stock.ticker}"
                                                value="${parseFloat(entryTrigger).toFixed(2)}"
                                                step="0.01"
                                                class="mono text-sm font-semibold bg-transparent border-b outline-none w-28"
                                                style="color: #3B82F6; border-color: rgba(59,130,246,0.3);"
                                                onchange="saveTrendlineOverride('${stock.ticker}', 'entryTrigger', this.value)"/>
                                            ${saved.entryTrigger ? '<span class="text-xs" style="color:#F59E0B;">✏️</span>' : ''}
                                        </div>
                                    </div>

                                    <!-- Editable Target Exit -->
                                    <div class="mb-2">
                                        <div class="text-xs text-slate-500 mb-1">Target Exit</div>
                                        <div class="flex items-center space-x-2">
                                            <span class="text-xs mono" style="color: #10B981;">₹</span>
                                            <input type="number"
                                                id="target_${stock.ticker}"
                                                value="${parseFloat(targetExit).toFixed(2)}"
                                                step="0.01"
                                                class="mono text-sm font-semibold bg-transparent border-b outline-none w-28"
                                                style="color: #10B981; border-color: rgba(16,185,129,0.3);"
                                                onchange="saveTrendlineOverride('${stock.ticker}', 'targetExit', this.value)"/>
                                            ${saved.targetExit ? '<span class="text-xs" style="color:#F59E0B;">✏️</span>' : ''}
                                        </div>
                                    </div>

                                    <!-- Editable Stop Loss -->
                                    <div class="mb-3">
                                        <div class="text-xs text-slate-500 mb-1">Stop Loss <span class="text-slate-600">(Monthly Close)</span></div>
                                        <div class="flex items-center space-x-2">
                                            <span class="text-xs mono" style="color: #DC2626;">₹</span>
                                            <input type="number"
                                                id="stop_${stock.ticker}"
                                                value="${parseFloat(stopLoss).toFixed(2)}"
                                                step="0.01"
                                                class="mono text-sm font-semibold bg-transparent border-b outline-none w-28"
                                                style="color: #DC2626; border-color: rgba(220,38,38,0.3);"
                                                onchange="saveTrendlineOverride('${stock.ticker}', 'stopLoss', this.value)"/>
                                            ${saved.stopLoss ? '<span class="text-xs" style="color:#F59E0B;">✏️</span>' : ''}
                                        </div>
                                    </div>

                                    <div class="text-xs text-slate-500 mono mb-2">
                                        Fib: ${stock.fibLevelMatch} | Score: ${stock.confluenceScore || '-'}/10
                                    </div>

                                    <!-- Editable Position Size -->
                                    <div class="mb-3">
                                        <div class="text-xs text-slate-500 mb-1">Position Size (₹)</div>
                                        <div class="flex items-center space-x-2">
                                            <span class="text-xs mono text-slate-400">₹</span>
                                            <input type="number"
                                                id="pos_${stock.ticker}"
                                                value="${saved.positionSize || 50000}"
                                                step="1000"
                                                class="mono text-sm font-semibold bg-transparent border-b outline-none w-28"
                                                style="color: #A78BFA; border-color: rgba(167,139,250,0.3);"
                                                onchange="saveTrendlineOverride('${stock.ticker}', 'positionSize', this.value)"/>
                                        </div>
                                    </div>

                                    <div class="flex items-center space-x-2 mt-3">
                                        <div class="flex-1">${statusBadge}</div>
                                        <button onclick="takeTrade('${stock.ticker}', ${entryTrigger}, ${targetExit}, ${stopLoss})"
                                            class="px-4 py-2 rounded-lg text-xs font-semibold touch-btn"
                                            style="background: linear-gradient(135deg, #065F46, #047857); color: #fff; min-width: 90px;">
                                            📥 Take Trade
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                // Trendline pagination controls
                if (trendTotalPages > 1) {
                    html += paginationControls(
                        trendPage, trendTotalPages,
                        'trendPage=Math.max(1,trendPage-1); displayTrendlineScreen()',
                        `trendPage=Math.min(${trendTotalPages},trendPage+1); displayTrendlineScreen()`
                    );
                }

                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = `
                    <div class="mobile-card rounded-xl p-6 text-center">
                        <div class="text-red-400 mb-2">⚠️ Error Loading Trendline Data</div>
                        <div class="text-xs text-slate-500">${error.message}</div>
                    </div>
                `;
            }
        }
        
        // ─── PAST PERFORMANCE TAB ────────────────────────────────────────────────
        let perfData = null;
        let perfDateFrom = '';
        let perfDateTo   = '';
        let perfStockFilter = '';
        let perfSortBy = 'total_pnl';
        let perfYears = 0;
        let perfPage = 1;
        const PERF_PAGE_SIZE = 10;

        // Pagination state for Volume and Trendline tabs
        let volPage = 1;
        let trendPage = 1;
        const TAB_PAGE_SIZE = 10;

        function paginationControls(currentPage, totalPages, onPrev, onNext) {
            if (totalPages <= 1) return '';
            return `
                <div class="mobile-card rounded-xl p-4 mt-2 mb-2">
                    <div class="flex items-center justify-between">
                        <button onclick="${onPrev}"
                            class="px-4 py-2 rounded-lg text-xs font-medium touch-btn"
                            style="${currentPage<=1 ? 'opacity:0.3;pointer-events:none;background:rgba(30,41,59,0.5);color:#94A3B8' : 'background:rgba(30,41,59,0.9);color:#fff'}">← Prev</button>
                        <div class="text-xs text-center">
                            <div class="font-semibold text-slate-200">Page ${currentPage} of ${totalPages}</div>
                        </div>
                        <button onclick="${onNext}"
                            class="px-4 py-2 rounded-lg text-xs font-medium touch-btn"
                            style="${currentPage>=totalPages ? 'opacity:0.3;pointer-events:none;background:rgba(30,41,59,0.5);color:#94A3B8' : 'background:rgba(30,41,59,0.9);color:#fff'}">Next →</button>
                    </div>
                </div>`;
        }

        async function displayPastPerformance() {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = `
                <div class="mobile-card rounded-xl p-6 text-center">
                    <div class="text-slate-400 text-sm mb-2">Loading backtest data...</div>
                    <div class="text-xs text-slate-500">Fetching historical performance results</div>
                </div>`;

            try {
                const resp = await fetch('./backtest_performance.json', { cache: 'no-store' });
                if (!resp.ok) throw new Error('backtest_performance.json not found');
                perfData = await resp.json();
            } catch (e) {
                container.innerHTML = `
                    <div class="mobile-card rounded-xl p-8 text-center">
                        <div class="text-4xl mb-4">📊</div>
                        <div class="text-slate-300 font-semibold mb-2">No Backtest Data Yet</div>
                        <div class="text-xs text-slate-500 mb-4">Run the backtest to generate performance data:</div>
                        <code class="text-xs px-3 py-2 rounded-lg block mb-4" style="background: rgba(30,41,59,0.9); color: #38BDF8;">python backtest_performance.py --years 10</code>
                        <div class="text-xs text-slate-500">Or trigger the GitHub Actions workflow manually.</div>
                    </div>`;
                return;
            }

            renderPastPerformance(container);
        }

        // Helper: returns YYYY-MM-DD for N days ago
        function getDateOffset(days) {
            const d = new Date();
            d.setDate(d.getDate() - days);
            return d.toISOString().split('T')[0];
        }

        let perfCapital = 500000; // default ₹5,00,000 total capital

        function renderPastPerformance(container) {
            if (!perfData) return;
            const allStocks = perfData.stocks || [];
            const generatedAt = perfData.generated_at ? new Date(perfData.generated_at).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) : '—';
            const backtestYears = perfData.backtest_years || '?';

            // ── Date filter ──────────────────────────────────────────────────
            const fromTs = perfDateFrom ? new Date(perfDateFrom).getTime() : null;
            const toTs   = perfDateTo   ? new Date(perfDateTo).getTime()   : null;

            function filterTrades(trades) {
                if (!fromTs && !toTs) return trades;
                return (trades || []).filter(t => {
                    const ts = new Date(t.entry_date).getTime();
                    if (fromTs && ts < fromTs) return false;
                    if (toTs   && ts > toTs)   return false;
                    return true;
                });
            }

            // Rebuild per-stock summaries with filtered trades + capital scaling
            // Capital is split equally per trade across the whole filtered period
            const allFilteredTrades = allStocks.flatMap(st => filterTrades(st.trades || []));
            const totalTrades = allFilteredTrades.length;
            const perTradeCap = totalTrades > 0 ? perfCapital / totalTrades : perfCapital;

            let stocks = allStocks.map(st => {
                const trades = filterTrades(st.trades || []).map(t => {
                    const shares = Math.max(1, Math.floor(perTradeCap / t.entry_price));
                    const pnl_amount = (t.exit_price - t.entry_price) * shares;
                    return { ...t, shares, pnl_amount: Math.round(pnl_amount * 100) / 100 };
                });
                if (trades.length === 0) return null;
                const wins   = trades.filter(t => t.pnl_pct > 0);
                const losses = trades.filter(t => t.pnl_pct <= 0);
                const total_pnl = trades.reduce((s, t) => s + t.pnl_amount, 0);
                const win_rate  = Math.round(wins.length / trades.length * 1000) / 10;
                const avg_return_pct = Math.round(trades.reduce((s,t) => s + t.pnl_pct, 0) / trades.length * 100) / 100;
                const best  = trades.reduce((b, t) => t.pnl_pct > b.pnl_pct ? t : b, trades[0]);
                const worst = trades.reduce((w, t) => t.pnl_pct < w.pnl_pct ? t : w, trades[0]);
                return {
                    symbol: st.symbol,
                    total_trades: trades.length,
                    wins: wins.length, losses: losses.length,
                    win_rate, avg_return_pct,
                    total_pnl: Math.round(total_pnl),
                    best_trade_pct: best.pnl_pct, best_trade_date: best.entry_date,
                    worst_trade_pct: worst.pnl_pct, worst_trade_date: worst.entry_date,
                    avg_holding_days: Math.round(trades.reduce((s,t) => s + t.holding_days, 0) / trades.length),
                    trades
                };
            }).filter(Boolean);

            // Overall summary from filtered+scaled trades
            const scaledTrades = stocks.flatMap(s => s.trades);
            const total = scaledTrades.length;
            let s = {};
            if (total > 0) {
                const wins_all   = scaledTrades.filter(t => t.pnl_pct > 0);
                const losses_all = scaledTrades.filter(t => t.pnl_pct <= 0);
                const gross_profit = wins_all.reduce((a,t) => a + t.pnl_amount, 0);
                const gross_loss   = Math.abs(losses_all.reduce((a,t) => a + t.pnl_amount, 0));
                const outcomes = {};
                scaledTrades.forEach(t => { outcomes[t.outcome] = (outcomes[t.outcome] || 0) + 1; });
                const total_pnl = Math.round(scaledTrades.reduce((a,t) => a + t.pnl_amount, 0));
                const roi = Math.round(total_pnl / perfCapital * 10000) / 100;
                s = {
                    total_trades: total,
                    winning_trades: wins_all.length,
                    losing_trades: losses_all.length,
                    win_rate: Math.round(wins_all.length / total * 1000) / 10,
                    avg_win_pct: wins_all.length ? Math.round(wins_all.reduce((a,t) => a+t.pnl_pct,0)/wins_all.length*100)/100 : 0,
                    avg_loss_pct: losses_all.length ? Math.round(losses_all.reduce((a,t) => a+t.pnl_pct,0)/losses_all.length*100)/100 : 0,
                    total_pnl,
                    roi,
                    profit_factor: gross_loss > 0 ? Math.round(gross_profit/gross_loss*100)/100 : 0,
                    avg_holding_days: Math.round(scaledTrades.reduce((a,t) => a+t.holding_days,0)/total),
                    outcome_breakdown: outcomes
                };
            }

            // Stock search filter
            if (perfStockFilter.length >= 2) {
                stocks = stocks.filter(st => st.symbol.toUpperCase().includes(perfStockFilter.toUpperCase()));
            }

            // Sort
            stocks = [...stocks].sort((a, b) => {
                if (perfSortBy === 'win_rate')     return b.win_rate - a.win_rate;
                if (perfSortBy === 'avg_return')   return b.avg_return_pct - a.avg_return_pct;
                if (perfSortBy === 'total_trades') return b.total_trades - a.total_trades;
                return b.total_pnl - a.total_pnl;
            });

            const winRateColor = s.win_rate >= 60 ? '#10B981' : s.win_rate >= 45 ? '#D97706' : '#DC2626';
            const pnlColor = (s.total_pnl || 0) >= 0 ? '#10B981' : '#DC2626';
            const pfColor = s.profit_factor >= 1.5 ? '#10B981' : s.profit_factor >= 1.0 ? '#D97706' : '#DC2626';
            const dateLabel = (perfDateFrom || perfDateTo)
                ? `${perfDateFrom || perfData.period?.start} → ${perfDateTo || perfData.period?.end}`
                : `${perfData.period?.start || ''} → ${perfData.period?.end || ''}`;

            let html = `
                <!-- Header -->
                <div class="mobile-card rounded-xl p-4 mb-4" style="border-color:rgba(56,189,248,0.2);background:rgba(56,189,248,0.05);">
                    <div class="flex items-center justify-between mb-1">
                        <div class="text-xs font-semibold tracking-wider uppercase" style="color:#38BDF8;">📊 Trendline Strategy — ${backtestYears}Y Backtest</div>
                        <div class="text-xs text-slate-500">Updated: ${generatedAt}</div>
                    </div>
                    <div class="text-xs text-slate-400">${dateLabel}</div>
                </div>

                <!-- Capital + Date filters -->
                <div class="mobile-card rounded-xl p-4 mb-4">
                    <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">⚙️ Simulation Settings</div>

                    <!-- Capital input -->
                    <div class="mb-4">
                        <label class="text-xs text-slate-500 mb-1 block">💰 Capital Amount to Test</label>
                        <div class="flex items-center space-x-2 mb-2">
                            <span class="text-xs mono text-slate-400">₹</span>
                            <input type="number" id="perfCapitalInput"
                                value="${perfCapital}" step="50000" min="10000"
                                class="flex-1 px-3 py-2 rounded-lg text-sm mono text-slate-100 outline-none"
                                style="background:rgba(30,41,59,0.9);border:1px solid rgba(167,139,250,0.4);color:#A78BFA;"
                                onchange="perfCapital=Math.max(10000,parseInt(this.value)||500000); renderPastPerformance(document.getElementById('resultsContainer'))" />
                        </div>
                        <div class="flex space-x-2 overflow-x-auto scroll-container">
                            ${[100000,250000,500000,1000000,2500000].map(v =>
                                `<button onclick="perfCapital=${v}; document.getElementById('perfCapitalInput').value=${v}; renderPastPerformance(document.getElementById('resultsContainer'))"
                                    class="flex-shrink-0 px-3 py-1 rounded-lg text-xs touch-btn"
                                    style="${perfCapital===v ? 'background:linear-gradient(135deg,#4C1D95,#6D28D9);color:#fff;' : 'background:rgba(30,41,59,0.8);color:#94A3B8;'}">
                                    ₹${v>=100000?(v/100000).toFixed(v%100000===0?0:1)+'L':(v/1000)+'K'}</button>`
                            ).join('')}
                        </div>
                        <div class="text-xs text-slate-500 mt-2">Capital is split equally across ${total} trade${total!==1?'s':''} in this period → ₹${Math.round(total>0?perfCapital/total:perfCapital).toLocaleString()} per trade</div>
                    </div>

                    <!-- Date range -->
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div>
                            <label class="text-xs text-slate-500 mb-1 block">📅 Date From</label>
                            <input type="date" id="perfDateFromInput" value="${perfDateFrom}"
                                class="w-full px-3 py-2 rounded-lg text-sm mono text-slate-100 outline-none"
                                style="background:rgba(30,41,59,0.9);border:1px solid rgba(59,130,246,0.3);color:#38BDF8;"
                                onchange="perfYears=0; perfDateFrom=this.value; renderPastPerformance(document.getElementById('resultsContainer'))" />
                        </div>
                        <div>
                            <label class="text-xs text-slate-500 mb-1 block">📅 Date To</label>
                            <input type="date" id="perfDateToInput" value="${perfDateTo}"
                                max="${new Date().toISOString().split('T')[0]}"
                                class="w-full px-3 py-2 rounded-lg text-sm mono text-slate-100 outline-none"
                                style="background:rgba(30,41,59,0.9);border:1px solid rgba(59,130,246,0.3);color:#38BDF8;"
                                onchange="perfDateTo=this.value; renderPastPerformance(document.getElementById('resultsContainer'))" />
                        </div>
                    </div>
                    <div class="flex space-x-2 overflow-x-auto scroll-container">
                        ${[['1Y',1],['3Y',3],['5Y',5],['10Y',10]].map(([label,yrs]) => {
                            const active = perfYears===yrs && !perfDateFrom && !perfDateTo;
                            const style = active ? 'background:linear-gradient(135deg,#065F46,#047857);color:#fff' : 'background:rgba(30,41,59,0.8);color:#94A3B8';
                            return `<button onclick="perfYears=${yrs}; perfDateFrom=getDateOffset(${yrs}*365); perfDateTo=''; renderPastPerformance(document.getElementById('resultsContainer'))"
                                class="flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-medium touch-btn"
                                style="${style}">${label}</button>`;
                        }).join('')}
                        <button onclick="perfYears=0; perfDateFrom=''; perfDateTo=''; renderPastPerformance(document.getElementById('resultsContainer'))"
                            class="flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-medium touch-btn"
                            style="${perfYears===0&&!perfDateFrom&&!perfDateTo ? 'background:linear-gradient(135deg,#065F46,#047857);color:#fff' : 'background:rgba(30,41,59,0.8);color:#94A3B8'}">All</button>
                    </div>
                </div>
            `;

            if (total === 0) {
                html += `<div class="mobile-card rounded-xl p-8 text-center">
                    <div class="text-4xl mb-3">🔍</div>
                    <div class="text-slate-300 font-semibold mb-2">No trades in this date range</div>
                    <div class="text-xs text-slate-500">Try a wider range or click "All"</div>
                </div>`;
                container.innerHTML = html;
                return;
            }

            html += `
                <!-- Summary stats -->
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="mobile-card rounded-xl p-4 text-center">
                        <div class="text-2xl font-bold mono" style="color:${winRateColor};">${s.win_rate}%</div>
                        <div class="text-xs text-slate-400 mt-1 uppercase tracking-wider">Win Rate</div>
                        <div class="text-xs text-slate-500 mt-1">${s.winning_trades}W / ${s.losing_trades}L</div>
                    </div>
                    <div class="mobile-card rounded-xl p-4 text-center">
                        <div class="text-2xl font-bold mono" style="color:${pnlColor};">${(s.total_pnl>=0?'+':'')}₹${s.total_pnl.toLocaleString()}</div>
                        <div class="text-xs text-slate-400 mt-1 uppercase tracking-wider">Total P&L</div>
                        <div class="text-xs text-slate-500 mt-1">${s.roi>=0?'+':''}${s.roi}% ROI on ₹${perfCapital.toLocaleString()}</div>
                    </div>
                    <div class="mobile-card rounded-xl p-4 text-center">
                        <div class="text-2xl font-bold mono" style="color:#10B981;">+${s.avg_win_pct}%</div>
                        <div class="text-xs text-slate-400 mt-1 uppercase tracking-wider">Avg Win</div>
                    </div>
                    <div class="mobile-card rounded-xl p-4 text-center">
                        <div class="text-2xl font-bold mono" style="color:#DC2626;">${s.avg_loss_pct}%</div>
                        <div class="text-xs text-slate-400 mt-1 uppercase tracking-wider">Avg Loss</div>
                    </div>
                    <div class="mobile-card rounded-xl p-4 text-center">
                        <div class="text-2xl font-bold mono" style="color:${pfColor};">${s.profit_factor}</div>
                        <div class="text-xs text-slate-400 mt-1 uppercase tracking-wider">Profit Factor</div>
                        <div class="text-xs text-slate-500 mt-1">&gt;1.5 = excellent</div>
                    </div>
                    <div class="mobile-card rounded-xl p-4 text-center">
                        <div class="text-2xl font-bold mono text-slate-300">${s.avg_holding_days}</div>
                        <div class="text-xs text-slate-400 mt-1 uppercase tracking-wider">Avg Hold (days)</div>
                    </div>
                </div>

                <!-- Outcome breakdown -->
                <div class="mobile-card rounded-xl p-4 mb-4">
                    <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Outcome Breakdown</div>
                    <div class="flex flex-wrap gap-2">
                        ${Object.entries(s.outcome_breakdown||{}).map(([k,v]) => {
                            const pct = Math.round(v/s.total_trades*100);
                            const col = k==='TARGET_HIT'?'#10B981':k==='STOP_LOSS'?'#DC2626':'#D97706';

                <!-- Search + sort -->

        // Display Radar tab - trades taken from trendline
        function displayPerformanceTracking() {
            const container = document.getElementById('resultsContainer');

            // Load from both localStorage (immediate) and radar_trades.json (persisted)
            const localTrades = JSON.parse(localStorage.getItem('radarTrades') || '[]');

            // Fetch radar_trades.json from server (updated by monitor workflow)
            fetch('./radar_trades.json', { cache: 'no-store' })
                .then(r => r.ok ? r.json() : [])
                .catch(() => [])
                .then(serverTrades => {
                    // Merge: server trades take priority (have latest status)
                    const merged = mergeRadarTrades(localTrades, serverTrades);
                    renderRadarTab(container, merged);
                });
        }

        function mergeRadarTrades(local, server) {
            if (!server || server.length === 0) return local;
            const merged = [...local];
            server.forEach(st => {
                const idx = merged.findIndex(lt => lt.ticker === st.ticker &&
                    lt.takenAt && st.placed_at &&
                    Math.abs(new Date(lt.takenAt) - new Date(st.placed_at)) < 86400000);
                if (idx >= 0) {
                    // Update status from server
                    if (st.status !== 'Open' && merged[idx].status === 'Open') {
                        merged[idx].status = st.status === 'Target Hit' ? 'Target Hit' :
                                             st.status === 'Stop Loss' ? 'Stop Loss' : merged[idx].status;
                        merged[idx].exitPrice = st.exit_price;
                        merged[idx].finalPnl = st.final_pnl_pct;
                    }
                    if (st.current_price) merged[idx].currentPrice = st.current_price;
                    if (st.current_pnl_pct !== undefined) merged[idx].currentPnl = st.current_pnl_pct;
                }
            });
            // Save merged back to localStorage
            localStorage.setItem('radarTrades', JSON.stringify(merged));
            return merged;
        }

        function renderRadarTab(container, trades) {
            if (!trades || trades.length === 0) {
                container.innerHTML = `
                    <div class="mobile-card rounded-xl p-8 text-center">
                        <div class="text-4xl mb-4">📡</div>
                        <div class="text-slate-300 font-semibold mb-2">Radar is Empty</div>
                        <div class="text-xs text-slate-500 mb-4">Go to Trendline tab and click "📥 Take Trade" on any stock to add it here.</div>
                        <button onclick="switchTab('trendline')" class="px-4 py-2 rounded-lg text-xs font-semibold touch-btn" style="background: linear-gradient(135deg, #065F46, #047857); color: #fff;">
                            Go to Trendline →
                        </button>
                    </div>
                `;
                return;
            }

            const open = trades.filter(t => t.status === 'Open');
            const closed = trades.filter(t => t.status !== 'Open');

            let html = `
                <div class="mobile-card rounded-xl p-4 mb-4">
                    <div class="grid grid-cols-3 gap-3 text-center">
                        <div>
                            <div class="text-2xl font-bold mono" style="color: #D97706;">${open.length}</div>
                            <div class="text-xs text-slate-400 uppercase tracking-wider">Open</div>
                        </div>
                        <div>
                            <div class="text-2xl font-bold mono" style="color: #047857;">${closed.filter(t=>t.status==='Target Hit').length}</div>
                            <div class="text-xs text-slate-400 uppercase tracking-wider">Target Hit</div>
                        </div>
                        <div>
                            <div class="text-2xl font-bold mono" style="color: #DC2626;">${closed.filter(t=>t.status==='Stop Loss').length}</div>
                            <div class="text-xs text-slate-400 uppercase tracking-wider">Stop Loss</div>
                        </div>
                    </div>
                </div>
            `;

            trades.forEach((trade, idx) => {
                const chartUrl = `https://in.tradingview.com/chart/?symbol=NSE:${trade.ticker}`;
                const takenDate = new Date(trade.takenAt).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: '2-digit' });
                const borderColor = trade.status === 'Open' ? '#D97706' : trade.status === 'Target Hit' ? '#047857' : '#DC2626';
                const statusColor = borderColor;
                let pnlDisplay = '';
                if (trade.status === 'Open' && trade.currentPnl !== undefined) {
                    const pnlColor = trade.currentPnl >= 0 ? '#10B981' : '#DC2626';
                    pnlDisplay = `<div class="text-xs mono mt-1" style="color: ${pnlColor};">Live P&L: ${trade.currentPnl >= 0 ? '+' : ''}${trade.currentPnl?.toFixed(2)}%</div>`;
                } else if (trade.finalPnl !== undefined) {
                    const pnlColor = trade.finalPnl >= 0 ? '#10B981' : '#DC2626';
                    pnlDisplay = `<div class="text-xs mono mt-1" style="color: ${pnlColor};">Final P&L: ${trade.finalPnl >= 0 ? '+' : ''}${trade.finalPnl?.toFixed(2)}%</div>`;
                }
                html += `
                    <div class="stock-card mb-4" style="border-left: 3px solid ${borderColor};">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <a href="${chartUrl}" target="_blank" class="text-lg font-bold text-slate-100 hover:text-blue-400">${trade.ticker}</a>
                                <div class="text-xs text-slate-500 mt-1">${takenDate} | ${trade.source || 'Manual'}</div>
                                ${pnlDisplay}
                            </div>
                            <span class="px-3 py-1 text-xs rounded-full font-semibold" style="background: ${borderColor}20; color: ${statusColor};">${trade.status}</span>
                        </div>
                        <div class="grid grid-cols-3 gap-2 mb-3">
                            <div>
                                <div class="text-xs text-slate-500 mb-1">Entry</div>
                                <div class="text-sm font-bold mono" style="color: #3B82F6;">₹${trade.entryTrigger?.toLocaleString()}</div>
                            </div>
                            <div>
                                <div class="text-xs text-slate-500 mb-1">Target</div>
                                <div class="text-sm font-bold mono" style="color: #10B981;">₹${trade.targetExit?.toLocaleString()}</div>
                            </div>
                            <div>
                                <div class="text-xs text-slate-500 mb-1">Stop</div>
                                <div class="text-sm font-bold mono" style="color: #DC2626;">₹${trade.stopLoss?.toLocaleString()}</div>
                            </div>
                        </div>
                        <div class="text-xs text-slate-500 mono mb-3">${trade.quantity || trade.qty || (trade.positionSize && trade.entryTrigger ? Math.floor(trade.positionSize / trade.entryTrigger) : 0)} shares | ₹${trade.positionSize?.toLocaleString() || 0} position</div>
                        <div class="flex space-x-2">
                            ${trade.status === 'Open' ? `
                            <button onclick="updateTradeStatus(${idx}, 'Target Hit')" class="flex-1 py-2 rounded-lg text-xs font-semibold touch-btn" style="background: rgba(4,120,87,0.2); color: #10B981;">✅ Target Hit</button>
                            <button onclick="updateTradeStatus(${idx}, 'Stop Loss')" class="flex-1 py-2 rounded-lg text-xs font-semibold touch-btn" style="background: rgba(220,38,38,0.2); color: #DC2626;">🛑 Stop Loss</button>
                            ` : ''}
                            <button onclick="removeTrade(${idx})" class="py-2 px-3 rounded-lg text-xs touch-btn" style="background: rgba(100,116,139,0.2); color: #94A3B8;">🗑️</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
        window.updateTradeStatus = function(idx, status) {
            const trades = JSON.parse(localStorage.getItem('radarTrades') || '[]');
            trades[idx].status = status;
            trades[idx].closedAt = new Date().toISOString();
            localStorage.setItem('radarTrades', JSON.stringify(trades));
            displayPerformanceTracking();
        };

        // Remove trade from radar
        window.removeTrade = function(idx) {
            const trades = JSON.parse(localStorage.getItem('radarTrades') || '[]');
            trades.splice(idx, 1);
            localStorage.setItem('radarTrades', JSON.stringify(trades));
            displayPerformanceTracking();
        };

        // ─── NIFTY 500 STOCK LIST (symbol + company name) ───────────────────────
        const NIFTY500_STOCKS = [];
        (async function loadNifty500() {
            // Try multiple paths — works both locally and on GitHub Pages
            const paths = ['./Stock List.csv', 'Stock List.csv', './ind_nifty500list.csv', 'ind_nifty500list.csv'];
            let loaded = false;
            for (const path of paths) {
                try {
                    console.log(`Trying to load from: ${path}`);
                    const resp = await fetch(path, { cache: 'no-store' });
                    if (!resp.ok) {
                        console.warn(`Failed to fetch ${path}: ${resp.status}`);
                        continue;
                    }
                    const text = await resp.text();
                    console.log(`Fetched ${text.length} bytes from ${path}`);
                    const lines = text.trim().split('\n').slice(1); // skip header
                    console.log(`Processing ${lines.length} lines`);
                    lines.forEach(line => {
                        const parts = line.split(',');
                        if (parts.length >= 3) {
                            const companyName = parts[0].trim().replace(/^"|"$/g, '');
                            const symbol = parts[2].trim().replace(/^"|"$/g, '');
                            if (symbol) NIFTY500_STOCKS.push({ symbol, companyName });
                        }
                    });
                    console.log(`✅ Loaded ${NIFTY500_STOCKS.length} stocks from ${path}`);
                    loaded = true;
                    break;
                } catch(e) {
                    console.warn(`Could not load from ${path}:`, e);
                }
            }
            if (!loaded) console.error('❌ Could not load Stock List from any path');
        })();

        // ─── ADD STOCK MODAL ─────────────────────────────────────────────────────
        let addStockContext = 'trendline'; // which tab triggered the modal

        window.openAddStockModal = function(context) {

        // Search input handler — match from 3rd character
        // (wired up inside the existing DOMContentLoaded below via setupEventListeners)
        function setupAddStockSearch() {
            const searchInput = document.getElementById('addStockSearch');
            if (!searchInput) return;
            searchInput.addEventListener('input', function() {
                const q = this.value.trim().toUpperCase();
                const dropdown = document.getElementById('addStockDropdown');
                if (q.length < 3) {
                    dropdown.innerHTML = '';
                    dropdown.classList.add('hidden');
                    return;
                }
                const matches = NIFTY500_STOCKS.filter(s =>
                    s.symbol.includes(q) || s.companyName.toUpperCase().includes(q)
                ).slice(0, 15);
                if (matches.length === 0) {
                    dropdown.innerHTML = '<div class="px-4 py-3 text-xs text-slate-400">No matches found</div>';
                    dropdown.classList.remove('hidden');
                    return;
                }
                dropdown.innerHTML = matches.map(s => `
                    <div class="px-4 py-3 cursor-pointer hover:bg-slate-700 border-b border-slate-700 last:border-0"
                         onclick="selectAddStock('${s.symbol}', '${s.companyName.replace(/'/g, "\\'")}')">
                        <div class="text-sm font-bold text-slate-100">${s.symbol}</div>
                        <div class="text-xs text-slate-400">${s.companyName}</div>
                    </div>
                `).join('');
                dropdown.classList.remove('hidden');
            });
        }

        // Search input handler — match from 3rd character
        window.selectAddStock = function(symbol, companyName) {
            document.getElementById('addStockSearch').value = `${symbol} — ${companyName}`;
            document.getElementById('addStockDropdown').classList.add('hidden');
            document.getElementById('addStockSelectedSymbol').value = symbol;
            document.getElementById('addStockSelectedCompany').value = companyName;
            document.getElementById('addStockForm').classList.remove('hidden');
        };

        window.saveManualStock = function() {
            const symbol = document.getElementById('addStockSelectedSymbol').value;
            const companyName = document.getElementById('addStockSelectedCompany').value;
            const currentPrice = parseFloat(document.getElementById('addStockCurrentPrice').value);
            const entryTrigger = parseFloat(document.getElementById('addStockEntryTrigger').value);
            const targetExit = parseFloat(document.getElementById('addStockTargetExit').value);
            const stopLoss = parseFloat(document.getElementById('addStockStopLoss').value);
            const positionSize = parseFloat(document.getElementById('addStockPosition').value);

            if (!symbol || isNaN(currentPrice) || isNaN(entryTrigger) || isNaN(targetExit) || isNaN(stopLoss) || isNaN(positionSize)) {
                alert('Please fill all fields before saving.');
                return;
            }

            const manualStocks = JSON.parse(localStorage.getItem('manualStocks') || '[]');
            manualStocks.unshift({ symbol, companyName, currentPrice, entryTrigger, targetExit, stopLoss, positionSize, addedAt: new Date().toISOString() });
            localStorage.setItem('manualStocks', JSON.stringify(manualStocks));

            closeAddStockModal();

            // Refresh opportunities count (volume + trendline + manual)
            const volumeCount = screeningData?.volume_breakout_stocks?.length || 0;
            const updatedManual = JSON.parse(localStorage.getItem('manualStocks') || '[]');
            fetch('./trendline_screen.json', { cache: 'no-store' })
                .then(r => r.ok ? r.json() : [])
                .catch(() => [])
                .then(tl => {
                    const tlCount = Array.isArray(tl) ? tl.length : 0;
                    document.getElementById('totalOpportunities').textContent =
                        (volumeCount + tlCount + updatedManual.length).toLocaleString();
                });

            // Switch to trendline tab to show the saved stock
            switchTab('trendline');
        };

        window.removeManualStock = function(idx) {
            const manualStocks = JSON.parse(localStorage.getItem('manualStocks') || '[]');
            manualStocks.splice(idx, 1);
            localStorage.setItem('manualStocks', JSON.stringify(manualStocks));
            switchTab('trendline');
        };

        window.takeManualTrade = function(idx) {
            const manualStocks = JSON.parse(localStorage.getItem('manualStocks') || '[]');
            const ms = manualStocks[idx];
            if (!ms) return;
            const qty = Math.floor(ms.positionSize / ms.entryTrigger);
            const trades = JSON.parse(localStorage.getItem('radarTrades') || '[]');
            const exists = trades.find(t => t.ticker === ms.symbol && t.status === 'Open');
            if (!exists) {
                trades.push({
                    ticker: ms.symbol,
                    entryTrigger: ms.entryTrigger,
                    targetExit: ms.targetExit,
                    stopLoss: ms.stopLoss,
                    positionSize: ms.positionSize,
                    quantity: qty,
                    takenAt: new Date().toISOString(),
                    status: 'Open',
                    source: 'Manual'
                });
                localStorage.setItem('radarTrades', JSON.stringify(trades));
            }
            placeAngelOrder(ms.symbol, 'BUY', qty, ms.entryTrigger, ms.stopLoss, ms.targetExit, 'Manual');
        };

    </script>
