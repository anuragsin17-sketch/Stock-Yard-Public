    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
        }
        .mono {
            font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', 'Monaco', monospace;
        }
        body {
            -webkit-text-size-adjust: 100%;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: #0A0E14;
        }
        .mobile-card {
            background: rgba(20, 25, 35, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
        }
        .status-dot {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .touch-btn {
            min-height: 48px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }
        .touch-btn:active {
            transform: scale(0.98);
            background: rgba(16, 79, 87, 0.8);
        }
        .scroll-container {
            -webkit-overflow-scrolling: touch;
            overflow-scrolling: touch;
        }
        .pill-tab {
            background: rgba(20, 25, 35, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            transition: all 0.3s ease;
            padding: 12px 20px;
        }
        .pill-tab.active {
            background: linear-gradient(135deg, #065F46, #047857);
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 24px rgba(4, 120, 87, 0.25);
        }
        .stock-card {
            background: rgba(20, 25, 35, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            transition: all 0.2s ease;
            padding: 20px;
        }
        .stock-card:active {
            transform: translateY(-2px);
            border-color: rgba(4, 120, 87, 0.3);
        }
        .price-indicator {
            background: linear-gradient(135deg, #065F46, #047857);
            border-radius: 12px;
            padding: 6px 12px;
            font-weight: 600;
        }
        .signal-badge {
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .position-filter-btn {
            background: rgba(20, 25, 35, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }
        .position-filter-btn.active {
            background: linear-gradient(135deg, #065F46, #047857);
            border-color: rgba(16, 185, 129, 0.3);
        }
        .position-filter-btn:hover {
            border-color: rgba(4, 120, 87, 0.3);
        }
    </style>

            setupEventListeners();

            // Handle stock highlight deep link
            if (stockParam) {
                setTimeout(() => {
                    highlightStock(stockParam);
                }, 1000);
            }

            // Handle trade confirmation deep link from Telegram
            // URL: ?confirm=AXISBANK&price=1031&qty=48&stop=949&target=1237&source=Trendline
            if (confirmParam) {
                const price = parseFloat(urlParams.get('price') || '0');
                const qty = parseInt(urlParams.get('qty') || '0');
                const stop = parseFloat(urlParams.get('stop') || '0');
                const target = parseFloat(urlParams.get('target') || '0');
                const source = urlParams.get('source') || 'Trendline';

                // Switch to trendline tab and show confirmation after data loads
                setTimeout(() => {
                    switchTab('trendline');

                    // Show confirmation dialog
                    const confirmed = confirm(
                        `📥 CONFIRM TRADE - ANGEL ONE\n\n` +
                        `Stock: ${confirmParam}\n` +
                        `Action: BUY (LIMIT)\n` +
                        `Entry Price: ₹${price.toFixed(2)}\n` +
                        `Quantity: ${qty} shares\n` +
                        `Stop Loss: ₹${stop.toFixed(2)} (Monthly Close)\n` +
                        `Target: ₹${target.toFixed(2)} (+20%)\n\n` +
                        `⚠️ This will place a REAL LIMIT ORDER in Angel One.\n` +
                        `Click OK to confirm.`
                    );

                    if (confirmed) {
                        // Add to Radar
                        const trades = JSON.parse(localStorage.getItem('radarTrades') || '[]');
                        const exists = trades.find(t => t.ticker === confirmParam && t.status === 'Open');
                        if (!exists) {
                            trades.push({
                                ticker: confirmParam,
                                entryTrigger: price,
                                targetExit: target,
                                stopLoss: stop,
                                positionSize: qty * price,
                                quantity: qty,
                                takenAt: new Date().toISOString(),
                                status: 'Open',
                                source: source
                            });
                            localStorage.setItem('radarTrades', JSON.stringify(trades));
                        }

                        // Place order via Angel One
                        placeAngelOrder(confirmParam, 'BUY', qty, price, stop, target, source);
                    } else {
                        alert(`❌ Trade cancelled for ${confirmParam}`);
                    }

                    // Clean URL (remove params after handling)
                    window.history.replaceState({}, document.title, window.location.pathname);
                }, 1500);
            }

        // Fetch live prices for priority stocks (AT ENTRY or radar status)
        async function fetchLivePricesForPriorityStocks() {
            if (!screeningData) return;
            
            console.log('🔴 Fetching live prices for priority stocks...');
            
            // Collect all priority stocks (AT ENTRY or radar status)
            const priorityStocks = [];
            
            // Check volume breakout stocks
            screeningData.volume_breakout_stocks?.forEach(stock => {
                if (stock.radar_status === 'Active' || stock.near_breakout_low) {
                    priorityStocks.push({
                        symbol: stock.symbol,
                        type: 'volume',
                        entryPrice: stock.radar_trigger_price,
                        currentPrice: stock.current_price
                    });
                }
            });
            
            if (priorityStocks.length === 0) {
                console.log('📊 No priority stocks found for live price updates');
                return;
            }
            
            console.log(`🎯 Updating live prices for ${priorityStocks.length} priority stocks`);
            
            // Fetch live prices in batches to avoid rate limiting
            const batchSize = 5;
            for (let i = 0; i < priorityStocks.length; i += batchSize) {
                const batch = priorityStocks.slice(i, i + batchSize);
                
                await Promise.all(batch.map(async (stock) => {
                    try {
                        const response = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${stock.symbol}.NS`);
                        if (response.ok) {
                            const data = await response.json();
                            const livePrice = data.chart.result[0].meta.regularMarketPrice;
                            
                            // Update the stock data in screeningData
                            updateStockPrice(stock.symbol, stock.type, livePrice);
                            
                            console.log(`📈 ${stock.symbol}: ₹${livePrice.toFixed(2)} (was ₹${stock.currentPrice})`);
                        }
                    } catch (error) {
                        console.warn(`Failed to fetch live price for ${stock.symbol}:`, error);
                    }
                }));
                
                // Small delay between batches to avoid rate limiting
                if (i + batchSize < priorityStocks.length) {
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
            }
            
            // Update UI with new prices
            updateUI();
            console.log('✅ Live price updates completed');
        }
        
        // Update stock price in screeningData
        function updateStockPrice(symbol, type, newPrice) {
            const stockArrays = {
                'volume': 'volume_breakout_stocks'
            };
            
            const arrayName = stockArrays[type];
            if (!arrayName || !screeningData[arrayName]) return;
            
            const stock = screeningData[arrayName].find(s => s.symbol === symbol);
            if (stock) {
                const oldPrice = stock.current_price;
                stock.current_price = newPrice;
                
                // Recalculate distance percentages
                if (type === 'volume' && stock.radar_trigger_price) {
                    stock.distance_to_trigger_abs_percent = Math.abs(((newPrice - stock.radar_trigger_price) / stock.radar_trigger_price) * 100);
                }
                
                // Update change indicator
                const change = ((newPrice - oldPrice) / oldPrice) * 100;
                stock.live_change_percent = change;
                stock.is_live_updated = true;
            }
        }
        
        // Fetch real-time NIFTY and SENSEX data
        async function fetchIndexData() {
            try {
                async function fetchWithProxy(symbol) {
                    const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`;
                    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`;
                    const resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(5000) });
                    if (!resp.ok) throw new Error('proxy failed');
                    return await resp.json();
                }

                const [niftyData, sensexData] = await Promise.all([
                    fetchWithProxy('%5ENSEI'),
                    fetchWithProxy('%5EBSESN')
                ]);

                function updateIndex(data, elementId) {
                    const meta = data.chart.result[0].meta;
                    const price = meta.regularMarketPrice;
                    const prevClose = meta.previousClose || meta.chartPreviousClose || meta.regularMarketPreviousClose;
                    const el = document.getElementById(elementId);
                    if (prevClose && prevClose > 0) {
                        const pct = ((price - prevClose) / prevClose) * 100;
                        el.textContent = `${price.toFixed(0)} (${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%)`;
                        el.className = `text-xs font-semibold mono ${pct >= 0 ? 'text-emerald-400' : 'text-red-400'}`;
                    } else {
                        el.textContent = `${price.toFixed(0)}`;
                        el.className = 'text-xs font-semibold mono text-emerald-400';
                    }
                }

                updateIndex(niftyData, 'nifty50Price');
                updateIndex(sensexData, 'sensexPrice');

            } catch (error) {
                console.warn('Index data fetch failed:', error);
                document.getElementById('nifty50Price').textContent = 'N/A';
                document.getElementById('sensexPrice').textContent = 'N/A';
            }
        }
        
        // Load data (try fetch first, fallback to embedded)
        async function loadData() {
            console.log('📱 Loading data...');
            hideError();
            
            try {
                // Try to fetch updated data first
                const response = await fetch('./data.json', {
                    method: 'GET',
                    headers: { 'Cache-Control': 'no-cache' },
                    cache: 'no-store'
                });
                
                if (response.ok) {
                    const text = await response.text();
                    const fetchedData = JSON.parse(text.trim().replace(/^\uFEFF/, ''));
                    
                    if (fetchedData && fetchedData.timestamp) {
                        console.log('✅ Fetched fresh data from server');
                        screeningData = fetchedData;
                        updateUI();
                        updateStatus(true);
                        return;
                    }
                }
            } catch (error) {
                console.log('⚠️ Fetch failed, using embedded data:', error.message);
            }
            
            // Use embedded data as reliable fallback
            console.log('📦 Using embedded live data');
            screeningData = LIVE_DATA;
            updateUI();
            updateStatus(true);
        }

        // Place order via GitHub Actions (credentials stay in GitHub Secrets)
        async function placeAngelOrder(symbol, action, qty, price, stopLoss, target, source) {
            // GitHub PAT stored in localStorage (user sets it once)
            const pat = localStorage.getItem('github_pat');
            const repo = 'anuragsin17-sketch/Stock-Yard';

            if (!pat) {
                const userPat = prompt(
                    '🔑 Enter your GitHub Personal Access Token (PAT)\n\n' +
                    'This is stored locally in your browser only.\n' +
                    'Create one at: github.com/settings/tokens\n' +
                    'Required scope: repo (for workflow dispatch)\n\n' +
                    'PAT:'
                );
                if (!userPat) {
                    alert('❌ PAT required to place orders. Trade added to Radar only.');
                    switchTab('performance');
                    return;
                }
                localStorage.setItem('github_pat', userPat.trim());
            }

            const storedPat = localStorage.getItem('github_pat');

            try {
                // Show loading
                const loadingMsg = `⏳ Placing order for ${symbol}...`;
                console.log(loadingMsg);

                const response = await fetch(
                    `https://api.github.com/repos/${repo}/dispatches`,
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': `token ${storedPat}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            event_type: 'place_trade',
                            client_payload: {
                                action: action,
                                symbol: symbol,
                                token: '',
                                quantity: qty.toString(),
                                price: price.toFixed(2),
                                stop_loss: stopLoss.toFixed(2),
                                target: target.toFixed(2),
                                source: source
                            }
                        })
                    }
                );

                if (response.status === 204) {
                    alert(
                        `✅ Order dispatched to Angel One!\n\n` +
                        `${action} ${qty} shares of ${symbol} @ ₹${price.toFixed(2)}\n\n` +
                        `GitHub Actions is processing your order.\n` +
                        `You will receive a Telegram notification when done.\n\n` +
                        `Check Actions tab for status.`
                    );
                    switchTab('performance');
                } else if (response.status === 401) {
                    localStorage.removeItem('github_pat');
                    alert('❌ Invalid PAT token. Please try again.');
                } else {
                    const err = await response.text();
                    alert(`❌ Failed to dispatch order: ${response.status}\n${err}`);
                }

            } catch (error) {
                alert(`❌ Network error: ${error.message}\nTrade added to Radar only.`);
                switchTab('performance');
            }
        }

        // Take Trade from Volume tab - manual only
        window.takeVolumeTrade = function(symbol, companyName) {
            const entryEl = document.getElementById(`vol_entry_${symbol}`);
            const posEl = document.getElementById(`vol_pos_${symbol}`);
            const entry = parseFloat(entryEl ? entryEl.value : 0);
            const positionSize = parseFloat(posEl ? posEl.value : 50000);

            if (!entry || entry <= 0) {
                alert('Please set a valid Entry Trigger price first');
                return;
            }

            const target = parseFloat((entry * 1.20).toFixed(2));
            const stopLoss = parseFloat((entry * 0.92).toFixed(2));
            const qty = Math.floor(positionSize / entry);

            // Confirmation dialog
            const confirmed = confirm(
                `📥 CONFIRM TRADE - ANGEL ONE\n\n` +
                `Stock: ${symbol}\n` +
                `Company: ${companyName}\n` +
                `Action: BUY (LIMIT)\n` +
                `Entry Price: ₹${entry.toFixed(2)}\n` +
                `Quantity: ${qty} shares\n` +
                `Position Size: ₹${positionSize.toLocaleString()}\n` +
                `Stop Loss: ₹${stopLoss.toFixed(2)} (Monthly Close)\n` +
                `Target: ₹${target.toFixed(2)} (+20%)\n\n` +
                `⚠️ This will place a REAL LIMIT ORDER in Angel One.\n` +
                `Click OK to confirm.`
            );

            if (!confirmed) return;

            // Add to Radar
            const trades = JSON.parse(localStorage.getItem('radarTrades') || '[]');
            const exists = trades.find(t => t.ticker === symbol && t.status === 'Open');
            if (!exists) {
                trades.push({
                    ticker: symbol,
                    companyName: companyName,
                    entryTrigger: entry,
                    targetExit: target,
                    stopLoss: stopLoss,
                    positionSize: positionSize,
                    quantity: qty,
                    takenAt: new Date().toISOString(),
                    status: 'Open',
                    source: 'Volume'
                });
                localStorage.setItem('radarTrades', JSON.stringify(trades));
            }

            // Trigger Angel One order via GitHub Actions
            placeAngelOrder(symbol, 'BUY', qty, entry, stopLoss, target, 'Volume');
        };

        // Display Radar tab - trades taken from trendline
        function displayPerformanceTracking() {
            const container = document.getElementById('resultsContainer');

            // Load from both localStorage (immediate) and radar_trades.json (persisted)
            const localTrades = JSON.parse(localStorage.getItem('radarTrades') || '[]');

            // Fetch radar_trades.json from server (updated by monitor workflow)
            fetch('./radar_trades.json', { cache: 'no-store' })
                .then(r => r.ok ? r.json() : [])
                .catch(() => [])
                .then(serverTrades => {
                    // Merge: server trades take priority (have latest status)
                    const merged = mergeRadarTrades(localTrades, serverTrades);
                    renderRadarTab(container, merged);
                });
        }

        function mergeRadarTrades(local, server) {
            if (!server || server.length === 0) return local;
            const merged = [...local];
            server.forEach(st => {
                const idx = merged.findIndex(lt => lt.ticker === st.ticker &&
                    lt.takenAt && st.placed_at &&
                    Math.abs(new Date(lt.takenAt) - new Date(st.placed_at)) < 86400000);
                if (idx >= 0) {
                    // Update status from server
                    if (st.status !== 'Open' && merged[idx].status === 'Open') {
                        merged[idx].status = st.status === 'Target Hit' ? 'Target Hit' :
                                             st.status === 'Stop Loss' ? 'Stop Loss' : merged[idx].status;
                        merged[idx].exitPrice = st.exit_price;
                        merged[idx].finalPnl = st.final_pnl_pct;
                    }
                    if (st.current_price) merged[idx].currentPrice = st.current_price;
                    if (st.current_pnl_pct !== undefined) merged[idx].currentPnl = st.current_pnl_pct;
                }
            });
            // Save merged back to localStorage
            localStorage.setItem('radarTrades', JSON.stringify(merged));
            return merged;
        }

        function renderRadarTab(container, trades) {

                container.innerHTML = `

                `;

            const open = trades.filter(t => t.status === 'Open');
            const closed = trades.filter(t => t.status !== 'Open');

            let html = `

            trades.forEach((trade, idx) => {

                const borderColor = trade.status === 'Open' ? '#D97706' : trade.status === 'Target Hit' ? '#047857' : '#DC2626';
                const statusColor = borderColor;

                if (trade.status === 'Open' && trade.currentPnl !== undefined) {
                    const pnlColor = trade.currentPnl >= 0 ? '#10B981' : '#DC2626';
                    pnlDisplay = `<div class="text-xs mono mt-1" style="color: ${pnlColor};">Live P&L: ${trade.currentPnl >= 0 ? '+' : ''}${trade.currentPnl?.toFixed(2)}%</div>`;
                } else if (trade.finalPnl !== undefined) {
                    const pnlColor = trade.finalPnl >= 0 ? '#10B981' : '#DC2626';
                    pnlDisplay = `<div class="text-xs mono mt-1" style="color: ${pnlColor};">Final P&L: ${trade.finalPnl >= 0 ? '+' : ''}${trade.finalPnl?.toFixed(2)}%</div>`;
                }
                html += `

                                <a href="${chartUrl}" target="_blank" class="text-lg font-bold text-slate-100 hover:text-blue-400">${trade.ticker}</a>
                                <div class="text-xs text-slate-500 mt-1">${takenDate} | ${trade.source || 'Manual'}</div>
                                ${pnlDisplay}

                        <div class="flex space-x-2">

                            <button onclick="updateTradeStatus(${idx}, 'Stop Loss')" class="flex-1 py-2 rounded-lg text-xs font-semibold touch-btn" style="background: rgba(220,38,38,0.2); color: #DC2626;">🛑 Stop Loss</button>
                            ` : ''}
                            <button onclick="removeTrade(${idx})" class="py-2 px-3 rounded-lg text-xs touch-btn" style="background: rgba(100,116,139,0.2); color: #94A3B8;">🗑️</button>
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }
        window.updateTradeStatus = function(idx, status) {
            const trades = JSON.parse(localStorage.getItem('radarTrades') || '[]');
            trades[idx].status = status;

        // ─── NIFTY 500 STOCK LIST (symbol + company name) ───────────────────────
        const NIFTY500_STOCKS = [];
        (async function loadNifty500() {
            try {
                const resp = await fetch('./ind_nifty500list.csv', { cache: 'no-store' });
                const text = await resp.text();
                const lines = text.trim().split('\n').slice(1); // skip header
                lines.forEach(line => {
                    const parts = line.split(',');
                    if (parts.length >= 3) {
                        const companyName = parts[0].trim().replace(/^"|"$/g, '');
                        const symbol = parts[2].trim().replace(/^"|"$/g, '');
                        if (symbol) NIFTY500_STOCKS.push({ symbol, companyName });
                    }
                });
            } catch(e) {
                console.warn('Could not load Nifty 500 list:', e);
            }
        })();

        // Search input handler — match from 3rd character
        // (wired up inside the existing DOMContentLoaded below via setupEventListeners)
        function setupAddStockSearch() {
            const searchInput = document.getElementById('addStockSearch');
            if (!searchInput) return;
            searchInput.addEventListener('input', function() {
                const q = this.value.trim().toUpperCase();
                const dropdown = document.getElementById('addStockDropdown');
                if (q.length < 3) {
                    dropdown.innerHTML = '';
                    dropdown.classList.add('hidden');
                    return;
                }
                const matches = NIFTY500_STOCKS.filter(s =>
                    s.symbol.includes(q) || s.companyName.toUpperCase().includes(q)
                ).slice(0, 15);
                if (matches.length === 0) {
                    dropdown.innerHTML = '<div class="px-4 py-3 text-xs text-slate-400">No matches found</div>';
                    dropdown.classList.remove('hidden');
                    return;
                }
                dropdown.innerHTML = matches.map(s => `
                    <div class="px-4 py-3 cursor-pointer hover:bg-slate-700 border-b border-slate-700 last:border-0"
                         onclick="selectAddStock('${s.symbol}', '${s.companyName.replace(/'/g, "\\'")}')">
                        <div class="text-sm font-bold text-slate-100">${s.symbol}</div>
                        <div class="text-xs text-slate-400">${s.companyName}</div>

        // Search input handler — match from 3rd character

            document.getElementById('addStockSearch').value = `${symbol} — ${companyName}`;
            document.getElementById('addStockDropdown').classList.add('hidden');

        window.saveManualStock = function() {
            const symbol = document.getElementById('addStockSelectedSymbol').value;
            const companyName = document.getElementById('addStockSelectedCompany').value;
            const currentPrice = parseFloat(document.getElementById('addStockCurrentPrice').value);
            const entryTrigger = parseFloat(document.getElementById('addStockEntryTrigger').value);
            const targetExit = parseFloat(document.getElementById('addStockTargetExit').value);
            const stopLoss = parseFloat(document.getElementById('addStockStopLoss').value);
            const positionSize = parseFloat(document.getElementById('addStockPosition').value);

            if (!symbol || isNaN(currentPrice) || isNaN(entryTrigger) || isNaN(targetExit) || isNaN(stopLoss) || isNaN(positionSize)) {
                alert('Please fill all fields before saving.');
                return;
            }

            const manualStocks = JSON.parse(localStorage.getItem('manualStocks') || '[]');
            manualStocks.unshift({ symbol, companyName, currentPrice, entryTrigger, targetExit, stopLoss, positionSize, addedAt: new Date().toISOString() });
            localStorage.setItem('manualStocks', JSON.stringify(manualStocks));

            closeAddStockModal();

            // Refresh opportunities count (volume + trendline + manual)
            const volumeCount = screeningData?.volume_breakout_stocks?.length || 0;
            const updatedManual = JSON.parse(localStorage.getItem('manualStocks') || '[]');
            fetch('./trendline_screen.json', { cache: 'no-store' })
                .then(r => r.ok ? r.json() : [])
                .catch(() => [])
                .then(tl => {
                    const tlCount = Array.isArray(tl) ? tl.length : 0;

                        (volumeCount + tlCount + updatedManual.length).toLocaleString();

            switchTab('trendline');

            const manualStocks = JSON.parse(localStorage.getItem('manualStocks') || '[]');
            manualStocks.splice(idx, 1);
            localStorage.setItem('manualStocks', JSON.stringify(manualStocks));
            switchTab('trendline');
        };

        window.takeManualTrade = function(idx) {
            const manualStocks = JSON.parse(localStorage.getItem('manualStocks') || '[]');
            const ms = manualStocks[idx];
            if (!ms) return;
            const qty = Math.floor(ms.positionSize / ms.entryTrigger);
            const trades = JSON.parse(localStorage.getItem('radarTrades') || '[]');
            const exists = trades.find(t => t.ticker === ms.symbol && t.status === 'Open');
            if (!exists) {
                trades.push({
                    ticker: ms.symbol,
                    entryTrigger: ms.entryTrigger,
                    targetExit: ms.targetExit,
                    stopLoss: ms.stopLoss,
                    positionSize: ms.positionSize,
                    quantity: qty,
                    takenAt: new Date().toISOString(),
                    status: 'Open',
                    source: 'Manual'
                });
                localStorage.setItem('radarTrades', JSON.stringify(trades));
            }
            placeAngelOrder(ms.symbol, 'BUY', qty, ms.entryTrigger, ms.stopLoss, ms.targetExit, 'Manual');
        };
