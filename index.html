    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
        }
        .mono {
            font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', 'Monaco', monospace;
        }
        body {
            -webkit-text-size-adjust: 100%;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: #0A0E14;
        }
        .mobile-card {
            background: rgba(20, 25, 35, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
        }
        .status-dot {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .touch-btn {
            min-height: 48px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }
        .touch-btn:active {
            transform: scale(0.98);
            background: rgba(16, 79, 87, 0.8);
        }
        .scroll-container {
            -webkit-overflow-scrolling: touch;
            overflow-scrolling: touch;
        }
        .pill-tab {
            background: rgba(20, 25, 35, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            transition: all 0.3s ease;
            padding: 12px 20px;
        }
        .pill-tab.active {
            background: linear-gradient(135deg, #065F46, #047857);
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 24px rgba(4, 120, 87, 0.25);
        }
        .stock-card {
            background: rgba(20, 25, 35, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            transition: all 0.2s ease;
            padding: 20px;
        }
        .stock-card:active {
            transform: translateY(-2px);
            border-color: rgba(4, 120, 87, 0.3);
        }
        .price-indicator {
            background: linear-gradient(135deg, #065F46, #047857);
            border-radius: 12px;
            padding: 6px 12px;
            font-weight: 600;
        }
        .signal-badge {
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
    </style>
</head>

        // Setup event listeners
        function setupEventListeners() {

                this.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg><span class="text-xs ml-1">Loading...</span>';
                
                loadData().finally(() => {
                    this.disabled = false;
                    this.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg><span class="text-xs ml-1">Refresh</span>';

            document.getElementById('wpatTab').addEventListener('click', () => switchTab('wpattern'));
            document.getElementById('elliotTab').addEventListener('click', () => switchTab('elliott'));
            document.getElementById('performanceTab').addEventListener('click', () => switchTab('performance'));
        }
        
        // Load data (try fetch first, fallback to embedded)
        async function loadData() {
            console.log('📱 Loading data...');
            hideError();
            
            try {
                // Try to fetch updated data first
                const response = await fetch('./data.json', {
                    method: 'GET',
                    headers: { 'Cache-Control': 'no-cache' },
                    cache: 'no-store'
                });
                
                if (response.ok) {
                    const text = await response.text();
                    const fetchedData = JSON.parse(text.trim().replace(/^\uFEFF/, ''));
                    
                    if (fetchedData && fetchedData.timestamp) {
                        console.log('✅ Fetched fresh data from server');
                        screeningData = fetchedData;
                        updateUI();
                        updateStatus(true);
                        return;
                    }
                }
            } catch (error) {
                console.log('⚠️ Fetch failed, using embedded data:', error.message);
            }
            
            // Use embedded data as reliable fallback
            console.log('📦 Using embedded live data');
            screeningData = LIVE_DATA;
            updateUI();
            updateStatus(true);
        }

        // Update UI with loaded data

            if (!screeningData) return;
            
            // Update stats
            const total = screeningData.diagnostics?.total_stocks_processed || 0;
            const opportunities = (screeningData.golden_stocks?.length || 0) +

                               (screeningData.volume_breakout_stocks?.length || 0) + 
                               (screeningData.w_pattern_stocks?.length || 0) +
                               (screeningData.elliott_wave_stocks?.length || 0);
            
            document.getElementById('totalStocks').textContent = total.toLocaleString();
            document.getElementById('totalOpportunities').textContent = opportunities.toLocaleString();
            
            // Update NIFTY 50 and SENSEX (placeholder values - replace with actual API if available)
            document.getElementById('nifty50Price').textContent = '24,500';
            document.getElementById('sensexPrice').textContent = '80,250';

                document.getElementById('lastSync').textContent = date.toLocaleTimeString('en-IN', {

            switchTab(currentTab);

        // Switch between tabs
        function switchTab(tab) {
            currentTab = tab;
            
            // Update tab buttons with new pill design
            document.querySelectorAll('.pill-tab').forEach(btn => {
                btn.classList.remove('active');
                btn.classList.add('text-slate-400');
            });
            
            const activeBtn = document.getElementById(tab === 'golden' ? 'goldenTab' : 
                                                   tab === 'darvas' ? 'darvasTab' :
                                                   tab === 'volume' ? 'volTab' : 
                                                   tab === 'wpattern' ? 'wpatTab' : 
                                                   tab === 'elliott' ? 'elliotTab' : 'performanceTab');
            activeBtn.classList.add('active');
            activeBtn.classList.remove('text-slate-400');
            
            // Update results
            displayResults(tab);

                        <div class="text-xs text-slate-500 mono">Target: ₹${stock.neckline_peak_price.toLocaleString()}</div>
                        <div class="text-xs text-slate-500 mono">Lower Trough: ${stock.lower_trough_date} at ₹${stock.lower_trough_price.toLocaleString()}</div>
                        ${wpatVerticalLine}
                        <div class="text-xs text-slate-500 mono">52W: ₹${stock.week_52_low.toLocaleString()} - ₹${stock.week_52_high.toLocaleString()}</div>
                        <div class="text-xs mono mt-1" style="color: #D97706;">Radar Trigger: ₹${stock.radar_trigger_price.toLocaleString()}</div>
                        <div class="mt-2 flex space-x-2">${radarStatus}${priorityBadge ? ' ' + priorityBadge : ''}</div>
                    `;
                    break;
                case 'elliott':
                    // Add priority badge for Elliott Wave setups
                    if (stock.setup_quality === 'Excellent') {
                        priorityBadge = '<span class="px-3 py-1.5 text-xs rounded-full mono tracking-wide" style="background: rgba(180, 83, 9, 0.2); color: #D97706;">HIGH CONVICTION</span>';
                    } else if (stock.setup_quality === 'Good') {
                        priorityBadge = '<span class="px-3 py-1.5 text-xs rounded-full mono tracking-wide" style="background: rgba(4, 120, 87, 0.2); color: #047857;">VALIDATED SETUP</span>';
                    }
                    
                    // Add vertical line price if available
                    const elliottVerticalLine = stock.vertical_line_price ? 
                        `<div class="text-xs mono" style="color: #06B6D4;">Vertical Line: ₹${stock.vertical_line_price.toLocaleString()}</div>` : '';
                    
                    details = `
                        <div class="text-xs text-slate-400 mb-1">${stock.retracement_percent}% Wave 2 Retracement</div>
                        <div class="text-lg font-bold mono" style="color: #6366F1;">₹${stock.current_price.toLocaleString()}</div>
                        <div class="text-xs text-slate-500 mono">Golden Pocket: ₹${stock.golden_pocket_low.toLocaleString()} - ₹${stock.golden_pocket_high.toLocaleString()}</div>
                        <div class="text-xs text-slate-500 mono">Wave 1: ${stock.wave1_low_date} to ${stock.wave1_high_date}</div>
                        ${elliottVerticalLine}
                        <div class="text-xs text-slate-500 mono">RSI: ${stock.weekly_rsi} | 200W SMA: ₹${stock.sma_200w.toLocaleString()}</div>
                        <div class="text-xs text-slate-500">${stock.months_since_high} months since high</div>
                        <div class="mt-2">${priorityBadge}</div>
                    `;
                    break;
                case 'golden':
                    // Add priority badge for Golden Stocks entries (Combined Fibonacci + Trendline)
                    if (stock.entry_quality && stock.entry_quality.includes('Double Signal')) {
                        if (stock.entry_quality.includes('Excellent')) {
                            priorityBadge = '<span class="signal-badge mono" style="background: linear-gradient(135deg, #B8860B, #D4AF37); color: white; border-radius: 20px; padding: 6px 16px; font-size: 11px; font-weight: 600; letter-spacing: 0.8px;">DUAL-SIGNAL ALPHA</span>';
                        } else {
                            priorityBadge = '<span class="signal-badge mono" style="background: linear-gradient(135deg, #065F46, #047857); color: white; border-radius: 20px; padding: 6px 16px; font-size: 11px; font-weight: 600; letter-spacing: 0.8px;">CONFLUENT SETUP</span>';
                        }
                    } else if (stock.entry_quality && stock.entry_quality.includes('Excellent')) {
                        priorityBadge = '<span class="signal-badge mono" style="background: linear-gradient(135deg, #1E40AF, #1D4ED8); color: white; border-radius: 20px; padding: 6px 16px; font-size: 11px; font-weight: 600; letter-spacing: 0.8px;">HIGH CONVICTION</span>';
                    } else if (stock.entry_quality && stock.entry_quality.includes('Good')) {
                        priorityBadge = '<span class="signal-badge mono" style="background: linear-gradient(135deg, #065F46, #047857); color: white; border-radius: 20px; padding: 6px 16px; font-size: 11px; font-weight: 600; letter-spacing: 0.8px;">VALIDATED SETUP</span>';
                    }
                    
                    // Build details based on what signals are present
                    let signalDetails = [];
                    
                    if (stock.has_fibonacci) {
                        signalDetails.push(`<div class="text-xs mono" style="color: #3B82F6;">Fibonacci ${stock.fibonacci_level} at ₹${stock.fibonacci_level_price.toLocaleString()} (${stock.fibonacci_distance_percent > 0 ? '+' : ''}${stock.fibonacci_distance_percent}%)</div>`);
                    }
                    
                    if (stock.has_trendline) {
                        signalDetails.push(`<div class="text-xs mono" style="color: #D97706;">Trendline at ₹${stock.trendline_price.toLocaleString()} (${stock.distance_to_trendline_percent > 0 ? '+' : ''}${stock.distance_to_trendline_percent}%)</div>`);
                        signalDetails.push(`<div class="text-xs text-slate-500 mono">Strength: ${stock.trendline_strength}% | ${stock.trendline_touches} touches | ${stock.timeframe_months}mo</div>`);
                    }
                    
                    if (stock.has_vertical_line && stock.vertical_line_price) {
                        signalDetails.push(`<div class="text-xs mono" style="color: #06B6D4;">Vertical Line at ₹${stock.vertical_line_price.toLocaleString()}</div>`);
                    }
                    
                    details = `
                        <div class="text-xs text-slate-400 mb-2">${stock.entry_quality}</div>
                        <div class="text-2xl font-bold mono" style="background: linear-gradient(135deg, #065F46, #047857); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">₹${stock.current_price.toLocaleString()}</div>
                        <div class="mt-2 space-y-1">
                            ${signalDetails.join('')}
                        </div>
                        <div class="text-xs text-slate-500 mt-2 mono">Upside: ${stock.potential_upside_percent}% | 52W: ₹${stock.week_52_low.toLocaleString()} - ₹${stock.week_52_high.toLocaleString()}</div>
                        <div class="mt-3">${priorityBadge}</div>
                    `;
                    break;
                case 'darvas':
                    // Add priority badge for Darvas Box entries
                    if (stock.breakout_status === 'Confirmed Breakout') {
                        priorityBadge = '<span class="signal-badge mono" style="background: linear-gradient(135deg, #065F46, #047857); color: white; border-radius: 20px; padding: 6px 16px; font-size: 11px; font-weight: 600; letter-spacing: 0.8px;">CONFIRMED BREAKOUT</span>';
                    } else if (stock.breakout_status === 'Initial Breakout') {
                        priorityBadge = '<span class="signal-badge mono" style="background: linear-gradient(135deg, #B8860B, #D4AF37); color: white; border-radius: 20px; padding: 6px 16px; font-size: 11px; font-weight: 600; letter-spacing: 0.8px;">INITIAL BREAKOUT</span>';
                    } else if (stock.breakout_status === 'Near Breakout') {
                        priorityBadge = '<span class="signal-badge mono" style="background: linear-gradient(135deg, #1E40AF, #1D4ED8); color: white; border-radius: 20px; padding: 6px 16px; font-size: 11px; font-weight: 600; letter-spacing: 0.8px;">PROXIMITY SIGNAL</span>';
                    }
                    
                    // Add vertical line price if available
                    const darvasVerticalLine = stock.vertical_line_price ? 
                        `<div class="text-xs mono" style="color: #06B6D4;">Vertical Line: ₹${stock.vertical_line_price.toLocaleString()}</div>` : '';
                    
                    details = `
                        <div class="text-xs text-slate-400 mb-2">${stock.breakout_status}</div>
                        <div class="text-2xl font-bold mono" style="color: #9333EA;">₹${stock.current_price.toLocaleString()}</div>
                        <div class="text-xs mono mt-2" style="color: #3B82F6;">Timeframe: ${stock.timeframe_years} Years</div>
                        <div class="text-xs text-slate-500 mono">Box: ₹${stock.box_low.toLocaleString()} - ₹${stock.box_high.toLocaleString()} (${stock.box_range_percent}%)</div>
                        <div class="text-xs text-slate-500 mono">Consolidation: ${stock.consolidation_months} months | Strength: ${stock.box_strength}%</div>
                        ${darvasVerticalLine}
                        <div class="text-xs mono" style="color: #047857;">Target: ₹${stock.target_price.toLocaleString()} (+${stock.target_percent}%)</div>
                        <div class="text-xs text-slate-500 mono">52W: ₹${stock.week_52_low.toLocaleString()} - ₹${stock.week_52_high.toLocaleString()}</div>
                        <div class="mt-3">${priorityBadge}</div>
                    `;
                    break;
            }
            
            return `
                <div class="stock-card mb-4">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="text-lg font-bold mb-1">${stockNameHtml}</div>
                            <div class="text-xs text-slate-400 mb-3">${stock.company_name}</div>
                            ${details}
                        </div>
                        <div class="text-xs text-slate-500 text-right ml-4">
                            <div class="px-3 py-1.5 rounded text-xs mono tracking-wide" style="background: rgba(20, 25, 35, 0.8);">${stock.industry}</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Update status indicator
        function updateStatus(isLive) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (isLive) {
                dot.className = 'w-2 h-2 rounded-full status-dot';
                dot.style.background = '#047857';
                text.textContent = 'LIVE FEED';
            } else {
                dot.className = 'w-2 h-2 rounded-full status-dot';
                dot.style.background = '#DC2626';
                text.textContent = 'OFFLINE';
            }
        }
        
        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
        }
        
        // Hide error message
        function hideError() {
            document.getElementById('errorMessage').classList.add('hidden');
        }
        
        // Display performance tracking screen
        function displayPerformanceTracking() {
            const container = document.getElementById('resultsContainer');
            
            if (!screeningData) {
                container.innerHTML = '<div class="mobile-card rounded-xl p-5 text-center text-slate-400">Loading...</div>';
                return;
            }
            
            // Get all radar-active stocks and sort by potential gain (max to min)
            const volumeRadarStocks = (screeningData.volume_breakout_stocks || []).filter(stock => 
                stock.radar_status === 'Active'
            );
            
            const wpatternRadarStocks = (screeningData.w_pattern_stocks || []).filter(stock => 
                stock.radar_status === 'Active'
            );
            
            // Calculate potential gains and sort by highest potential first
            volumeRadarStocks.forEach(stock => {
                if (stock.breakout_price && stock.current_price) {
                    stock.potential_gain = (((stock.breakout_price - stock.current_price) / stock.current_price) * 100);
                } else {
                    stock.potential_gain = 0;
                }
            });
            
            wpatternRadarStocks.forEach(stock => {
                if (stock.neckline_peak_price && stock.current_price) {
                    stock.potential_gain = (((stock.neckline_peak_price - stock.current_price) / stock.current_price) * 100);
                } else {
                    stock.potential_gain = 0;
                }
            });
            
            // Sort by potential gain (highest first)
            volumeRadarStocks.sort((a, b) => (b.potential_gain || 0) - (a.potential_gain || 0));
            wpatternRadarStocks.sort((a, b) => (b.potential_gain || 0) - (a.potential_gain || 0));
            
            const totalRadarStocks = volumeRadarStocks.length + wpatternRadarStocks.length;
            
            let html = `
                <div class="mobile-card rounded-xl p-5 mb-5">
                    <h3 class="text-lg font-bold text-slate-100 mb-4 tracking-tight">Radar Performance Tracking</h3>
                    <div class="grid grid-cols-2 gap-5 mb-5">
                        <div class="text-center">
                            <div class="text-3xl font-bold mono" style="color: #DC2626;">${totalRadarStocks}</div>
                            <div class="text-xs text-slate-400 tracking-wider uppercase mt-1">Active Alerts</div>
                        </div>
                        <div class="text-center">
                            <div class="text-3xl font-bold mono" style="color: #047857;">${volumeRadarStocks.length + wpatternRadarStocks.length}</div>
                            <div class="text-xs text-slate-400 tracking-wider uppercase mt-1">Monitored</div>
                        </div>
                    </div>
                    <div class="text-xs text-slate-500">
                        Radar alerts trigger when stocks return to key support levels. Sorted by highest potential gain first.
                    </div>
                </div>
            `;
            
            // Volume Breakout Radar Stocks (sorted by potential gain)
            if (volumeRadarStocks.length > 0) {
                html += `
                    <div class="mobile-card rounded-xl p-5 mb-5">
                        <h4 class="text-md font-bold mb-4 tracking-tight" style="color: #047857;">Volume Breakout Radar (${volumeRadarStocks.length}) - Sorted by Potential</h4>
                `;
                
                volumeRadarStocks.forEach((stock, index) => {
                    const chartUrl = `https://in.tradingview.com/chart/?symbol=NSE:${stock.symbol}`;
                    const daysSinceBreakout = stock.days_since_breakout || 0;
                    const potentialGain = stock.potential_gain ? stock.potential_gain.toFixed(1) : 'N/A';
                    const rankBadge = index < 3 ? `<span class="px-3 py-1.5 text-xs rounded-full mono tracking-wide" style="background: rgba(180, 83, 9, 0.2); color: #D97706;">RANK ${index + 1}</span>` : '';
                    
                    html += `
                        <div class="pl-5 mb-4 last:mb-0" style="border-left: 3px solid #DC2626;">
                            <div class="flex justify-between items-start">
                                <div class="flex-1">
                                    <div class="flex items-center space-x-2 mb-1">
                                        <a href="${chartUrl}" target="_blank" class="font-bold text-slate-100 hover:text-blue-400 transition-colors">${stock.symbol}</a>
                                        ${rankBadge}
                                    </div>
                                    <div class="text-xs text-slate-400">${stock.company_name}</div>
                                    <div class="mt-2 space-y-1">
                                        <div class="text-xs text-slate-300 mono">Current: ₹${stock.current_price.toLocaleString()}</div>
                                        <div class="text-xs text-slate-300 mono">Radar Trigger: ₹${stock.radar_trigger_price.toLocaleString()}</div>
                                        <div class="text-xs text-slate-300 mono">Breakout Price: ₹${stock.breakout_price.toLocaleString()}</div>
                                        <div class="text-xs font-bold mono" style="color: #047857;">Potential Gain: ${potentialGain}%</div>
                                        <div class="text-xs text-slate-500">${daysSinceBreakout} days since breakout</div>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <span class="px-3 py-1.5 text-xs rounded-full mono tracking-wide" style="background: rgba(220, 38, 38, 0.2); color: #DC2626;">ACTIVE</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            // W-Pattern Radar Stocks (sorted by potential gain)
            if (wpatternRadarStocks.length > 0) {
                html += `
                    <div class="mobile-card rounded-xl p-5 mb-5">
                        <h4 class="text-md font-bold mb-4 tracking-tight" style="color: #9333EA;">W-Pattern Radar (${wpatternRadarStocks.length}) - Sorted by Potential</h4>
                `;
                
                wpatternRadarStocks.forEach((stock, index) => {
                    const chartUrl = `https://in.tradingview.com/chart/?symbol=NSE:${stock.symbol}`;
                    const potentialGain = stock.potential_gain ? stock.potential_gain.toFixed(1) : 'N/A';
                    const rankBadge = index < 3 ? `<span class="px-3 py-1.5 text-xs rounded-full mono tracking-wide" style="background: rgba(180, 83, 9, 0.2); color: #D97706;">RANK ${index + 1}</span>` : '';
                    
                    html += `
                        <div class="pl-5 mb-4 last:mb-0" style="border-left: 3px solid #9333EA;">
                            <div class="flex justify-between items-start">
                                <div class="flex-1">
                                    <div class="flex items-center space-x-2 mb-1">
                                        <a href="${chartUrl}" target="_blank" class="font-bold text-slate-100 hover:text-blue-400 transition-colors">${stock.symbol}</a>
                                        ${rankBadge}
                                    </div>
                                    <div class="text-xs text-slate-400">${stock.company_name}</div>
                                    <div class="mt-2 space-y-1">
                                        <div class="text-xs text-slate-300 mono">Current: ₹${stock.current_price.toLocaleString()}</div>
                                        <div class="text-xs text-slate-300 mono">Radar Trigger: ₹${stock.radar_trigger_price.toLocaleString()}</div>
                                        <div class="text-xs text-slate-300 mono">Neckline Target: ₹${stock.neckline_peak_price.toLocaleString()}</div>
                                        <div class="text-xs font-bold mono" style="color: #047857;">Potential Gain: ${potentialGain}%</div>
                                        <div class="text-xs text-slate-500">Pattern: ${stock.pattern_timeframe_weeks} weeks</div>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <span class="px-3 py-1.5 text-xs rounded-full mono tracking-wide" style="background: rgba(220, 38, 38, 0.2); color: #DC2626;">ACTIVE</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            // No radar alerts
            if (totalRadarStocks === 0) {
                html += `
                    <div class="mobile-card rounded-xl p-6 text-center">
                        <div class="text-slate-400 mb-2">No Active Radar Alerts</div>
                        <div class="text-xs text-slate-500">Radar alerts will appear when stocks return to key support levels</div>
                    </div>
                `;
            }
            
            // Performance tracking instructions
            html += `
                <div class="mobile-card rounded-xl p-5" style="border-color: rgba(4, 120, 87, 0.2); background: rgba(4, 120, 87, 0.1);">
                    <h4 class="text-sm font-bold mb-3 tracking-wider uppercase" style="color: #047857;">Radar Tracking Guide</h4>
                    <div class="text-xs text-slate-300 space-y-2">
                        <div>• <strong>Volume Radar:</strong> Stocks that returned to breakout day low price</div>
                        <div>• <strong>W-Pattern Radar:</strong> Stocks that returned to trough low price</div>
                        <div>• <strong>Potential Gain:</strong> Expected return if stock reaches target price</div>
                        <div>• <strong>Rankings:</strong> Highest potential gain opportunities first</div>
                        <div>• <strong>Click stock names</strong> to view charts on TradingView</div>
                        <div>• Monitor these stocks for potential bounce opportunities</div>
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
        }
    </script>
</body>
</html>
