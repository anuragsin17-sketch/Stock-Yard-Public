<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Stock Yard - Live Screening</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            -webkit-text-size-adjust: 100%;
            -webkit-font-smoothing: antialiased;
        }
        .mobile-card {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        .status-dot {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .touch-btn {
            min-height: 48px;
            touch-action: manipulation;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen">
    <!-- Mobile Header -->
    <header class="bg-slate-900/95 backdrop-blur-xl border-b border-slate-800/50 sticky top-0 z-50">
        <div class="px-4 py-3">
            <!-- Status Bar -->
            <div class="flex items-center justify-between mb-3 text-xs">
                <div class="flex items-center space-x-2">
                    <div id="statusDot" class="w-2 h-2 rounded-full bg-green-500 status-dot"></div>
                    <span id="statusText" class="text-slate-400">Live Data</span>
                </div>
                <button id="refreshBtn" class="flex items-center space-x-1 px-3 py-1 bg-slate-800 rounded-lg touch-btn">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    <span class="text-xs">Refresh</span>
                </button>
            </div>
            
            <!-- Title -->
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                    <h1 class="text-xl font-bold">Stock Yard</h1>
                </div>
                <span id="lastSync" class="text-xs text-slate-400 font-mono">Loading...</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="px-4 py-4 space-y-4">
        <!-- Quick Stats -->
        <div class="grid grid-cols-2 gap-3">
            <div class="mobile-card rounded-xl p-4">
                <div class="text-xs text-slate-400 mb-1">Total Stocks</div>
                <div id="totalStocks" class="text-2xl font-bold text-slate-100 font-mono">-</div>
            </div>
            <div class="mobile-card rounded-xl p-4">
                <div class="text-xs text-slate-400 mb-1">Opportunities</div>
                <div id="totalOpportunities" class="text-2xl font-bold text-emerald-400 font-mono">-</div>
            </div>
        </div>
        <!-- Navigation Tabs -->
        <div class="mobile-card rounded-xl p-1">
            <div class="flex">
                <button id="fibTab" class="tab-btn flex-1 px-4 py-3 text-sm font-medium rounded-lg transition-all touch-btn bg-blue-500 text-white">
                    📊 Fibonacci
                </button>
                <button id="volTab" class="tab-btn flex-1 px-4 py-3 text-sm font-medium rounded-lg transition-all touch-btn text-slate-400">
                    📈 Volume
                </button>
                <button id="wpatTab" class="tab-btn flex-1 px-4 py-3 text-sm font-medium rounded-lg transition-all touch-btn text-slate-400">
                    📈 W-Pattern
                </button>
                <button id="perfTab" class="tab-btn flex-1 px-4 py-3 text-sm font-medium rounded-lg transition-all touch-btn text-slate-400">
                    📊 Performance
                </button>
            </div>
        </div>

        <!-- Results Container -->
        <div id="resultsContainer" class="space-y-3">
            <div class="mobile-card rounded-xl p-4 text-center text-slate-400">Loading...</div>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="hidden mobile-card rounded-xl p-4 border-red-500/20 bg-red-500/10">
            <div class="flex items-center space-x-2">
                <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span id="errorText" class="text-red-400 text-sm"></span>
            </div>
        </div>
    </main>

    <script>
        // Embedded live data (updated by GitHub Actions)
        const LIVE_DATA = {
  "timestamp": "2026-05-22T06:07:32.818391",
  "fibonacci_stocks": [
    {
      "symbol": "TMPV",
      "company_name": "Tata Motors Passenger Vehicles Ltd.",
      "industry": "Automobile and Auto Components",
      "is_near_fibonacci": true,
      "level": "50%",
      "level_price": 356.65,
      "current_price": 361.35,
      "distance_percent": 1.32,
      "high_5y": 419.0,
      "low_5y": 294.3,
      "week_52_high": 419.0,
      "week_52_low": 294.3
    }
  ],
  "volume_breakout_stocks": [
    {
      "symbol": "BOSCHLTD",
      "company_name": "Bosch Ltd.",
      "industry": "Automobile and Auto Components",
      "is_volume_breakout": true,
      "breakout_date": "2026-04-09",
      "breakout_price": 36770.0,
      "breakout_low": 35825.0,
      "current_price": 36500.0,
      "week_52_high": 41945.0,
      "week_52_low": 28610.0,
      "radar_status": "Monitoring"
    }
  ],
  "w_pattern_stocks": [
    {
      "symbol": "BEL",
      "company_name": "Bharat Electronics Ltd.",
      "industry": "Capital Goods",
      "is_w_pattern": true,
      "current_price": 413.3,
      "neckline_peak_price": 473.45,
      "week_52_high": 500.0,
      "week_52_low": 350.0,
      "radar_status": "Monitoring"
    }
  ],
  "diagnostics": {
    "total_stocks_processed": 500,
    "successful_downloads": 495,
    "failed_downloads": 5,
    "fibonacci_matches": 1,
    "volume_breakout_matches": 9,
    "w_pattern_matches": 8,
    "errors": []
  }
};
        
        // Global variables
        let screeningData = null;
        let currentTab = 'fibonacci';
        
        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Stock Yard Mobile App Starting...');
            setupEventListeners();
            loadData();
        });
        
        // Setup event listeners
        function setupEventListeners() {
            // Refresh button
            document.getElementById('refreshBtn').addEventListener('click', function() {
                this.disabled = true;
                this.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg><span class="text-xs ml-1">Loading...</span>';
                
                loadData().finally(() => {
                    this.disabled = false;
                    this.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg><span class="text-xs ml-1">Refresh</span>';
                });
            });
            
            // Tab buttons
            document.getElementById('fibTab').addEventListener('click', () => switchTab('fibonacci'));
            document.getElementById('volTab').addEventListener('click', () => switchTab('volume'));
            document.getElementById('wpatTab').addEventListener('click', () => switchTab('wpattern'));
            document.getElementById('perfTab').addEventListener('click', () => switchTab('performance'));
        }
        
        // Load data (try fetch first, fallback to embedded)
        async function loadData() {
            console.log('📱 Loading data...');
            hideError();
            
            try {
                // Try to fetch updated data first
                const response = await fetch('./data.json', {
                    method: 'GET',
                    headers: { 'Cache-Control': 'no-cache' },
                    cache: 'no-store'
                });
                
                if (response.ok) {
                    const text = await response.text();
                    const fetchedData = JSON.parse(text.trim().replace(/^\uFEFF/, ''));
                    
                    if (fetchedData && fetchedData.timestamp) {
                        console.log('✅ Fetched fresh data from server');
                        screeningData = fetchedData;
                        updateUI();
                        updateStatus(true);
                        return;
                    }
                }
            } catch (error) {
                console.log('⚠️ Fetch failed, using embedded data:', error.message);
            }
            
            // Use embedded data as reliable fallback
            console.log('📦 Using embedded live data');
            screeningData = LIVE_DATA;
            updateUI();
            updateStatus(true);
        }
        
        // Load fallback data only if absolutely necessary
        function loadFallbackData() {
            console.warn('⚠️ Using fallback data');
            screeningData = {
                timestamp: new Date().toISOString(),
                fibonacci_stocks: [],
                volume_breakout_stocks: [],
                w_pattern_stocks: [],
                diagnostics: {
                    total_stocks_processed: 0,
                    successful_downloads: 0,
                    failed_downloads: 0,
                    fibonacci_matches: 0,
                    volume_breakout_matches: 0,
                    w_pattern_matches: 0,
                    errors: ['Live data unavailable - using fallback']
                }
            };
            updateUI();
        }
        
        // Update UI with loaded data
        function updateUI() {
            if (!screeningData) return;
            
            // Update stats
            const total = screeningData.diagnostics?.total_stocks_processed || 0;
            const opportunities = (screeningData.fibonacci_stocks?.length || 0) + 
                               (screeningData.volume_breakout_stocks?.length || 0) + 
                               (screeningData.w_pattern_stocks?.length || 0);
            
            document.getElementById('totalStocks').textContent = total;
            document.getElementById('totalOpportunities').textContent = opportunities;
            
            // Update timestamp
            if (screeningData.timestamp) {
                const date = new Date(screeningData.timestamp);
                document.getElementById('lastSync').textContent = date.toLocaleTimeString();
            }
            
            // Update current tab
            switchTab(currentTab);
        }
        
        // Switch between tabs
        function switchTab(tab) {
            currentTab = tab;
            
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-blue-500', 'text-white');
                btn.classList.add('text-slate-400');
            });
            
            const activeBtn = document.getElementById(tab === 'fibonacci' ? 'fibTab' : 
                                                   tab === 'volume' ? 'volTab' : 
                                                   tab === 'wpattern' ? 'wpatTab' : 'perfTab');
            activeBtn.classList.add('bg-blue-500', 'text-white');
            activeBtn.classList.remove('text-slate-400');
            
            // Update results
            displayResults(tab);
        }
        
        // Display results for current tab
        function displayResults(tab) {
            const container = document.getElementById('resultsContainer');
            
            if (!screeningData) {
                container.innerHTML = '<div class="mobile-card rounded-xl p-4 text-center text-slate-400">Loading...</div>';
                return;
            }
            
            let stocks = [];
            let title = '';
            
            switch(tab) {
                case 'fibonacci':
                    stocks = screeningData.fibonacci_stocks || [];
                    title = 'Fibonacci Retracement Opportunities';
                    break;
                case 'volume':
                    stocks = screeningData.volume_breakout_stocks || [];
                    title = 'Volume Breakout Opportunities';
                    break;
                case 'wpattern':
                    stocks = screeningData.w_pattern_stocks || [];
                    title = 'W-Pattern Opportunities';
                    break;
                case 'performance':
                    displayPerformanceTracking();
                    return;
                    break;
            }
            
            if (stocks.length === 0) {
                container.innerHTML = `
                    <div class="mobile-card rounded-xl p-6 text-center">
                        <div class="text-slate-400 mb-2">No ${title.split(' ')[0]} opportunities found</div>
                        <div class="text-xs text-slate-500">Check back after market hours for updated screening results</div>
                    </div>
                `;
                return;
            }
            
            let html = '';
            stocks.forEach(stock => {
                html += createStockCard(stock, tab);
            });
            
            container.innerHTML = html;
        }
        
        // Create stock card HTML
        function createStockCard(stock, type) {
            let details = '';
            let radarStatus = '';
            
            // Create clickable stock name with chart link
            const chartUrl = `https://in.tradingview.com/chart/?symbol=NSE:${stock.symbol}`;
            const stockNameHtml = `<a href="${chartUrl}" target="_blank" class="font-bold text-slate-100 hover:text-blue-400 transition-colors">${stock.symbol}</a>`;
            
            switch(type) {
                case 'fibonacci':
                    details = `
                        <div class="text-xs text-slate-400 mb-1">Near ${stock.level} level</div>
                        <div class="text-lg font-bold text-emerald-400">₹${stock.current_price}</div>
                        <div class="text-xs text-slate-500">Target: ₹${stock.level_price}</div>
                        <div class="text-xs text-slate-500 mt-1">52W: ₹${stock.week_52_low} - ₹${stock.week_52_high}</div>
                    `;
                    break;
                case 'volume':
                    radarStatus = stock.radar_status === 'Active' ? 
                        '<span class="px-2 py-1 bg-red-500/20 text-red-400 text-xs rounded-full">🔴 RADAR ACTIVE</span>' :
                        '<span class="px-2 py-1 bg-yellow-500/20 text-yellow-400 text-xs rounded-full">🟡 Monitoring</span>';
                    
                    details = `
                        <div class="text-xs text-slate-400 mb-1">${stock.breakout_volume_ratio}x Volume Spike</div>
                        <div class="text-lg font-bold text-blue-400">₹${stock.current_price}</div>
                        <div class="text-xs text-slate-500">Breakout: ${stock.breakout_date} at ₹${stock.breakout_price}</div>
                        <div class="text-xs text-slate-500">Day Low: ₹${stock.breakout_low}</div>
                        <div class="text-xs text-slate-500">52W: ₹${stock.week_52_low} - ₹${stock.week_52_high}</div>
                        <div class="text-xs text-orange-400 mt-1">Radar Trigger: ₹${stock.radar_trigger_price}</div>
                        <div class="mt-2">${radarStatus}</div>
                    `;
                    break;
                case 'wpattern':
                    radarStatus = stock.radar_status === 'Active' ? 
                        '<span class="px-2 py-1 bg-red-500/20 text-red-400 text-xs rounded-full">🔴 RADAR ACTIVE</span>' :
                        '<span class="px-2 py-1 bg-yellow-500/20 text-yellow-400 text-xs rounded-full">🟡 Monitoring</span>';
                    
                    details = `
                        <div class="text-xs text-slate-400 mb-1">${stock.distance_to_neckline_percent}% to breakout</div>
                        <div class="text-lg font-bold text-purple-400">₹${stock.current_price}</div>
                        <div class="text-xs text-slate-500">Target: ₹${stock.neckline_peak_price}</div>
                        <div class="text-xs text-slate-500">Lower Trough: ${stock.lower_trough_date} at ₹${stock.lower_trough_price}</div>
                        <div class="text-xs text-slate-500">52W: ₹${stock.week_52_low} - ₹${stock.week_52_high}</div>
                        <div class="text-xs text-orange-400 mt-1">Radar Trigger: ₹${stock.radar_trigger_price}</div>
                        <div class="mt-2">${radarStatus}</div>
                    `;
                    break;
            }
            
            return `
                <div class="mobile-card rounded-xl p-4">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div>${stockNameHtml}</div>
                            <div class="text-xs text-slate-400 mb-2">${stock.company_name}</div>
                            ${details}
                        </div>
                        <div class="text-xs text-slate-500 text-right ml-4">
                            <div>${stock.industry}</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Update status indicator
        function updateStatus(isLive) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (isLive) {
                dot.className = 'w-2 h-2 rounded-full bg-green-500 status-dot';
                text.textContent = 'Live Data';
            } else {
                dot.className = 'w-2 h-2 rounded-full bg-red-500 status-dot';
                text.textContent = 'Offline';
            }
        }
        
        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
        }
        
        // Hide error message
        function hideError() {
            document.getElementById('errorMessage').classList.add('hidden');
        }
        
        // Display performance tracking screen
        function displayPerformanceTracking() {
            const container = document.getElementById('resultsContainer');
            
            if (!screeningData) {
                container.innerHTML = '<div class="mobile-card rounded-xl p-4 text-center text-slate-400">Loading...</div>';
                return;
            }
            
            // Get all radar-active stocks
            const volumeRadarStocks = (screeningData.volume_breakout_stocks || []).filter(stock => 
                stock.radar_status === 'Active'
            );
            
            const wpatternRadarStocks = (screeningData.w_pattern_stocks || []).filter(stock => 
                stock.radar_status === 'Active'
            );
            
            const totalRadarStocks = volumeRadarStocks.length + wpatternRadarStocks.length;
            
            let html = `
                <div class="mobile-card rounded-xl p-4 mb-4">
                    <h3 class="text-lg font-bold text-slate-100 mb-3">📊 Performance Tracking</h3>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="text-center">
                            <div class="text-2xl font-bold text-red-400">${totalRadarStocks}</div>
                            <div class="text-xs text-slate-400">Active Radar Alerts</div>
                        </div>
                        <div class="text-center">
                            <div class="text-2xl font-bold text-green-400">${volumeRadarStocks.length + wpatternRadarStocks.length}</div>
                            <div class="text-xs text-slate-400">Stocks to Monitor</div>
                        </div>
                    </div>
                    <div class="text-xs text-slate-500">
                        Radar alerts trigger when stocks return to key support levels. Monitor these for potential bounce opportunities.
                    </div>
                </div>
            `;
            
            // Volume Breakout Radar Stocks
            if (volumeRadarStocks.length > 0) {
                html += `
                    <div class="mobile-card rounded-xl p-4 mb-4">
                        <h4 class="text-md font-bold text-blue-400 mb-3">📈 Volume Breakout Radar (${volumeRadarStocks.length})</h4>
                `;
                
                volumeRadarStocks.forEach(stock => {
                    const chartUrl = `https://in.tradingview.com/chart/?symbol=NSE:${stock.symbol}`;
                    const daysSinceBreakout = stock.days_since_breakout || 0;
                    const potentialGain = stock.breakout_price && stock.current_price ? 
                        (((stock.breakout_price - stock.current_price) / stock.current_price) * 100).toFixed(1) : 'N/A';
                    
                    html += `
                        <div class="border-l-4 border-red-500 pl-4 mb-3 last:mb-0">
                            <div class="flex justify-between items-start">
                                <div class="flex-1">
                                    <a href="${chartUrl}" target="_blank" class="font-bold text-slate-100 hover:text-blue-400 transition-colors">${stock.symbol}</a>
                                    <div class="text-xs text-slate-400">${stock.company_name}</div>
                                    <div class="mt-2 space-y-1">
                                        <div class="text-xs text-slate-300">Current: ₹${stock.current_price}</div>
                                        <div class="text-xs text-slate-300">Radar Trigger: ₹${stock.radar_trigger_price}</div>
                                        <div class="text-xs text-slate-300">Breakout Price: ₹${stock.breakout_price}</div>
                                        <div class="text-xs text-green-400">Potential Gain: ${potentialGain}%</div>
                                        <div class="text-xs text-slate-500">${daysSinceBreakout} days since breakout</div>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <span class="px-2 py-1 bg-red-500/20 text-red-400 text-xs rounded-full">🔴 ACTIVE</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            // W-Pattern Radar Stocks
            if (wpatternRadarStocks.length > 0) {
                html += `
                    <div class="mobile-card rounded-xl p-4 mb-4">
                        <h4 class="text-md font-bold text-purple-400 mb-3">📈 W-Pattern Radar (${wpatternRadarStocks.length})</h4>
                `;
                
                wpatternRadarStocks.forEach(stock => {
                    const chartUrl = `https://in.tradingview.com/chart/?symbol=NSE:${stock.symbol}`;
                    const potentialGain = stock.neckline_peak_price && stock.current_price ? 
                        (((stock.neckline_peak_price - stock.current_price) / stock.current_price) * 100).toFixed(1) : 'N/A';
                    
                    html += `
                        <div class="border-l-4 border-purple-500 pl-4 mb-3 last:mb-0">
                            <div class="flex justify-between items-start">
                                <div class="flex-1">
                                    <a href="${chartUrl}" target="_blank" class="font-bold text-slate-100 hover:text-blue-400 transition-colors">${stock.symbol}</a>
                                    <div class="text-xs text-slate-400">${stock.company_name}</div>
                                    <div class="mt-2 space-y-1">
                                        <div class="text-xs text-slate-300">Current: ₹${stock.current_price}</div>
                                        <div class="text-xs text-slate-300">Radar Trigger: ₹${stock.radar_trigger_price}</div>
                                        <div class="text-xs text-slate-300">Neckline Target: ₹${stock.neckline_peak_price}</div>
                                        <div class="text-xs text-green-400">Potential Gain: ${potentialGain}%</div>
                                        <div class="text-xs text-slate-500">Pattern: ${stock.pattern_timeframe_weeks} weeks</div>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <span class="px-2 py-1 bg-red-500/20 text-red-400 text-xs rounded-full">🔴 ACTIVE</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            // No radar alerts
            if (totalRadarStocks === 0) {
                html += `
                    <div class="mobile-card rounded-xl p-6 text-center">
                        <div class="text-slate-400 mb-2">No Active Radar Alerts</div>
                        <div class="text-xs text-slate-500">Radar alerts will appear when stocks return to key support levels</div>
                    </div>
                `;
            }
            
            // Performance tracking instructions
            html += `
                <div class="mobile-card rounded-xl p-4 border-blue-500/20 bg-blue-500/10">
                    <h4 class="text-sm font-bold text-blue-400 mb-2">📋 How to Use Performance Tracking</h4>
                    <div class="text-xs text-slate-300 space-y-2">
                        <div>• <strong>Volume Radar:</strong> Stocks that returned to breakout day low price</div>
                        <div>• <strong>W-Pattern Radar:</strong> Stocks that returned to trough low price</div>
                        <div>• <strong>Potential Gain:</strong> Expected return if stock reaches target price</div>
