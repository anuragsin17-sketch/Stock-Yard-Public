<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Stock Yard - Live Screening</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
        }
        body {
            -webkit-text-size-adjust: 100%;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: #0F172A;
        }
        .mobile-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
        }
        .status-dot {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .touch-btn {
            min-height: 48px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }
        .touch-btn:active {
            transform: scale(0.98);
            background: rgba(37, 99, 235, 0.8);
        }
        .scroll-container {
            -webkit-overflow-scrolling: touch;
            overflow-scrolling: touch;
        }
        .pill-tab {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            transition: all 0.3s ease;
        }
        .pill-tab.active {
            background: #2563EB;
            border-color: #3B82F6;
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
        }
        .stock-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            transition: all 0.2s ease;
        }
        .stock-card:active {
            transform: translateY(-2px);
            border-color: rgba(37, 99, 235, 0.3);
        }
        .price-indicator {
            background: linear-gradient(135deg, #10B981, #059669);
            border-radius: 12px;
            padding: 4px 8px;
            font-weight: 600;
        }
        .signal-badge {
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen">
    <!-- Mobile Header -->
    <header class="bg-slate-900/95 backdrop-blur-xl border-b border-slate-800/50 sticky top-0 z-50">
        <div class="px-4 py-3">
            <!-- Status Bar -->
            <div class="flex items-center justify-between mb-3 text-xs">
                <div class="flex items-center space-x-2">
                    <div id="statusDot" class="w-2 h-2 rounded-full bg-green-500 status-dot"></div>
                    <span id="statusText" class="text-slate-400">Live Data</span>
                </div>
                <button id="refreshBtn" class="flex items-center space-x-1 px-3 py-1 bg-slate-800 rounded-lg touch-btn">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    <span class="text-xs">Refresh</span>
                </button>
            </div>
            
            <!-- Title -->
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                    <h1 class="text-xl font-bold">Stock Yard</h1>
                </div>
                <span id="lastSync" class="text-xs text-slate-400 font-mono">Loading...</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="px-4 py-4 space-y-4">
        <!-- Quick Stats -->
        <div class="grid grid-cols-2 gap-3">
            <div class="mobile-card rounded-xl p-4">
                <div class="text-xs text-slate-400 mb-1">Total Stocks</div>
                <div id="totalStocks" class="text-2xl font-bold text-slate-100 font-mono">-</div>
            </div>
            <div class="mobile-card rounded-xl p-4">
                <div class="text-xs text-slate-400 mb-1">Opportunities</div>
                <div id="totalOpportunities" class="text-2xl font-bold text-emerald-400 font-mono">-</div>
            </div>
        </div>
        <!-- Navigation Tabs -->
        <div class="mobile-card p-2">
            <div class="flex space-x-2 overflow-x-auto scroll-container">
                <button id="goldenTab" class="pill-tab flex-shrink-0 px-4 py-3 text-xs font-medium transition-all touch-btn active">
                    <div class="flex items-center space-x-2">
                        <span>✨</span>
                        <span>Golden Stocks</span>
                    </div>
                </button>
                <button id="volTab" class="pill-tab flex-shrink-0 px-4 py-3 text-xs font-medium transition-all touch-btn text-slate-400">
                    <div class="flex items-center space-x-2">
                        <span>📈</span>
                        <span>Volume</span>
                    </div>
                </button>
                <button id="wpatTab" class="pill-tab flex-shrink-0 px-4 py-3 text-xs font-medium transition-all touch-btn text-slate-400">
                    <div class="flex items-center space-x-2">
                        <span>📊</span>
                        <span>W-Pattern</span>
                    </div>
                </button>
                <button id="elliotTab" class="pill-tab flex-shrink-0 px-4 py-3 text-xs font-medium transition-all touch-btn text-slate-400">
                    <div class="flex items-center space-x-2">
                        <span>🌊</span>
                        <span>Elliott Wave</span>
                    </div>
                </button>
                <button id="perfTab" class="pill-tab flex-shrink-0 px-4 py-3 text-xs font-medium transition-all touch-btn text-slate-400">
                    <div class="flex items-center space-x-2">
                        <span>📊</span>
                        <span>Performance</span>
                    </div>
                </button>
            </div>
        </div>

        <!-- Results Container -->
        <div id="resultsContainer" class="space-y-3">
            <div class="mobile-card rounded-xl p-4 text-center text-slate-400">Loading...</div>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="hidden mobile-card rounded-xl p-4 border-red-500/20 bg-red-500/10">
            <div class="flex items-center space-x-2">
                <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span id="errorText" class="text-red-400 text-sm"></span>
            </div>
        </div>
    </main>

    <script>
        // Embedded live data (updated by GitHub Actions)
        const LIVE_DATA = {
  "timestamp": "2026-05-22T06:36:35.732353",
  "golden_stocks": [
    {
      "symbol": "SAMPLE_GOLDEN",
      "company_name": "Sample Golden Stock",
      "industry": "Sample Industry",
      "is_golden_stock": true,
      "current_price": 850.0,
      "entry_quality": "Excellent - Double Signal",
      "has_fibonacci": true,
      "has_trendline": true,
      "fibonacci_level": "61.8%",
      "fibonacci_level_price": 845.0,
      "fibonacci_distance_percent": 0.6,
      "trendline_price": 848.0,
      "distance_to_trendline_percent": 0.2,
      "trendline_strength": 85.5,
      "trendline_touches": 4,
      "timeframe_months": 10.4,
      "week_52_high": 920.0,
      "week_52_low": 710.0,
      "potential_upside_percent": 8.2,
      "analysis_timeframe": "Weekly + Daily",
      "pattern_type": "Golden Stock Analysis"
    }
  ],
  "volume_breakout_stocks": [
    {
      "symbol": "BOSCHLTD",
      "company_name": "Bosch Ltd.",
      "industry": "Automobile and Auto Components",
      "is_volume_breakout": true,
      "breakout_date": "2026-04-09",
      "breakout_price": 36770.0,
      "breakout_low": 35825.0,
      "current_price": 36500.0,
      "week_52_high": 41945.0,
      "week_52_low": 28610.0,
      "radar_status": "Monitoring"
    }
  ],
  "w_pattern_stocks": [
    {
      "symbol": "BEL",
      "company_name": "Bharat Electronics Ltd.",
      "industry": "Capital Goods",
      "is_w_pattern": true,
      "current_price": 413.3,
      "neckline_peak_price": 473.45,
      "week_52_high": 500.0,
      "week_52_low": 350.0,
      "radar_status": "Monitoring"
    }
  ],
  "elliott_wave_stocks": [
    {
      "symbol": "SAMPLE",
      "company_name": "Sample Elliott Wave Stock",
      "industry": "Sample Industry",
      "is_elliott_wave": true,
      "current_price": 1250.0,
      "golden_pocket_high": 1300.0,
      "golden_pocket_low": 1200.0,
      "retracement_percent": 58.5,
      "weekly_rsi": 35.2,
      "setup_quality": "Excellent",
      "wave1_low_date": "2023-01-15",
      "wave1_high_date": "2024-03-20",
      "months_since_high": 8.5,
      "sma_200w": 1225.0
    }
  ],
  "diagnostics": {
    "total_stocks_processed": 500,
    "successful_downloads": 495,
    "failed_downloads": 5,
    "golden_matches": 1,
    "volume_breakout_matches": 9,
    "w_pattern_matches": 8,
    "elliott_wave_matches": 1,
    "errors": []
  }
};
        
        // Global variables
        let screeningData = null;
        let currentTab = 'golden';
        
        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Stock Yard Mobile App Starting...');
            
            // Check for URL parameters for deep linking
            const urlParams = new URLSearchParams(window.location.search);
            const stockParam = urlParams.get('stock');
            
            setupEventListeners();
            loadData();
            
            // Handle deep linking after data loads
            if (stockParam) {
                setTimeout(() => {
                    highlightStock(stockParam);
                }, 1000);
            }
        });
        
        // Setup event listeners
        function setupEventListeners() {
            // Refresh button
            document.getElementById('refreshBtn').addEventListener('click', function() {
                this.disabled = true;
                this.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg><span class="text-xs ml-1">Loading...</span>';
                
                loadData().finally(() => {
                    this.disabled = false;
                    this.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg><span class="text-xs ml-1">Refresh</span>';
                });
            });
            
            // Tab buttons
            document.getElementById('goldenTab').addEventListener('click', () => switchTab('golden'));
            document.getElementById('volTab').addEventListener('click', () => switchTab('volume'));
            document.getElementById('wpatTab').addEventListener('click', () => switchTab('wpattern'));
            document.getElementById('elliotTab').addEventListener('click', () => switchTab('elliott'));
            document.getElementById('perfTab').addEventListener('click', () => switchTab('performance'));
        }
        
        // Load data (try fetch first, fallback to embedded)
        async function loadData() {
            console.log('📱 Loading data...');
            hideError();
            
            try {
                // Try to fetch updated data first
                const response = await fetch('./data.json', {
                    method: 'GET',
                    headers: { 'Cache-Control': 'no-cache' },
                    cache: 'no-store'
                });
                
                if (response.ok) {
                    const text = await response.text();
                    const fetchedData = JSON.parse(text.trim().replace(/^\uFEFF/, ''));
                    
                    if (fetchedData && fetchedData.timestamp) {
                        console.log('✅ Fetched fresh data from server');
                        screeningData = fetchedData;
                        updateUI();
                        updateStatus(true);
                        return;
                    }
                }
            } catch (error) {
                console.log('⚠️ Fetch failed, using embedded data:', error.message);
            }
            
            // Use embedded data as reliable fallback
            console.log('📦 Using embedded live data');
            screeningData = LIVE_DATA;
            updateUI();
            updateStatus(true);
        }
        
        // Load fallback data only if absolutely necessary
        function loadFallbackData() {
            console.warn('⚠️ Using fallback data');
            screeningData = {
                timestamp: new Date().toISOString(),
                golden_stocks: [],
                volume_breakout_stocks: [],
                w_pattern_stocks: [],
                elliott_wave_stocks: [],
                diagnostics: {
                    total_stocks_processed: 0,
                    successful_downloads: 0,
                    failed_downloads: 0,
                    golden_matches: 0,
                    volume_breakout_matches: 0,
                    w_pattern_matches: 0,
                    elliott_wave_matches: 0,
                    errors: ['Live data unavailable - using fallback']
                }
            };
            updateUI();
        }
        
        // Update UI with loaded data
        function updateUI() {
            if (!screeningData) return;
            
            // Update stats
            const total = screeningData.diagnostics?.total_stocks_processed || 0;
            const opportunities = (screeningData.golden_stocks?.length || 0) + 
                               (screeningData.volume_breakout_stocks?.length || 0) + 
                               (screeningData.w_pattern_stocks?.length || 0) +
                               (screeningData.elliott_wave_stocks?.length || 0);
            
            document.getElementById('totalStocks').textContent = total;
            document.getElementById('totalOpportunities').textContent = opportunities;
            
            // Update timestamp
            if (screeningData.timestamp) {
                const date = new Date(screeningData.timestamp);
                document.getElementById('lastSync').textContent = date.toLocaleTimeString();
            }
            
            // Update current tab
            switchTab(currentTab);
        }
        
        // Switch between tabs
        function switchTab(tab) {
            currentTab = tab;
            
            // Update tab buttons with new pill design
            document.querySelectorAll('.pill-tab').forEach(btn => {
                btn.classList.remove('active');
                btn.classList.add('text-slate-400');
            });
            
            const activeBtn = document.getElementById(tab === 'golden' ? 'goldenTab' : 
                                                   tab === 'volume' ? 'volTab' : 
                                                   tab === 'wpattern' ? 'wpatTab' : 
                                                   tab === 'elliott' ? 'elliotTab' : 'perfTab');
            activeBtn.classList.add('active');
            activeBtn.classList.remove('text-slate-400');
            
            // Update results
            displayResults(tab);
        }
        
        // Display results for current tab
        function displayResults(tab) {
            const container = document.getElementById('resultsContainer');
            
            if (!screeningData) {
                container.innerHTML = '<div class="mobile-card rounded-xl p-4 text-center text-slate-400">Loading...</div>';
                return;
            }
            
            let stocks = [];
            let title = '';
            let sortingInfo = '';
            
            switch(tab) {
                case 'golden':
                    stocks = screeningData.golden_stocks || [];
                    title = 'Golden Stocks Opportunities';
                    sortingInfo = 'Sorted: Double signals first, then by entry quality (Weekly + Daily analysis)';
                    break;
                case 'volume':
                    stocks = screeningData.volume_breakout_stocks || [];
                    title = 'Volume Breakout Opportunities';
                    sortingInfo = 'Sorted: Radar Active first, then by proximity to breakout retracement';
                    break;
                case 'wpattern':
                    stocks = screeningData.w_pattern_stocks || [];
                    title = 'W-Pattern Opportunities';
                    sortingInfo = 'Sorted: Radar Active first, then by proximity to neckline breakout';
                    break;
                case 'elliott':
                    stocks = screeningData.elliott_wave_stocks || [];
                    title = 'Elliott Wave Long-Term Opportunities';
                    sortingInfo = 'Sorted: Excellent setups first, then by RSI oversold levels';
                    break;
                case 'golden':
                    stocks = screeningData.golden_stocks || [];
                    title = 'Golden Trendline Opportunities';
                    sortingInfo = 'Sorted: Excellent entries first, then by proximity to trendline (Weekly timeframe)';
                    break;
                case 'performance':
                    displayPerformanceTracking();
                    return;
                    break;
            }
            
            if (stocks.length === 0) {
                container.innerHTML = `
                    <div class="mobile-card rounded-xl p-6 text-center">
                        <div class="text-slate-400 mb-2">No ${title.split(' ')[0]} opportunities found</div>
                        <div class="text-xs text-slate-500">Check back after market hours for updated screening results</div>
                    </div>
                `;
                return;
            }
            
            // Add sorting info header
            let html = `
                <div class="mobile-card rounded-xl p-3 mb-3 border-blue-500/20 bg-blue-500/10">
                    <div class="text-xs text-blue-400 font-medium">📊 ${title}</div>
                    <div class="text-xs text-slate-400 mt-1">${sortingInfo}</div>
                </div>
            `;
            
            stocks.forEach(stock => {
                html += createStockCard(stock, tab);
            });
            
            container.innerHTML = html;
        }
        
        // Deep link highlighting function
        function highlightStock(stockSymbol) {
            const stockCards = document.querySelectorAll('.stock-card');
            stockCards.forEach(card => {
                const symbolElement = card.querySelector('a');
                if (symbolElement && symbolElement.textContent.includes(stockSymbol)) {
                    card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    card.style.border = '2px solid #2563EB';
                    card.style.boxShadow = '0 0 20px rgba(37, 99, 235, 0.4)';
                    setTimeout(() => {
                        card.style.border = '1px solid rgba(255, 255, 255, 0.08)';
                        card.style.boxShadow = 'none';
                    }, 3000);
                }
            });
        }
        
        // Create stock card HTML
        function createStockCard(stock, type) {
            let details = '';
            let radarStatus = '';
            let priorityBadge = '';
            
            // Create clickable stock name with chart link
            const chartUrl = `https://in.tradingview.com/chart/?symbol=NSE:${stock.symbol}`;
            const stockNameHtml = `<a href="${chartUrl}" target="_blank" class="font-bold text-slate-100 hover:text-blue-400 transition-colors">${stock.symbol}</a>`;
            
            switch(type) {
                case 'fibonacci':
                    // Add priority badge for Fibonacci levels
                    if (stock.level === '38.2%') {
                        priorityBadge = '<span class="px-2 py-1 bg-green-500/20 text-green-400 text-xs rounded-full">🎯 HIGH PRIORITY</span>';
                    } else if (stock.level === '50%') {
                        priorityBadge = '<span class="px-2 py-1 bg-yellow-500/20 text-yellow-400 text-xs rounded-full">⚡ MEDIUM</span>';
                    } else if (stock.level === '61.8%') {
                        priorityBadge = '<span class="px-2 py-1 bg-blue-500/20 text-blue-400 text-xs rounded-full">📊 STANDARD</span>';
                    }
                    
                    details = `
                        <div class="text-xs text-slate-400 mb-1">Near ${stock.level} level</div>
                        <div class="text-lg font-bold text-emerald-400">₹${stock.current_price}</div>
                        <div class="text-xs text-slate-500">Target: ₹${stock.level_price}</div>
                        <div class="text-xs text-slate-500 mt-1">52W: ₹${stock.week_52_low} - ₹${stock.week_52_high}</div>
                        <div class="mt-2">${priorityBadge}</div>
                    `;
                    break;
                case 'volume':
                    radarStatus = stock.radar_status === 'Active' ? 
                        '<span class="px-2 py-1 bg-red-500/20 text-red-400 text-xs rounded-full">🔴 RADAR ACTIVE</span>' :
                        '<span class="px-2 py-1 bg-yellow-500/20 text-yellow-400 text-xs rounded-full">🟡 Monitoring</span>';
                    
                    // Add priority for radar active stocks
                    if (stock.radar_status === 'Active') {
                        priorityBadge = '<span class="px-2 py-1 bg-red-500/20 text-red-400 text-xs rounded-full">🚨 URGENT</span>';
                    }
                    
                    details = `
                        <div class="text-xs text-slate-400 mb-1">${stock.breakout_volume_ratio}x Volume Spike</div>
                        <div class="text-lg font-bold text-blue-400">₹${stock.current_price}</div>
                        <div class="text-xs text-slate-500">Breakout: ${stock.breakout_date} at ₹${stock.breakout_price}</div>
                        <div class="text-xs text-slate-500">Day Low: ₹${stock.breakout_low}</div>
                        <div class="text-xs text-slate-500">52W: ₹${stock.week_52_low} - ₹${stock.week_52_high}</div>
                        <div class="text-xs text-orange-400 mt-1">Radar Trigger: ₹${stock.radar_trigger_price}</div>
                        <div class="mt-2 flex space-x-2">${radarStatus}${priorityBadge ? ' ' + priorityBadge : ''}</div>
                    `;
                    break;
                case 'wpattern':
                    radarStatus = stock.radar_status === 'Active' ? 
                        '<span class="px-2 py-1 bg-red-500/20 text-red-400 text-xs rounded-full">🔴 RADAR ACTIVE</span>' :
                        '<span class="px-2 py-1 bg-yellow-500/20 text-yellow-400 text-xs rounded-full">🟡 Monitoring</span>';
                    
                    // Add priority for radar active stocks and close to breakout
                    if (stock.radar_status === 'Active') {
                        priorityBadge = '<span class="px-2 py-1 bg-red-500/20 text-red-400 text-xs rounded-full">🚨 URGENT</span>';
                    } else if (stock.distance_to_neckline_percent && stock.distance_to_neckline_percent < 10) {
                        priorityBadge = '<span class="px-2 py-1 bg-green-500/20 text-green-400 text-xs rounded-full">🎯 CLOSE</span>';
                    }
                    
                    details = `
                        <div class="text-xs text-slate-400 mb-1">${stock.distance_to_neckline_percent}% to breakout</div>
                        <div class="text-lg font-bold text-purple-400">₹${stock.current_price}</div>
                        <div class="text-xs text-slate-500">Target: ₹${stock.neckline_peak_price}</div>
                        <div class="text-xs text-slate-500">Lower Trough: ${stock.lower_trough_date} at ₹${stock.lower_trough_price}</div>
                        <div class="text-xs text-slate-500">52W: ₹${stock.week_52_low} - ₹${stock.week_52_high}</div>
                        <div class="text-xs text-orange-400 mt-1">Radar Trigger: ₹${stock.radar_trigger_price}</div>
                        <div class="mt-2 flex space-x-2">${radarStatus}${priorityBadge ? ' ' + priorityBadge : ''}</div>
                    `;
                    break;
                case 'elliott':
                    // Add priority badge for Elliott Wave setups
                    if (stock.setup_quality === 'Excellent') {
                        priorityBadge = '<span class="px-2 py-1 bg-yellow-500/20 text-yellow-400 text-xs rounded-full">⭐ EXCELLENT</span>';
                    } else if (stock.setup_quality === 'Good') {
                        priorityBadge = '<span class="px-2 py-1 bg-green-500/20 text-green-400 text-xs rounded-full">✅ GOOD</span>';
                    }
                    
                    details = `
                        <div class="text-xs text-slate-400 mb-1">${stock.retracement_percent}% Wave 2 Retracement</div>
                        <div class="text-lg font-bold text-indigo-400">₹${stock.current_price}</div>
                        <div class="text-xs text-slate-500">Golden Pocket: ₹${stock.golden_pocket_low} - ₹${stock.golden_pocket_high}</div>
                        <div class="text-xs text-slate-500">Wave 1: ${stock.wave1_low_date} to ${stock.wave1_high_date}</div>
                        <div class="text-xs text-slate-500">RSI: ${stock.weekly_rsi} | 200W SMA: ₹${stock.sma_200w}</div>
                        <div class="text-xs text-slate-500">${stock.months_since_high} months since high</div>
                        <div class="mt-2">${priorityBadge}</div>
                    `;
                    break;
                case 'golden':
                    // Add priority badge for Golden Stocks entries (Combined Fibonacci + Trendline)
                    if (stock.entry_quality && stock.entry_quality.includes('Double Signal')) {
                        if (stock.entry_quality.includes('Excellent')) {
                            priorityBadge = '<span class="signal-badge" style="background: linear-gradient(135deg, #F59E0B, #D97706); color: white; border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 600;">⭐ EXCELLENT DOUBLE</span>';
                        } else {
                            priorityBadge = '<span class="signal-badge" style="background: linear-gradient(135deg, #10B981, #059669); color: white; border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 600;">✅ GOOD DOUBLE</span>';
                        }
                    } else if (stock.entry_quality && stock.entry_quality.includes('Excellent')) {
                        priorityBadge = '<span class="signal-badge" style="background: linear-gradient(135deg, #3B82F6, #1D4ED8); color: white; border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 600;">⭐ EXCELLENT</span>';
                    } else if (stock.entry_quality && stock.entry_quality.includes('Good')) {
                        priorityBadge = '<span class="signal-badge" style="background: linear-gradient(135deg, #10B981, #059669); color: white; border-radius: 20px; padding: 4px 12px; font-size: 11px; font-weight: 600;">✅ GOOD</span>';
                    }
                    
                    // Build details based on what signals are present
                    let signalDetails = [];
                    
                    if (stock.has_fibonacci) {
                        signalDetails.push(`<div class="text-xs text-blue-400">📊 Fibonacci ${stock.fibonacci_level} at ₹${stock.fibonacci_level_price} (${stock.fibonacci_distance_percent > 0 ? '+' : ''}${stock.fibonacci_distance_percent}%)</div>`);
                    }
                    
                    if (stock.has_trendline) {
                        signalDetails.push(`<div class="text-xs text-yellow-400">📈 Trendline at ₹${stock.trendline_price} (${stock.distance_to_trendline_percent > 0 ? '+' : ''}${stock.distance_to_trendline_percent}%)</div>`);
                        signalDetails.push(`<div class="text-xs text-slate-500">Strength: ${stock.trendline_strength}% | ${stock.trendline_touches} touches | ${stock.timeframe_months}mo</div>`);
                    }
                    
                    details = `
                        <div class="text-xs text-slate-400 mb-2">${stock.entry_quality}</div>
                        <div class="text-2xl font-bold" style="background: linear-gradient(135deg, #10B981, #059669); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;">₹${stock.current_price}</div>
                        <div class="mt-2 space-y-1">
                            ${signalDetails.join('')}
                        </div>
                        <div class="text-xs text-slate-500 mt-2">Upside: ${stock.potential_upside_percent}% | 52W: ₹${stock.week_52_low} - ₹${stock.week_52_high}</div>
                        <div class="mt-3">${priorityBadge}</div>
                    `;
                    break;
            }
            
            return `
                <div class="stock-card p-4 mb-3">
                    <div class="flex justify-between items-start">
                        <div class="flex-1">
                            <div class="text-lg font-bold mb-1">${stockNameHtml}</div>
                            <div class="text-xs text-slate-400 mb-3">${stock.company_name}</div>
                            ${details}
                        </div>
                        <div class="text-xs text-slate-500 text-right ml-4">
                            <div class="bg-slate-800 px-2 py-1 rounded text-xs">${stock.industry}</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Update status indicator
        function updateStatus(isLive) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (isLive) {
                dot.className = 'w-2 h-2 rounded-full bg-green-500 status-dot';
                text.textContent = 'Live Data';
            } else {
                dot.className = 'w-2 h-2 rounded-full bg-red-500 status-dot';
                text.textContent = 'Offline';
            }
        }
        
        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
        }
        
        // Hide error message
        function hideError() {
            document.getElementById('errorMessage').classList.add('hidden');
        }
        
        // Display performance tracking screen
        function displayPerformanceTracking() {
            const container = document.getElementById('resultsContainer');
            
            if (!screeningData) {
                container.innerHTML = '<div class="mobile-card rounded-xl p-4 text-center text-slate-400">Loading...</div>';
                return;
            }
            
            // Get all radar-active stocks and sort by potential gain (max to min)
            const volumeRadarStocks = (screeningData.volume_breakout_stocks || []).filter(stock => 
                stock.radar_status === 'Active'
            );
            
            const wpatternRadarStocks = (screeningData.w_pattern_stocks || []).filter(stock => 
                stock.radar_status === 'Active'
            );
            
            // Calculate potential gains and sort by highest potential first
            volumeRadarStocks.forEach(stock => {
                if (stock.breakout_price && stock.current_price) {
                    stock.potential_gain = (((stock.breakout_price - stock.current_price) / stock.current_price) * 100);
                } else {
                    stock.potential_gain = 0;
                }
            });
            
            wpatternRadarStocks.forEach(stock => {
                if (stock.neckline_peak_price && stock.current_price) {
                    stock.potential_gain = (((stock.neckline_peak_price - stock.current_price) / stock.current_price) * 100);
                } else {
                    stock.potential_gain = 0;
                }
            });
            
            // Sort by potential gain (highest first)
            volumeRadarStocks.sort((a, b) => (b.potential_gain || 0) - (a.potential_gain || 0));
            wpatternRadarStocks.sort((a, b) => (b.potential_gain || 0) - (a.potential_gain || 0));
            
            const totalRadarStocks = volumeRadarStocks.length + wpatternRadarStocks.length;
            
            let html = `
                <div class="mobile-card rounded-xl p-4 mb-4">
                    <h3 class="text-lg font-bold text-slate-100 mb-3">📊 Performance Tracking</h3>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="text-center">
                            <div class="text-2xl font-bold text-red-400">${totalRadarStocks}</div>
                            <div class="text-xs text-slate-400">Active Radar Alerts</div>
                        </div>
                        <div class="text-center">
                            <div class="text-2xl font-bold text-green-400">${volumeRadarStocks.length + wpatternRadarStocks.length}</div>
                            <div class="text-xs text-slate-400">Stocks to Monitor</div>
                        </div>
                    </div>
                    <div class="text-xs text-slate-500">
                        Radar alerts trigger when stocks return to key support levels. Sorted by highest potential gain first.
                    </div>
                </div>
            `;
            
            // Volume Breakout Radar Stocks (sorted by potential gain)
            if (volumeRadarStocks.length > 0) {
                html += `
                    <div class="mobile-card rounded-xl p-4 mb-4">
                        <h4 class="text-md font-bold text-blue-400 mb-3">📈 Volume Breakout Radar (${volumeRadarStocks.length}) - Sorted by Potential</h4>
                `;
                
                volumeRadarStocks.forEach((stock, index) => {
                    const chartUrl = `https://in.tradingview.com/chart/?symbol=NSE:${stock.symbol}`;
                    const daysSinceBreakout = stock.days_since_breakout || 0;
                    const potentialGain = stock.potential_gain ? stock.potential_gain.toFixed(1) : 'N/A';
                    const rankBadge = index < 3 ? `<span class="px-2 py-1 bg-yellow-500/20 text-yellow-400 text-xs rounded-full">🏆 TOP ${index + 1}</span>` : '';
                    
                    html += `
                        <div class="border-l-4 border-red-500 pl-4 mb-3 last:mb-0">
                            <div class="flex justify-between items-start">
                                <div class="flex-1">
                                    <div class="flex items-center space-x-2 mb-1">
                                        <a href="${chartUrl}" target="_blank" class="font-bold text-slate-100 hover:text-blue-400 transition-colors">${stock.symbol}</a>
                                        ${rankBadge}
                                    </div>
                                    <div class="text-xs text-slate-400">${stock.company_name}</div>
                                    <div class="mt-2 space-y-1">
                                        <div class="text-xs text-slate-300">Current: ₹${stock.current_price}</div>
                                        <div class="text-xs text-slate-300">Radar Trigger: ₹${stock.radar_trigger_price}</div>
                                        <div class="text-xs text-slate-300">Breakout Price: ₹${stock.breakout_price}</div>
                                        <div class="text-xs text-green-400 font-bold">Potential Gain: ${potentialGain}%</div>
                                        <div class="text-xs text-slate-500">${daysSinceBreakout} days since breakout</div>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <span class="px-2 py-1 bg-red-500/20 text-red-400 text-xs rounded-full">🔴 ACTIVE</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            // W-Pattern Radar Stocks (sorted by potential gain)
            if (wpatternRadarStocks.length > 0) {
                html += `
                    <div class="mobile-card rounded-xl p-4 mb-4">
                        <h4 class="text-md font-bold text-purple-400 mb-3">📈 W-Pattern Radar (${wpatternRadarStocks.length}) - Sorted by Potential</h4>
                `;
                
                wpatternRadarStocks.forEach((stock, index) => {
                    const chartUrl = `https://in.tradingview.com/chart/?symbol=NSE:${stock.symbol}`;
                    const potentialGain = stock.potential_gain ? stock.potential_gain.toFixed(1) : 'N/A';
                    const rankBadge = index < 3 ? `<span class="px-2 py-1 bg-yellow-500/20 text-yellow-400 text-xs rounded-full">🏆 TOP ${index + 1}</span>` : '';
                    
                    html += `
                        <div class="border-l-4 border-purple-500 pl-4 mb-3 last:mb-0">
                            <div class="flex justify-between items-start">
                                <div class="flex-1">
                                    <div class="flex items-center space-x-2 mb-1">
                                        <a href="${chartUrl}" target="_blank" class="font-bold text-slate-100 hover:text-blue-400 transition-colors">${stock.symbol}</a>
                                        ${rankBadge}
                                    </div>
                                    <div class="text-xs text-slate-400">${stock.company_name}</div>
                                    <div class="mt-2 space-y-1">
                                        <div class="text-xs text-slate-300">Current: ₹${stock.current_price}</div>
                                        <div class="text-xs text-slate-300">Radar Trigger: ₹${stock.radar_trigger_price}</div>
                                        <div class="text-xs text-slate-300">Neckline Target: ₹${stock.neckline_peak_price}</div>
                                        <div class="text-xs text-green-400 font-bold">Potential Gain: ${potentialGain}%</div>
                                        <div class="text-xs text-slate-500">Pattern: ${stock.pattern_timeframe_weeks} weeks</div>
                                    </div>
                                </div>
                                <div class="text-right">
                                    <span class="px-2 py-1 bg-red-500/20 text-red-400 text-xs rounded-full">🔴 ACTIVE</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            // No radar alerts
            if (totalRadarStocks === 0) {
                html += `
                    <div class="mobile-card rounded-xl p-6 text-center">
                        <div class="text-slate-400 mb-2">No Active Radar Alerts</div>
                        <div class="text-xs text-slate-500">Radar alerts will appear when stocks return to key support levels</div>
                    </div>
                `;
            }
            
            // Performance tracking instructions
            html += `
                <div class="mobile-card rounded-xl p-4 border-blue-500/20 bg-blue-500/10">
                    <h4 class="text-sm font-bold text-blue-400 mb-2">📋 How to Use Performance Tracking</h4>
                    <div class="text-xs text-slate-300 space-y-2">
                        <div>• <strong>Volume Radar:</strong> Stocks that returned to breakout day low price</div>
                        <div>• <strong>W-Pattern Radar:</strong> Stocks that returned to trough low price</div>
                        <div>• <strong>Potential Gain:</strong> Expected return if stock reaches target price</div>
                        <div>• <strong>TOP Rankings:</strong> Highest potential gain opportunities first</div>
                        <div>• <strong>Click stock names</strong> to view charts on TradingView</div>
                        <div>• Monitor these stocks for potential bounce opportunities</div>
                    </div>
                </div>
            `;
            
            container.innerHTML = html;
        }
    </script>
</body>
</html>
