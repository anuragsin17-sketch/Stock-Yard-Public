    <style>
        * {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
        }
        .mono {
            font-family: 'JetBrains Mono', 'SF Mono', 'Consolas', 'Monaco', monospace;
        }
        body {
            -webkit-text-size-adjust: 100%;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: #0A0E14;
        }
        .mobile-card {
            background: rgba(20, 25, 35, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
        }
        .status-dot {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .touch-btn {
            min-height: 48px;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.2s ease;
        }
        .touch-btn:active {
            transform: scale(0.98);
            background: rgba(16, 79, 87, 0.8);
        }
        .scroll-container {
            -webkit-overflow-scrolling: touch;
            overflow-scrolling: touch;
        }
        .pill-tab {
            background: rgba(20, 25, 35, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            transition: all 0.3s ease;
            padding: 12px 20px;
        }
        .pill-tab.active {
            background: linear-gradient(135deg, #065F46, #047857);
            border-color: rgba(16, 185, 129, 0.3);
            box-shadow: 0 0 24px rgba(4, 120, 87, 0.25);
        }
        .stock-card {
            background: rgba(20, 25, 35, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            transition: all 0.2s ease;
            padding: 20px;
        }
        .stock-card:active {
            transform: translateY(-2px);
            border-color: rgba(4, 120, 87, 0.3);
        }
        .price-indicator {
            background: linear-gradient(135deg, #065F46, #047857);
            border-radius: 12px;
            padding: 6px 12px;
            font-weight: 600;
        }
        .signal-badge {
            border-radius: 20px;
            padding: 6px 16px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .position-filter-btn {
            background: rgba(20, 25, 35, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }
        .position-filter-btn.active {
            background: linear-gradient(135deg, #065F46, #047857);
            border-color: rgba(16, 185, 129, 0.3);
        }
        .position-filter-btn:hover {
            border-color: rgba(4, 120, 87, 0.3);
        }
    </style>

        // Fetch live prices for priority stocks (AT ENTRY or radar status)
        async function fetchLivePricesForPriorityStocks() {
            if (!screeningData) return;
            
            console.log('🔴 Fetching live prices for all stocks...');
            
            // Collect ALL stocks from all tabs
            const allStocks = [];
            
            // Check volume breakout stocks
            screeningData.volume_breakout_stocks?.forEach(stock => {
                allStocks.push({
                    symbol: stock.symbol,
                    type: 'volume',
                    entryPrice: stock.radar_trigger_price,
                    currentPrice: stock.current_price
                });
            });
            
            // Check golden stocks
            screeningData.golden_stocks?.forEach(stock => {
                allStocks.push({
                    symbol: stock.symbol,
                    type: 'trendline',
                    entryPrice: stock.trendline_price,
                    currentPrice: stock.current_price
                });
            });
            
            // Also fetch from trendline_screen.json for trendline stocks
            try {
                const response = await fetch('./trendline_screen.json', { cache: 'no-store' });
                if (response.ok) {
                    const trendlineData = await response.json();
                    if (Array.isArray(trendlineData)) {
                        trendlineData.forEach(stock => {
                            // Only add if not already in allStocks
                            if (!allStocks.find(s => s.symbol === stock.ticker)) {
                                allStocks.push({
                                    symbol: stock.ticker,
                                    type: 'trendline_json',
                                    entryPrice: stock.triggerPrice,
                                    currentPrice: stock.currentPrice
                                });
                            }
                        });
                    }
                }
            } catch (e) {
                console.log('Note: Could not fetch trendline_screen.json for live prices');
            }
            
            // Also update radar trades with current prices
            const radarTrades = JSON.parse(localStorage.getItem('radarTrades') || '[]');
            radarTrades.forEach(trade => {
                if (!allStocks.find(s => s.symbol === trade.ticker)) {
                    allStocks.push({
                        symbol: trade.ticker,
                        type: 'radar',
                        radarIndex: radarTrades.indexOf(trade)
                    });
                }
            });
            
            if (allStocks.length === 0) {
                console.log('📊 No stocks found for live price updates');
                return;
            }
            
            console.log(`🎯 Updating live prices for ${allStocks.length} stocks...`);
            
            // Fetch live prices in batches to avoid rate limiting
            const batchSize = 3;
            for (let i = 0; i < allStocks.length; i += batchSize) {
                const batch = allStocks.slice(i, i + batchSize);
                
                await Promise.all(batch.map(async (stock) => {
                    try {
                        let livePrice = null;
                        const symbol = stock.symbol;
                        const symbolWithNS = symbol.includes('.') ? symbol : `${symbol}.NS`;
                        
                        // Method 1: Use NSE India API (most reliable for Indian stocks)
                        try {
                            // Use a CORS proxy for NSE data
                            const nseUrl = `https://www.nseindia.com/api/quote-equity?symbol=${symbol}`;
                            const corsProxy = 'https://cors-anywhere.herokuapp.com/';
                            
                            const response = await Promise.race([
                                fetch(corsProxy + nseUrl, {
                                    headers: {
                                        'X-Requested-With': 'XMLHttpRequest'
                                    }
                                }),
                                new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 5000))
                            ]);
                            
                            if (response.ok) {
                                const data = await response.json();
                                if (data.price) {
                                    livePrice = parseFloat(data.price);
                                }
                            }
                        } catch (e1) {
                            console.log(`NSE API failed for ${symbol}, trying alternative...`);
                            
                            // Method 2: Use alternative free API (twelvedata.com)
                            try {
                                const response2 = await Promise.race([
                                    fetch(`https://api.twelvedata.com/quote?symbol=${symbol}&exchange=NSE`, {
                                        headers: { 'Accept': 'application/json' }
                                    }),
                                    new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 5000))
                                ]);
                                
                                if (response2.ok) {
                                    const data2 = await response2.json();
                                    if (data2.price) {
                                        livePrice = parseFloat(data2.price);
                                    }
                                }
                            } catch (e2) {
                                console.log(`Method 2 (twelvedata) failed for ${symbol}, trying local cache...`);
                                
                                // Method 3: Use local data as fallback
                                // The prices in screeningData are already fresh from the workflow
                                livePrice = stock.currentPrice;
                            }
                        }
                        
                        // If we got a price, update it
                        if (livePrice && livePrice > 0) {
                            updateStockPrice(symbol, stock.type, livePrice);
                            console.log(`✓ ${symbol}: ₹${livePrice.toFixed(2)}`);
                        } else {
                            console.log(`⊘ Could not fetch live price for ${symbol} - using cached price: ₹${stock.currentPrice.toFixed(2)}`);
                        }
                    } catch (error) {
                        console.warn(`Error fetching price for ${stock.symbol}:`, error.message);
                    }
                }));
                
                // Small delay between batches to avoid rate limiting
                if (i + batchSize < allStocks.length) {
                    await new Promise(resolve => setTimeout(resolve, 500));
                }
            }
            
            // Update UI with new prices
            updateTabPrices();
            console.log('✅ Live price updates completed');
        }

        // Update stock price in screeningData
        function updateStockPrice(symbol, type, newPrice) {
            // Update screeningData arrays
            if (type === 'volume' && screeningData?.volume_breakout_stocks) {
                const stock = screeningData.volume_breakout_stocks.find(s => s.symbol === symbol);
                if (stock) {
                    const oldPrice = stock.current_price;
                    stock.current_price = newPrice;
                    
                    // Recalculate distance percentages
                    if (stock.radar_trigger_price) {
                        stock.distance_to_trigger_abs_percent = Math.abs(((newPrice - stock.radar_trigger_price) / stock.radar_trigger_price) * 100);
                    }
                    
                    // Update change indicator
                    const change = oldPrice ? ((newPrice - oldPrice) / oldPrice) * 100 : 0;
                    stock.live_change_percent = change;
                    stock.is_live_updated = true;
                    console.log(`✓ Volume: ${symbol} = ₹${newPrice.toFixed(2)}`);
                }
            }
            
            if (type === 'trendline' && screeningData?.golden_stocks) {
                const stock = screeningData.golden_stocks.find(s => s.symbol === symbol);
                if (stock) {
                    const oldPrice = stock.current_price;
                    stock.current_price = newPrice;
                    
                    // Also update the trendlineData if it exists
                    const trendlineStocks = JSON.parse(sessionStorage.getItem('trendlineStocks') || '[]');
                    const trendStock = trendlineStocks.find(s => s.ticker === symbol);
                    if (trendStock) {
                        trendStock.currentPrice = newPrice;
                        sessionStorage.setItem('trendlineStocks', JSON.stringify(trendlineStocks));
                    }
                    
                    // Recalculate distance percentages
                    if (stock.trendline_price) {
                        stock.distance_to_trigger_abs_percent = Math.abs(((newPrice - stock.trendline_price) / stock.trendline_price) * 100);
                    }
                    
                    // Update change indicator
                    const change = oldPrice ? ((newPrice - oldPrice) / oldPrice) * 100 : 0;
                    stock.live_change_percent = change;
                    stock.is_live_updated = true;
                    console.log(`✓ Trendline: ${symbol} = ₹${newPrice.toFixed(2)}`);
                }
            }
            
            // CRITICAL: Handle trendline_json type (from trendline_screen.json)
            if (type === 'trendline_json') {
                const trendlineStocks = JSON.parse(sessionStorage.getItem('trendlineStocks') || '[]');
                const stock = trendlineStocks.find(s => s.ticker === symbol);
                if (stock) {
                    stock.currentPrice = newPrice;
                    sessionStorage.setItem('trendlineStocks', JSON.stringify(trendlineStocks));
                    console.log(`✓ Trendline JSON: ${symbol} = ₹${newPrice.toFixed(2)}`);
                }
            }
            
            // Update radar trades with current price
            const trades = JSON.parse(localStorage.getItem('radarTrades') || '[]');
            const trade = trades.find(t => t.ticker === symbol);
            if (trade) {
                trade.currentPrice = newPrice;
                
                // Calculate current P&L if trade is open
                if (trade.status === 'Open' && trade.entryTrigger) {
                    trade.currentPnl = ((newPrice - trade.entryTrigger) / trade.entryTrigger) * 100;
                }
                
                localStorage.setItem('radarTrades', JSON.stringify(trades));
            }
        }
        
        // Fetch real-time NIFTY and SENSEX data
        async function fetchIndexData() {
            try {
                async function fetchWithProxy(symbol) {
                    const yahooUrl = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=1d`;
                    const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(yahooUrl)}`;
                    const resp = await fetch(proxyUrl, { signal: AbortSignal.timeout(5000) });
                    if (!resp.ok) throw new Error('proxy failed');
                    return await resp.json();
                }

                const [niftyData, sensexData] = await Promise.all([
                    fetchWithProxy('%5ENSEI'),
                    fetchWithProxy('%5EBSESN')
                ]);

                function updateIndex(data, elementId) {
                    const meta = data.chart.result[0].meta;
                    const price = meta.regularMarketPrice;
                    const prevClose = meta.previousClose || meta.chartPreviousClose || meta.regularMarketPreviousClose;
                    const el = document.getElementById(elementId);
                    if (prevClose && prevClose > 0) {
                        const pct = ((price - prevClose) / prevClose) * 100;
                        el.textContent = `${price.toFixed(0)} (${pct >= 0 ? '+' : ''}${pct.toFixed(2)}%)`;
                        el.className = `text-xs font-semibold mono ${pct >= 0 ? 'text-emerald-400' : 'text-red-400'}`;
                    } else {
                        el.textContent = `${price.toFixed(0)}`;
                        el.className = 'text-xs font-semibold mono text-emerald-400';
                    }
                }

                updateIndex(niftyData, 'nifty50Price');
                updateIndex(sensexData, 'sensexPrice');

            } catch (error) {
                console.warn('Index data fetch failed:', error);
                document.getElementById('nifty50Price').textContent = 'N/A';
                document.getElementById('sensexPrice').textContent = 'N/A';
            }
        }

        async function placeAngelOrder(symbol, action, qty, price, stopLoss, target, source) {
            try {
                const EC2_API = "http://32.194.58.75:5000/api/place-order";
                
                console.log(`📤 Placing order via EC2 API...`);
                console.log(`   Symbol: ${symbol}, Qty: ${qty}, Price: ₹${price}, Target: ₹${target}, SL: ₹${stopLoss}`);

                const response = await fetch(EC2_API, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        symbol: symbol,
                        action: action,
                        quantity: qty,
                        entry_price: parseFloat(price),
                        target_price: parseFloat(target),
                        stop_loss: parseFloat(stopLoss),
                        source: source
                    })
                });

                try {
                    const result = await response.json();
                    console.log('Order response:', result);
                    
                    if (result.success || result.order_id) {
                        alert(`✅ Order placed!\n\nStock: ${symbol}\nOrder ID: ${result.order_id || 'Pending'}\n\nCheck Angel One app.`);
                        switchTab('performance');
                    } else {
                        alert(`❌ Order failed: ${result.error || 'Unknown error'}`);
                    }
                } catch (e) {
                    // CORS error or no response - but order might still be sent
                    console.log('Response parsing error (order may still be sent):', e.message);
                    alert(`✅ Order sent to Angel One!\n\nPlease check the app in 2-3 seconds.\nYou'll get a Telegram notification when confirmed.`);
                    switchTab('performance');
                }

            } catch (error) {
                alert(`❌ Error: ${error.message}`);
                console.error('Order error:', error);
            }
        }

        // Take Trade from Volume tab - manual only
        window.takeVolumeTrade = function(symbol, companyName) {
            const entryEl = document.getElementById(`vol_entry_${symbol}`);
            const posEl = document.getElementById(`vol_pos_${symbol}`);
            const entry = parseFloat(entryEl ? entryEl.value : 0);
            const positionSize = parseFloat(posEl ? posEl.value : 50000);

            if (!entry || entry <= 0) {
                alert('Please set a valid Entry Trigger price first');
                return;
            }

            const target = parseFloat((entry * 1.20).toFixed(2));
            const stopLoss = parseFloat((entry * 0.92).toFixed(2));
            const qty = Math.floor(positionSize / entry);

            // Confirmation dialog - ONLY 4 PARAMETERS
            const confirmed = confirm(
                `📥 CONFIRM TRADE - ANGEL ONE\n\n` +
                `Stock: ${symbol}\n` +
                `Action: BUY\n` +
                `Entry Price: ₹${entry.toFixed(2)}\n` +
                `Quantity: ${qty}\n\n` +
                `⚠️ This will place a REAL LIMIT ORDER in Angel One.\n` +
                `Click OK to confirm.`
            );

            if (!confirmed) return;

            // Add to Radar
            const trades = JSON.parse(localStorage.getItem('radarTrades') || '[]');
            const exists = trades.find(t => t.ticker === symbol && t.status === 'Open');
            if (!exists) {
                trades.push({
                    ticker: symbol,
                    companyName: companyName,
                    entryTrigger: entry,
                    targetExit: target,
                    stopLoss: stopLoss,

                    quantity: qty,

                    status: 'Open',
                    source: 'Volume'
                });
                localStorage.setItem('radarTrades', JSON.stringify(trades));

            // Trigger Angel One order via GitHub Actions
            placeAngelOrder(symbol, 'BUY', qty, entry, stopLoss, target, 'Volume');
        };

                                    <!-- Editable Stop Loss -->

                                                style="color: #DC2626; border-color: rgba(220,38,38,0.3);"
                                                onchange="saveTrendlineOverride('${stock.ticker}', 'stopLoss', this.value)"/>
                                            ${saved.stopLoss ? '<span class="text-xs" style="color:#F59E0B;">✏️</span>' : ''}
                                        </div>
                                    </div>

                                    <div class="text-xs text-slate-500 mono mb-2">
                                        Fib: ${stock.fibLevelMatch} | Score: ${stock.confluenceScore || '-'}/10
                                    </div>

                                    <!-- Editable Position Size -->
                                    <div class="mb-3">
                                        <div class="text-xs text-slate-500 mb-1">Position Size (₹)</div>
                                        <div class="flex items-center space-x-2">
                                            <span class="text-xs mono text-slate-400">₹</span>
                                            <input type="number"
                                                id="pos_${stock.ticker}"
                                                value="${saved.positionSize || 50000}"
                                                step="1000"
                                                class="mono text-sm font-semibold bg-transparent border-b outline-none w-28"
                                                style="color: #A78BFA; border-color: rgba(167,139,250,0.3);"
                                                onchange="saveTrendlineOverride('${stock.ticker}', 'positionSize', this.value)"/>
                                        </div>
                                    </div>

                                    <div class="flex items-center space-x-2 mt-3">
                                        <div class="flex-1">${statusBadge}</div>
                                        <button onclick="takeTrade('${stock.ticker}', ${entryTrigger}, ${targetExit}, ${stopLoss})"
                                            class="px-4 py-2 rounded-lg text-xs font-semibold touch-btn"
                                            style="background: linear-gradient(135deg, #065F46, #047857); color: #fff; min-width: 90px;">
                                            📥 Take Trade
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                // Trendline pagination controls
                if (trendTotalPages > 1) {
                    html += paginationControls(
                        trendPage, trendTotalPages,
                        'trendPage=Math.max(1,trendPage-1); displayTrendlineScreen()',
                        `trendPage=Math.min(${trendTotalPages},trendPage+1); displayTrendlineScreen()`
                    );
                }

                container.innerHTML = html;
            } catch (error) {
                container.innerHTML = `
                    <div class="mobile-card rounded-xl p-6 text-center">
                        <div class="text-red-400 mb-2">⚠️ Error Loading Trendline Data</div>
                        <div class="text-xs text-slate-500">${error.message}</div>
                    </div>
                `;
            }
        }
        
        // ─── PAST PERFORMANCE TAB ────────────────────────────────────────────────
        let perfData = null;
        let perfDateFrom = '';
        let perfDateTo   = '';
        let perfStockFilter = '';
        let perfSortBy = 'total_pnl';
        let perfYears = 0;
        let perfPage = 1;
        const PERF_PAGE_SIZE = 10;

        // Pagination state for Volume and Trendline tabs
        let volPage = 1;
        let trendPage = 1;
        const TAB_PAGE_SIZE = 10;

        function paginationControls(currentPage, totalPages, onPrev, onNext) {
            if (totalPages <= 1) return '';
            return `
                <div class="mobile-card rounded-xl p-4 mt-2 mb-2">
                    <div class="flex items-center justify-between">
                        <button onclick="${onPrev}"
                            class="px-4 py-2 rounded-lg text-xs font-medium touch-btn"
                            style="${currentPage<=1 ? 'opacity:0.3;pointer-events:none;background:rgba(30,41,59,0.5);color:#94A3B8' : 'background:rgba(30,41,59,0.9);color:#fff'}">← Prev</button>
                        <div class="text-xs text-center">
                            <div class="font-semibold text-slate-200">Page ${currentPage} of ${totalPages}</div>
                        </div>
                        <button onclick="${onNext}"
                            class="px-4 py-2 rounded-lg text-xs font-medium touch-btn"
                            style="${currentPage>=totalPages ? 'opacity:0.3;pointer-events:none;background:rgba(30,41,59,0.5);color:#94A3B8' : 'background:rgba(30,41,59,0.9);color:#fff'}">Next →</button>
                    </div>
                </div>`;
        }

        async function displayPastPerformance() {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = `
                <div class="mobile-card rounded-xl p-6 text-center">
                    <div class="text-slate-400 text-sm mb-2">Loading backtest data...</div>
                    <div class="text-xs text-slate-500">Fetching historical performance results</div>
                </div>`;

            try {
                const resp = await fetch('./backtest_performance.json', { cache: 'no-store' });
                if (!resp.ok) throw new Error('backtest_performance.json not found');
                perfData = await resp.json();
            } catch (e) {
                container.innerHTML = `
                    <div class="mobile-card rounded-xl p-8 text-center">
                        <div class="text-4xl mb-4">📊</div>
                        <div class="text-slate-300 font-semibold mb-2">No Backtest Data Yet</div>
                        <div class="text-xs text-slate-500 mb-4">Run the backtest to generate performance data:</div>
                        <code class="text-xs px-3 py-2 rounded-lg block mb-4" style="background: rgba(30,41,59,0.9); color: #38BDF8;">python backtest_performance.py --years 10</code>
                        <div class="text-xs text-slate-500">Or trigger the GitHub Actions workflow manually.</div>
                    </div>`;
                return;
            }

            renderPastPerformance(container);
        }

        // Helper: returns YYYY-MM-DD for N days ago
        function getDateOffset(days) {
            const d = new Date();
            d.setDate(d.getDate() - days);
            return d.toISOString().split('T')[0];
        }

        let perfCapital = 500000; // default ₹5,00,000 total capital

        function renderPastPerformance(container) {
            if (!perfData) return;
            const allStocks = perfData.stocks || [];
            const generatedAt = perfData.generated_at ? new Date(perfData.generated_at).toLocaleDateString('en-IN', { day: '2-digit', month: 'short', year: 'numeric' }) : '—';
            const backtestYears = perfData.backtest_years || '?';

            // ── Date filter ──────────────────────────────────────────────────
            const fromTs = perfDateFrom ? new Date(perfDateFrom).getTime() : null;
            const toTs   = perfDateTo   ? new Date(perfDateTo).getTime()   : null;

            function filterTrades(trades) {
                if (!fromTs && !toTs) return trades;
                return (trades || []).filter(t => {
                    const ts = new Date(t.entry_date).getTime();
                    if (fromTs && ts < fromTs) return false;
                    if (toTs   && ts > toTs)   return false;
                    return true;
                });
            }

            // Rebuild per-stock summaries with filtered trades + capital scaling
            // Capital is split equally per trade across the whole filtered period
            const allFilteredTrades = allStocks.flatMap(st => filterTrades(st.trades || []));
            const totalTrades = allFilteredTrades.length;
            const perTradeCap = totalTrades > 0 ? perfCapital / totalTrades : perfCapital;

            let stocks = allStocks.map(st => {
                const trades = filterTrades(st.trades || []).map(t => {
                    const shares = Math.max(1, Math.floor(perTradeCap / t.entry_price));
                    const pnl_amount = (t.exit_price - t.entry_price) * shares;
                    return { ...t, shares, pnl_amount: Math.round(pnl_amount * 100) / 100 };
                });
                if (trades.length === 0) return null;
                const wins   = trades.filter(t => t.pnl_pct > 0);
                const losses = trades.filter(t => t.pnl_pct <= 0);
                const total_pnl = trades.reduce((s, t) => s + t.pnl_amount, 0);
                const win_rate  = Math.round(wins.length / trades.length * 1000) / 10;
                const avg_return_pct = Math.round(trades.reduce((s,t) => s + t.pnl_pct, 0) / trades.length * 100) / 100;
                const best  = trades.reduce((b, t) => t.pnl_pct > b.pnl_pct ? t : b, trades[0]);
                const worst = trades.reduce((w, t) => t.pnl_pct < w.pnl_pct ? t : w, trades[0]);
                return {
                    symbol: st.symbol,
                    total_trades: trades.length,
                    wins: wins.length, losses: losses.length,
                    win_rate, avg_return_pct,
                    total_pnl: Math.round(total_pnl),
                    best_trade_pct: best.pnl_pct, best_trade_date: best.entry_date,
                    worst_trade_pct: worst.pnl_pct, worst_trade_date: worst.entry_date,
                    avg_holding_days: Math.round(trades.reduce((s,t) => s + t.holding_days, 0) / trades.length),
                    trades
                };
            }).filter(Boolean);

            // Overall summary from filtered+scaled trades
            const scaledTrades = stocks.flatMap(s => s.trades);
            const total = scaledTrades.length;
            let s = {};
            if (total > 0) {
                const wins_all   = scaledTrades.filter(t => t.pnl_pct > 0);
                const losses_all = scaledTrades.filter(t => t.pnl_pct <= 0);
                const gross_profit = wins_all.reduce((a,t) => a + t.pnl_amount, 0);
                const gross_loss   = Math.abs(losses_all.reduce((a,t) => a + t.pnl_amount, 0));
                const outcomes = {};
                scaledTrades.forEach(t => { outcomes[t.outcome] = (outcomes[t.outcome] || 0) + 1; });
                const total_pnl = Math.round(scaledTrades.reduce((a,t) => a + t.pnl_amount, 0));
                const roi = Math.round(total_pnl / perfCapital * 10000) / 100;
                s = {
                    total_trades: total,
                    winning_trades: wins_all.length,
                    losing_trades: losses_all.length,
                    win_rate: Math.round(wins_all.length / total * 1000) / 10,
                    avg_win_pct: wins_all.length ? Math.round(wins_all.reduce((a,t) => a+t.pnl_pct,0)/wins_all.length*100)/100 : 0,
                    avg_loss_pct: losses_all.length ? Math.round(losses_all.reduce((a,t) => a+t.pnl_pct,0)/losses_all.length*100)/100 : 0,
                    total_pnl,
                    roi,
                    profit_factor: gross_loss > 0 ? Math.round(gross_profit/gross_loss*100)/100 : 0,
                    avg_holding_days: Math.round(scaledTrades.reduce((a,t) => a+t.holding_days,0)/total),
                    outcome_breakdown: outcomes
                };
            }

            // Stock search filter
            if (perfStockFilter.length >= 2) {
                stocks = stocks.filter(st => st.symbol.toUpperCase().includes(perfStockFilter.toUpperCase()));
            }

            // Sort
            stocks = [...stocks].sort((a, b) => {
                if (perfSortBy === 'win_rate')     return b.win_rate - a.win_rate;
                if (perfSortBy === 'avg_return')   return b.avg_return_pct - a.avg_return_pct;
                if (perfSortBy === 'total_trades') return b.total_trades - a.total_trades;
                return b.total_pnl - a.total_pnl;
            });

            const winRateColor = s.win_rate >= 60 ? '#10B981' : s.win_rate >= 45 ? '#D97706' : '#DC2626';
            const pnlColor = (s.total_pnl || 0) >= 0 ? '#10B981' : '#DC2626';
            const pfColor = s.profit_factor >= 1.5 ? '#10B981' : s.profit_factor >= 1.0 ? '#D97706' : '#DC2626';
            const dateLabel = (perfDateFrom || perfDateTo)
                ? `${perfDateFrom || perfData.period?.start} → ${perfDateTo || perfData.period?.end}`
                : `${perfData.period?.start || ''} → ${perfData.period?.end || ''}`;

            let html = `
                <!-- Header -->
                <div class="mobile-card rounded-xl p-4 mb-4" style="border-color:rgba(56,189,248,0.2);background:rgba(56,189,248,0.05);">
                    <div class="flex items-center justify-between mb-1">
                        <div class="text-xs font-semibold tracking-wider uppercase" style="color:#38BDF8;">📊 Trendline Strategy — ${backtestYears}Y Backtest</div>
                        <div class="text-xs text-slate-500">Updated: ${generatedAt}</div>
                    </div>
                    <div class="text-xs text-slate-400">${dateLabel}</div>
                </div>

                <!-- Capital + Date filters -->
                <div class="mobile-card rounded-xl p-4 mb-4">
                    <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">⚙️ Simulation Settings</div>

                    <!-- Capital input -->
                    <div class="mb-4">
                        <label class="text-xs text-slate-500 mb-1 block">💰 Capital Amount to Test</label>
                        <div class="flex items-center space-x-2 mb-2">
                            <span class="text-xs mono text-slate-400">₹</span>
                            <input type="number" id="perfCapitalInput"
                                value="${perfCapital}" step="50000" min="10000"
                                class="flex-1 px-3 py-2 rounded-lg text-sm mono text-slate-100 outline-none"
                                style="background:rgba(30,41,59,0.9);border:1px solid rgba(167,139,250,0.4);color:#A78BFA;"
                                onchange="perfCapital=Math.max(10000,parseInt(this.value)||500000); renderPastPerformance(document.getElementById('resultsContainer'))" />
                        </div>
                        <div class="flex space-x-2 overflow-x-auto scroll-container">
                            ${[100000,250000,500000,1000000,2500000].map(v =>
                                `<button onclick="perfCapital=${v}; document.getElementById('perfCapitalInput').value=${v}; renderPastPerformance(document.getElementById('resultsContainer'))"
                                    class="flex-shrink-0 px-3 py-1 rounded-lg text-xs touch-btn"
                                    style="${perfCapital===v ? 'background:linear-gradient(135deg,#4C1D95,#6D28D9);color:#fff;' : 'background:rgba(30,41,59,0.8);color:#94A3B8;'}">
                                    ₹${v>=100000?(v/100000).toFixed(v%100000===0?0:1)+'L':(v/1000)+'K'}</button>`
                            ).join('')}
                        </div>
                        <div class="text-xs text-slate-500 mt-2">Capital is split equally across ${total} trade${total!==1?'s':''} in this period → ₹${Math.round(total>0?perfCapital/total:perfCapital).toLocaleString()} per trade</div>
                    </div>

                    <!-- Date range -->
                    <div class="grid grid-cols-2 gap-3 mb-3">
                        <div>
                            <label class="text-xs text-slate-500 mb-1 block">📅 Date From</label>
                            <input type="date" id="perfDateFromInput" value="${perfDateFrom}"
                                class="w-full px-3 py-2 rounded-lg text-sm mono text-slate-100 outline-none"
                                style="background:rgba(30,41,59,0.9);border:1px solid rgba(59,130,246,0.3);color:#38BDF8;"
                                onchange="perfYears=0; perfDateFrom=this.value; renderPastPerformance(document.getElementById('resultsContainer'))" />
                        </div>
                        <div>
                            <label class="text-xs text-slate-500 mb-1 block">📅 Date To</label>
                            <input type="date" id="perfDateToInput" value="${perfDateTo}"
                                max="${new Date().toISOString().split('T')[0]}"
                                class="w-full px-3 py-2 rounded-lg text-sm mono text-slate-100 outline-none"
                                style="background:rgba(30,41,59,0.9);border:1px solid rgba(59,130,246,0.3);color:#38BDF8;"
                                onchange="perfDateTo=this.value; renderPastPerformance(document.getElementById('resultsContainer'))" />
                        </div>
                    </div>
                    <div class="flex space-x-2 overflow-x-auto scroll-container">
                        ${[['1Y',1],['3Y',3],['5Y',5],['10Y',10]].map(([label,yrs]) => {
                            const active = perfYears===yrs && !perfDateFrom && !perfDateTo;
                            const style = active ? 'background:linear-gradient(135deg,#065F46,#047857);color:#fff' : 'background:rgba(30,41,59,0.8);color:#94A3B8';
                            return `<button onclick="perfYears=${yrs}; perfDateFrom=getDateOffset(${yrs}*365); perfDateTo=''; renderPastPerformance(document.getElementById('resultsContainer'))"
                                class="flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-medium touch-btn"
                                style="${style}">${label}</button>`;
                        }).join('')}
                        <button onclick="perfYears=0; perfDateFrom=''; perfDateTo=''; renderPastPerformance(document.getElementById('resultsContainer'))"
                            class="flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-medium touch-btn"
                            style="${perfYears===0&&!perfDateFrom&&!perfDateTo ? 'background:linear-gradient(135deg,#065F46,#047857);color:#fff' : 'background:rgba(30,41,59,0.8);color:#94A3B8'}">All</button>
                    </div>
                </div>
            `;

            if (total === 0) {
                html += `<div class="mobile-card rounded-xl p-8 text-center">
                    <div class="text-4xl mb-3">🔍</div>
                    <div class="text-slate-300 font-semibold mb-2">No trades in this date range</div>
                    <div class="text-xs text-slate-500">Try a wider range or click "All"</div>
                </div>`;
                container.innerHTML = html;
                return;
            }

            html += `
                <!-- Summary stats -->
                <div class="grid grid-cols-2 gap-3 mb-4">
                    <div class="mobile-card rounded-xl p-4 text-center">
                        <div class="text-2xl font-bold mono" style="color:${winRateColor};">${s.win_rate}%</div>
                        <div class="text-xs text-slate-400 mt-1 uppercase tracking-wider">Win Rate</div>
                        <div class="text-xs text-slate-500 mt-1">${s.winning_trades}W / ${s.losing_trades}L</div>
                    </div>
                    <div class="mobile-card rounded-xl p-4 text-center">
                        <div class="text-2xl font-bold mono" style="color:${pnlColor};">${(s.total_pnl>=0?'+':'')}₹${s.total_pnl.toLocaleString()}</div>
                        <div class="text-xs text-slate-400 mt-1 uppercase tracking-wider">Total P&L</div>
                        <div class="text-xs text-slate-500 mt-1">${s.roi>=0?'+':''}${s.roi}% ROI on ₹${perfCapital.toLocaleString()}</div>
                    </div>
                    <div class="mobile-card rounded-xl p-4 text-center">
                        <div class="text-2xl font-bold mono" style="color:#10B981;">+${s.avg_win_pct}%</div>
                        <div class="text-xs text-slate-400 mt-1 uppercase tracking-wider">Avg Win</div>
                    </div>
                    <div class="mobile-card rounded-xl p-4 text-center">
                        <div class="text-2xl font-bold mono" style="color:#DC2626;">${s.avg_loss_pct}%</div>
                        <div class="text-xs text-slate-400 mt-1 uppercase tracking-wider">Avg Loss</div>
                    </div>
                    <div class="mobile-card rounded-xl p-4 text-center">
                        <div class="text-2xl font-bold mono" style="color:${pfColor};">${s.profit_factor}</div>
                        <div class="text-xs text-slate-400 mt-1 uppercase tracking-wider">Profit Factor</div>
                        <div class="text-xs text-slate-500 mt-1">&gt;1.5 = excellent</div>
                    </div>
                    <div class="mobile-card rounded-xl p-4 text-center">
                        <div class="text-2xl font-bold mono text-slate-300">${s.avg_holding_days}</div>
                        <div class="text-xs text-slate-400 mt-1 uppercase tracking-wider">Avg Hold (days)</div>
                    </div>
                </div>

                <!-- Outcome breakdown -->
                <div class="mobile-card rounded-xl p-4 mb-4">
                    <div class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Outcome Breakdown</div>
                    <div class="flex flex-wrap gap-2">
                        ${Object.entries(s.outcome_breakdown||{}).map(([k,v]) => {
                            const pct = Math.round(v/s.total_trades*100);
                            const col = k==='TARGET_HIT'?'#10B981':k==='STOP_LOSS'?'#DC2626':'#D97706';
                            return `<div class="px-3 py-2 rounded-lg text-center" style="background:${col}18;border:1px solid ${col}40;min-width:80px;">
                                <div class="text-sm font-bold mono" style="color:${col};">${pct}%</div>
                                <div class="text-xs text-slate-400">${k.replace('_',' ')}</div>
                                <div class="text-xs text-slate-500">${v} trades</div>
                            </div>`;
                        }).join('')}
                    </div>
                </div>

                <!-- Search + sort -->
                <div class="mobile-card rounded-xl p-4 mb-4">
                    <input id="perfSearchInput" type="text" placeholder="Search stock…"
                        value="${perfStockFilter}"
                        oninput="perfStockFilter=this.value; perfPage=1; renderPastPerformance(document.getElementById('resultsContainer'))"
                        class="w-full px-3 py-2 rounded-lg text-sm text-slate-100 outline-none mb-3"
                        style="background:rgba(30,41,59,0.9);border:1px solid rgba(255,255,255,0.1);" />
                    <div class="flex space-x-2 overflow-x-auto scroll-container">
                        ${[['total_pnl','P&L'],['win_rate','Win %'],['avg_return','Avg Ret'],['total_trades','Trades']].map(([val,label]) =>
                            `<button onclick="perfSortBy='${val}'; perfPage=1; renderPastPerformance(document.getElementById('resultsContainer'))"
                                class="flex-shrink-0 px-3 py-1.5 rounded-lg text-xs font-medium touch-btn"
                                style="${perfSortBy===val ? 'background:linear-gradient(135deg,#065F46,#047857);color:#fff;' : 'background:rgba(30,41,59,0.8);color:#94A3B8;'}">${label}</button>`
                        ).join('')}
                    </div>
                </div>
                <div class="text-xs text-slate-500 mb-3 px-1">${stocks.length} stock${stocks.length!==1?'s':''} with signals</div>
            `;

            // Pagination
            const totalPages = Math.ceil(stocks.length / PERF_PAGE_SIZE);
            if (perfPage > totalPages) perfPage = 1;
            const pageStocks = stocks.slice((perfPage-1)*PERF_PAGE_SIZE, perfPage*PERF_PAGE_SIZE);

            pageStocks.forEach(st => {

        // Display Radar tab - trades taken from trendline
        function displayPerformanceTracking() {
            const container = document.getElementById('resultsContainer');

            // Load from both localStorage (immediate) and radar_trades.json (persisted)
            const localTrades = JSON.parse(localStorage.getItem('radarTrades') || '[]');

            // Fetch radar_trades.json from server (updated by monitor workflow)
            fetch('./radar_trades.json', { cache: 'no-store' })
                .then(r => r.ok ? r.json() : [])
                .catch(() => [])
                .then(serverTrades => {
                    // Merge: server trades take priority (have latest status)
                    const merged = mergeRadarTrades(localTrades, serverTrades);
                    
                    // Also fetch live data from Angel One (if available)
                    return fetchAngelOneOrders().then(angelOrders => {
                        // Enrich trades with Angel One data
                        const enriched = enrichTradesWithAngelData(merged, angelOrders);
                        renderRadarTab(container, enriched);
                    });
                });
        }
        
        // Fetch live order data from Angel One
        async function fetchAngelOneOrders() {
            try {
                // Try to fetch from local EC2 sync service
                const response = await fetch('http://localhost:5002/api/orders', { 
                    cache: 'no-store',
                    mode: 'cors' 
                });
                if (response.ok) {
                    const data = await response.json();
                    console.log('✅ Fetched live orders from Angel One:', data.count);
                    return data.orders || [];
                }
            } catch (e) {
                console.log('ℹ️ Angel One sync service not available (running on EC2?)');
            }
            return [];
        }
        
        // Enrich trades with Angel One live data
        function enrichTradesWithAngelData(trades, angelOrders) {
            if (!angelOrders || angelOrders.length === 0) return trades;
            
            return trades.map(trade => {
                const angelOrder = angelOrders.find(ao => 
                    ao.symbol === trade.ticker || ao.ticker === trade.ticker
                );
                
                if (angelOrder) {
                    // Merge Angel One data
                    return {
                        ...trade,
                        angel_order_id: angelOrder.order_id,
                        angel_status: angelOrder.status,
                        angel_filled_qty: angelOrder.filled_qty,
                        angel_filled_price: angelOrder.filled_price,
                        angel_synced_at: angelOrder.synced_at,
                        is_angel_synced: true
                    };
                }
                return trade;
            });
        }

        function mergeRadarTrades(local, server) {
            if (!server || server.length === 0) return local;
            const merged = [...local];
            
            server.forEach(st => {
                // Check if this server trade already exists in merged
                const idx = merged.findIndex(lt => lt.ticker === st.ticker);
                
                if (idx >= 0) {
                    // Update existing trade
                    const localTrade = merged[idx];
                    
                    // Update current price (normalize field names)
                    if (st.current_price !== undefined) {
                        localTrade.currentPrice = st.current_price;
                        localTrade.current_price = st.current_price;
                    }
                    
                    // Update P&L if available
                    if (st.current_pnl_pct !== undefined) {
                        localTrade.currentPnl = st.current_pnl_pct;
                    }
                    
                    // Update status if server has newer status
                    if (st.status && st.status !== 'Triggered' && st.status !== 'Open') {
                        localTrade.status = st.status;
                    }
                } else {
                    // Add new server trade (from angel_monitor.py)
                    // Normalize field names to camelCase for consistency
                    const normalizedTrade = {
                        ticker: st.ticker,
                        source: st.source || 'Trendline',
                        entryTrigger: st.entry_price || 0,
                        entry_price: st.entry_price || 0,
                        currentPrice: st.current_price || 0,
                        current_price: st.current_price || 0,
                        targetExit: st.target || 0,
                        target: st.target || 0,
                        stopLoss: st.stop_loss || 0,
                        stop_loss: st.stop_loss || 0,
                        status: st.status || 'Triggered',
                        takenAt: st.triggered_at || new Date().toISOString(),
                        triggered_at: st.triggered_at || new Date().toISOString(),
                        currentPnl: st.current_pnl_pct || 0
                    };
                    merged.push(normalizedTrade);
                }
            });
            
            // Save merged back to localStorage
            localStorage.setItem('radarTrades', JSON.stringify(merged));
            return merged;
        }

        // ─── NIFTY 500 STOCK LIST (symbol + company name) ───────────────────────
        const NIFTY500_STOCKS = [];
        (async function loadNifty500() {
            // Try multiple paths — works both locally and on GitHub Pages
            const paths = ['./Stock List.csv', 'Stock List.csv', './ind_nifty500list.csv', 'ind_nifty500list.csv'];
            let loaded = false;
            for (const path of paths) {
                try {
                    console.log(`Trying to load from: ${path}`);
                    const resp = await fetch(path, { cache: 'no-store' });
                    if (!resp.ok) {
                        console.warn(`Failed to fetch ${path}: ${resp.status}`);
                        continue;
                    }
                    const text = await resp.text();
                    console.log(`Fetched ${text.length} bytes from ${path}`);
                    const lines = text.trim().split('\n').slice(1); // skip header
                    console.log(`Processing ${lines.length} lines`);
                    lines.forEach(line => {
                        const parts = line.split(',');
                        if (parts.length >= 3) {
                            const companyName = parts[0].trim().replace(/^"|"$/g, '');
                            const symbol = parts[2].trim().replace(/^"|"$/g, '');
                            if (symbol) NIFTY500_STOCKS.push({ symbol, companyName });

                    });
                    console.log(`✅ Loaded ${NIFTY500_STOCKS.length} stocks from ${path}`);
                    loaded = true;
                    break;
                } catch(e) {
                    console.warn(`Could not load from ${path}:`, e);

                    const tlCount = Array.isArray(tl) ? tl.length : 0;
                    document.getElementById('totalOpportunities').textContent =
                        (volumeCount + tlCount + updatedManual.length).toLocaleString();
                });

            // Switch to trendline tab to show the saved stock
            switchTab('trendline');
        };

        window.removeManualStock = function(idx) {
            const manualStocks = JSON.parse(localStorage.getItem('manualStocks') || '[]');
            manualStocks.splice(idx, 1);
            localStorage.setItem('manualStocks', JSON.stringify(manualStocks));
            switchTab('trendline');
        };

        window.takeManualTrade = function(idx) {
            const manualStocks = JSON.parse(localStorage.getItem('manualStocks') || '[]');
            const ms = manualStocks[idx];
            if (!ms) return;
            const qty = Math.floor(ms.positionSize / ms.entryTrigger);
            const trades = JSON.parse(localStorage.getItem('radarTrades') || '[]');
            const exists = trades.find(t => t.ticker === ms.symbol && t.status === 'Open');
            if (!exists) {
                trades.push({
                    ticker: ms.symbol,
                    entryTrigger: ms.entryTrigger,
                    targetExit: ms.targetExit,
                    stopLoss: ms.stopLoss,
                    positionSize: ms.positionSize,
                    quantity: qty,
                    takenAt: new Date().toISOString(),
                    status: 'Open',
                    source: 'Manual'
                });
                localStorage.setItem('radarTrades', JSON.stringify(trades));
            }
            placeAngelOrder(ms.symbol, 'BUY', qty, ms.entryTrigger, ms.stopLoss, ms.targetExit, 'Manual');
        };
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', function() {
            if (livePriceUpdateTimer) clearInterval(livePriceUpdateTimer);
            if (indexUpdateTimer) clearInterval(indexUpdateTimer);
            console.log('🔴 Live price updates stopped');
        });

    </script>
