<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macro Trendline Scanner - New Screen</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f8fafc; padding: 20px; }
        .screen-container { max-width: 1400px; margin: 0 auto; }
        .header-area { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #1e293b; padding-bottom: 15px; }
        h1 { margin: 0; font-size: 24px; color: #38bdf8; }
        .update-badge { background-color: #1e293b; padding: 6px 12px; border-radius: 6px; font-size: 13px; color: #94a3b8; }
        
        /* Interactive Data Table Styling */
        .data-table { width: 100%; border-collapse: collapse; background-color: #1e293b; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .data-table th { background-color: #0f172a; color: #38bdf8; text-align: left; padding: 14px 16px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.05em; }
        .data-table td { padding: 14px 16px; border-bottom: 1px solid #334155; font-size: 14px; }
        .data-table tr:hover { background-color: #24334d; transition: background 0.2s ease; }
        
        /* Status Badges Matching Your Production Quality */
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
        .status-critical { background-color: #ef4444; color: #ffffff; animation: pulse 2s infinite; }
        .status-watchlist { background-color: #eab308; color: #0f172a; }
        .zone-badge { background-color: #0369a1; color: #ffffff; padding: 3px 8px; border-radius: 4px; font-size: 10px; }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        
        /* Pagination Controls */
        .pagination-container { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding: 15px; background-color: #1e293b; border-radius: 8px; }
        .pagination-info { color: #94a3b8; font-size: 14px; }
        .pagination-controls { display: flex; gap: 10px; align-items: center; }
        .pagination-btn { background-color: #0369a1; color: #ffffff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; transition: background 0.2s ease; }
        .pagination-btn:hover:not(:disabled) { background-color: #0284c7; }
        .pagination-btn:disabled { background-color: #334155; color: #64748b; cursor: not-allowed; }
        .page-number { color: #38bdf8; font-weight: 600; font-size: 14px; min-width: 80px; text-align: center; }
    </style>
</head>
<body>

<div class="screen-container">
    <div class="header-area">
        <h1>📉 Macro Monthly Trendline Entry Scanner</h1>
        <div class="update-badge" id="last-updated">Status: Real-time JSON Feed Active</div>
    </div>

    <!-- Active Production Grid Screen -->
    <table class="data-table">
        <thead>
            <tr>
                <th>Ticker</th>
                <th>Current Price (₹)</th>
                <th>50 EMA (₹)</th>
                <th>200 EMA (₹)</th>
                <th>Entry Trigger (₹)</th>
                <th>Distance</th>
                <th>Fib Zone</th>
                <th>Pattern Zone</th>
                <th>Shares</th>
                <th>Stop Loss (₹)</th>
                <th>Target Exit (₹)</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr>
                <td colspan="12" style="text-align: center; color: #94a3b8;">Loading latest geometric dataset...</td>
            </tr>
        </tbody>
    </table>
    
    <!-- Pagination Controls -->
    <div class="pagination-container">
        <div class="pagination-info" id="pagination-info">Showing 0-0 of 0 stocks</div>
        <div class="pagination-controls">
            <button class="pagination-btn" id="first-page-btn" onclick="goToFirstPage()">⏮ First</button>
            <button class="pagination-btn" id="prev-page-btn" onclick="previousPage()">← Previous</button>
            <span class="page-number" id="page-indicator">Page 1</span>
            <button class="pagination-btn" id="next-page-btn" onclick="nextPage()">Next →</button>
            <button class="pagination-btn" id="last-page-btn" onclick="goToLastPage()">Last ⏭</button>
        </div>
    </div>
</div>

<script>
    // Pagination state
    let allStocks = [];
    let currentPage = 1;
    const stocksPerPage = 10;
    
    // Fetch the JSON payload and build out your data dashboard screen columns
    async function loadTrendlineScreenData() {
        try {
            // Replace with your true backend data path or API URL endpoint
            const response = await fetch('trendline_screen.json');
            const data = await response.json();
            
            // Sort data so the stocks closest to a trendline touch sit at the top of your UI
            allStocks = data.sort((a, b) => a.distanceRemaining - b.distanceRemaining);
            
            // Reset to first page when data is reloaded
            currentPage = 1;
            renderPage();
            
            document.getElementById('last-updated').innerText = `Last Refreshed: ${new Date().toLocaleTimeString()}`;
            
        } catch (error) {
            console.error('Error loading JSON data source:', error);
            document.getElementById('table-body').innerHTML = `
                <tr><td colspan="12" style="text-align: center; color: #ef4444;">❌ Error fetching data source. Check backend JSON compiler pipeline.</td></tr>
            `;
            updatePaginationInfo(0, 0, 0);
        }
    }
    
    function renderPage() {
        const tableBody = document.getElementById('table-body');
        tableBody.innerHTML = ''; // Clear existing rows
        
        const totalStocks = allStocks.length;
        const totalPages = Math.ceil(totalStocks / stocksPerPage);
        
        // Calculate start and end indices for current page
        const startIndex = (currentPage - 1) * stocksPerPage;
        const endIndex = Math.min(startIndex + stocksPerPage, totalStocks);
        
        // Get stocks for current page
        const pageStocks = allStocks.slice(startIndex, endIndex);
        
        if (pageStocks.length === 0) {
            tableBody.innerHTML = `
                <tr><td colspan="12" style="text-align: center; color: #94a3b8;">No stocks found matching criteria</td></tr>
            `;
        } else {
            pageStocks.forEach(stock => {
                const row = document.createElement('tr');
                
                // Assign correct color badge configurations depending on proximity
                const badgeClass = stock.notificationTrigger ? 'status-critical' : 'status-watchlist';
                const statusLabel = stock.notificationTrigger ? '🎯 CRITICAL' : '👀 WATCH';
                
                // Get EMA values (default to N/A if not present)
                const ema50 = stock.ema50 ? `₹${stock.ema50.toFixed(2)}` : 'N/A';
                const ema200 = stock.ema200 ? `₹${stock.ema200.toFixed(2)}` : 'N/A';
                
                // Color code EMAs based on price position
                let ema50Color = '#94a3b8';
                let ema200Color = '#94a3b8';
                if (stock.ema50) {
                    ema50Color = stock.currentPrice > stock.ema50 ? '#4ade80' : '#ef4444';
                }
                if (stock.ema200) {
                    ema200Color = stock.currentPrice > stock.ema200 ? '#4ade80' : '#ef4444';
                }
                
                row.innerHTML = `
                    <td style="font-weight: bold; color: #ffffff;">${stock.ticker}</td>
                    <td>₹${stock.currentPrice.toFixed(2)}</td>
                    <td style="color: ${ema50Color};">${ema50}</td>
                    <td style="color: ${ema200Color};">${ema200}</td>
                    <td style="color: #38bdf8; font-weight: 600;">₹${stock.triggerPrice.toFixed(2)}</td>
                    <td style="color: ${stock.distanceRemaining <= 2.0 ? '#f43f5e' : '#f8fafc'}">${stock.distanceRemaining.toFixed(2)}%</td>
                    <td><span class="zone-badge">${stock.fibLevelMatch}</span></td>
                    <td style="font-size: 11px; color: #94a3b8;">${stock.patternZone}</td>
                    <td style="color: #a78bfa;">${stock.positionSizing.sharesToBuy}</td>
                    <td style="color: #ef4444;">₹${stock.positionSizing.strictStopLoss.toFixed(2)}</td>
                    <td style="color: #4ade80; font-weight: 600;">₹${stock.positionSizing.pivotTargetExit.toFixed(2)}</td>
                    <td><span class="badge ${badgeClass}">${statusLabel}</span></td>
                `;
                
                tableBody.appendChild(row);
            });
        }
        
        // Update pagination controls
        updatePaginationInfo(startIndex + 1, endIndex, totalStocks);
        updatePaginationButtons(totalPages);
    }
    
    function updatePaginationInfo(start, end, total) {
        const info = document.getElementById('pagination-info');
        info.innerText = `Showing ${start}-${end} of ${total} stocks`;
    }
    
    function updatePaginationButtons(totalPages) {
        const pageIndicator = document.getElementById('page-indicator');
        const firstBtn = document.getElementById('first-page-btn');
        const prevBtn = document.getElementById('prev-page-btn');
        const nextBtn = document.getElementById('next-page-btn');
        const lastBtn = document.getElementById('last-page-btn');
        
        pageIndicator.innerText = `Page ${currentPage} of ${totalPages || 1}`;
        
        // Disable buttons based on current page
        firstBtn.disabled = currentPage === 1;
        prevBtn.disabled = currentPage === 1;
        nextBtn.disabled = currentPage >= totalPages;
        lastBtn.disabled = currentPage >= totalPages;
    }
    
    function nextPage() {
        const totalPages = Math.ceil(allStocks.length / stocksPerPage);
        if (currentPage < totalPages) {
            currentPage++;
            renderPage();
        }
    }
    
    function previousPage() {
        if (currentPage > 1) {
            currentPage--;
            renderPage();
        }
    }
    
    function goToFirstPage() {
        currentPage = 1;
        renderPage();
    }
    
    function goToLastPage() {
        const totalPages = Math.ceil(allStocks.length / stocksPerPage);
        currentPage = totalPages;
        renderPage();
    }

    // Initial Screen Load
    loadTrendlineScreenData();
    // Auto-refresh the frontend screen layout metrics every 5 minutes to stay accurate
    setInterval(loadTrendlineScreenData, 300000);
</script>

</body>
</html>
