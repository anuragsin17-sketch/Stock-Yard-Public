<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Local Test</title>
    <style>
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif; }
        body { background: #0A0E14; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .test-section { background: #1a1f2e; padding: 20px; margin: 15px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }
        .test-header { font-size: 18px; font-weight: 600; margin-bottom: 15px; color: #10B981; }
        button { padding: 10px 20px; margin: 5px; background: #047857; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        button:hover { background: #065F46; }
        .log-box { background: #000; padding: 15px; border-radius: 6px; margin-top: 10px; font-family: 'Courier New', monospace; font-size: 12px; max-height: 300px; overflow-y: auto; }
        .success { color: #10B981; }
        .error { color: #DC2626; }
        .info { color: #3B82F6; }
        .warning { color: #F59E0B; }
        pre { margin: 0; white-space: pre-wrap; word-wrap: break-word; }
        .code { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 4px; margin: 10px 0; border-left: 3px solid #047857; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧪 Dashboard Implementation Test Suite</h1>
        
        <div class="test-section">
            <div class="test-header">📋 Test 1: JavaScript Functions Exist</div>
            <button onclick="testFunctionsExist()">Check Functions</button>
            <div id="test1-log" class="log-box"></div>
        </div>
        
        <div class="test-section">
            <div class="test-header">🔄 Test 2: Radar Trades Data Structure</div>
            <button onclick="testRadarTradesStructure()">Load & Validate</button>
            <div id="test2-log" class="log-box"></div>
        </div>
        
        <div class="test-section">
            <div class="test-header">📊 Test 3: Filter State Management</div>
            <button onclick="testFilterButtons()">Test Filters</button>
            <div id="test3-log" class="log-box"></div>
        </div>
        
        <div class="test-section">
            <div class="test-header">💾 Test 4: Data Merging Functions</div>
            <button onclick="testDataMerging()">Test Merging</button>
            <div id="test4-log" class="log-box"></div>
        </div>
        
        <div class="test-section">
            <div class="test-header">🎨 Test 5: Render Function Output</div>
            <button onclick="testRenderOutput()">Render Trades</button>
            <div id="test5-log" class="log-box"></div>
            <div id="render-output" style="margin-top: 15px; background: rgba(6,182,212,0.1); padding: 15px; border-radius: 6px; max-height: 400px; overflow-y: auto;"></div>
        </div>

        <div class="test-section">
            <div class="test-header">🔌 Test 6: API Endpoint Simulation</div>
            <button onclick="testAPISimulation()">Simulate APIs</button>
            <div id="test6-log" class="log-box"></div>
        </div>
    </div>

    <script>
        // Import the functions from main dashboard
        // We'll define mock versions if they don't exist from index.html
        
        function log(testNum, msg, type = 'info') {
            const el = document.getElementById(`test${testNum}-log`);
            const color = type === 'success' ? '#10B981' : type === 'error' ? '#DC2626' : type === 'warning' ? '#F59E0B' : '#3B82F6';
            const icon = type === 'success' ? '✓' : type === 'error' ? '✗' : type === 'warning' ? '⚠' : 'ℹ';
            const div = document.createElement('div');
            div.style.color = color;
            div.innerHTML = `${icon} ${msg}`;
            el.appendChild(div);
        }
        
        function testFunctionsExist() {
            const log1 = (msg, type) => log(1, msg, type);
            
            log1('Checking for required functions...', 'info');
            
            const requiredFunctions = [
                'displayPerformanceTracking',
                'fetchLiveLTPForRadarTrades',
                'updateTradesWithLiveQuotes',
                'renderRadarTab',
                'syncTradesFromAngelOne',
                'fetchLiveQuote',
                'enrichTradesWithAngelData',
                'mergeRadarTrades',
                'mergeSyncedTrades'
            ];
            
            let found = 0;
            let missing = [];
            
            requiredFunctions.forEach(fn => {
                if (typeof window[fn] === 'function') {
                    log1(`Function exists: ${fn}()`, 'success');
                    found++;
                } else {
                    log1(`Missing: ${fn}()`, 'error');
                    missing.push(fn);
                }
            });
            
            log1(``, 'info');
            log1(`Result: ${found}/${requiredFunctions.length} functions found`, found === requiredFunctions.length ? 'success' : 'warning');
        }
        
        async function testRadarTradesStructure() {
            const log2 = (msg, type) => log(2, msg, type);
            
            log2('Loading radar_trades.json...', 'info');
            try {
                const response = await fetch('./radar_trades.json', { cache: 'no-store' });
                if (!response.ok) {
                    log2('File not found (OK for first run)', 'warning');
                    return;
                }
                
                const trades = await response.json();
                log2(`✓ Loaded ${trades.length} trades`, 'success');
                
                if (trades.length === 0) {
                    log2('Radar is empty - this is normal', 'info');
                    return;
                }
                
                // Validate structure
                const requiredFields = ['ticker', 'entry_price', 'current_price', 'quantity', 'status'];
                trades.forEach((trade, idx) => {
                    const missing = requiredFields.filter(f => !(f in trade));
                    if (missing.length === 0) {
                        log2(`Trade ${idx+1}: ${trade.ticker} - Status: ${trade.status} - ✓`, 'success');
                    } else {
                        log2(`Trade ${idx+1}: Missing fields - ${missing.join(', ')}`, 'error');
                    }
                });
            } catch (e) {
                log2(`Error: ${e.message}`, 'error');
            }
        }
        
        function testFilterButtons() {
            const log3 = (msg, type) => log(3, msg, type);
            
            log3('Testing filter state...', 'info');
            
            // Simulate filter buttons
            const filters = ['all', 'open', 'closed'];
            window.radarFilterState = 'all';
            
            filters.forEach(filter => {
                window.radarFilterState = filter;
                log3(`Filter set to: ${filter}`, window.radarFilterState === filter ? 'success' : 'error');
            });
            
            log3(`✓ Filter state management working`, 'success');
        }
        
        function testDataMerging() {
            const log4 = (msg, type) => log(4, msg, type);
            
            log4('Testing data merging...', 'info');
            
            // Test data
            const localTrades = [
                { ticker: 'INFY', entry_price: 1650, current_price: 1660, quantity: 10, status: 'Open' },
                { ticker: 'TCS', entry_price: 3850, current_price: 3850, quantity: 5, status: 'Open' }
            ];
            
            const liveQuotes = [
                { ticker: 'INFY', ltp: 1675, timestamp: new Date().toISOString() },
                { ticker: 'TCS', ltp: 3900, timestamp: new Date().toISOString() }
            ];
            
            log4(`Starting with ${localTrades.length} trades`, 'info');
            log4(`Live quotes available: ${liveQuotes.length}`, 'info');
            
            // Simulate updateTradesWithLiveQuotes
            const updated = localTrades.map(trade => {
                const quote = liveQuotes.find(q => q.ticker === trade.ticker);
                if (quote) {
                    return {
                        ...trade,
                        currentPrice: quote.ltp,
                        current_price: quote.ltp,
                        ltp_last_updated: quote.timestamp
                    };
                }
                return trade;
            });
            
            log4(`After merge:`, 'info');
            updated.forEach((trade, i) => {
                log4(`  ${i+1}. ${trade.ticker}: ₹${trade.current_price} (was ₹${localTrades[i].current_price})`, 'success');
            });
        }
        
        function testRenderOutput() {
            const log5 = (msg, type) => log(5, msg, type);
            const renderEl = document.getElementById('render-output');
            
            log5('Rendering sample Radar tab...', 'info');
            
            // Sample data
            const trades = [
                { 
                    ticker: 'INFY', 
                    entry_price: 1650, 
                    current_price: 1675, 
                    quantity: 10, 
                    status: 'Open',
                    target: 1850,
                    stop_loss: 1500,
                    triggered_at: new Date().toISOString(),
                    source: 'Trendline'
                }
            ];
            
            let html = `
                <div style="background: #1a1f2e; padding: 15px; border-radius: 8px; border-left: 3px solid #D97706;">
                    <div style="font-weight: 600; font-size: 16px; margin-bottom: 10px;">
                        <a href="https://in.tradingview.com/chart/?symbol=NSE:INFY" style="color: #3B82F6; text-decoration: none;">INFY</a>
                        <span style="float: right; background: rgba(217,119,6,0.2); color: #D97706; padding: 4px 12px; border-radius: 4px; font-size: 12px;">Open</span>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 15px 0;">
                        <div>
                            <div style="font-size: 12px; color: #94A3B8; margin-bottom: 4px;">LTP</div>
                            <div style="font-size: 14px; font-weight: 600; color: #06B6D4; border-bottom: 2px solid rgba(6,182,212,0.3); padding-bottom: 2px;">₹1,675.00</div>
                            <div style="font-size: 11px; color: #10B981; font-weight: 500; margin-top: 4px;">🔴 LIVE</div>
                        </div>
                        <div>
                            <div style="font-size: 12px; color: #94A3B8; margin-bottom: 4px;">Entry</div>
                            <div style="font-size: 14px; font-weight: 600; color: #3B82F6;">₹1,650.00</div>
                        </div>
                        <div>
                            <div style="font-size: 12px; color: #94A3B8; margin-bottom: 4px;">Target</div>
                            <div style="font-size: 14px; font-weight: 600; color: #10B981;">₹1,850.00</div>
                        </div>
                        <div>
                            <div style="font-size: 12px; color: #94A3B8; margin-bottom: 4px;">Stop</div>
                            <div style="font-size: 14px; font-weight: 600; color: #DC2626;">₹1,500.00</div>
                        </div>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 0;">
                        <div style="background: rgba(59,130,246,0.1); padding: 8px; border-radius: 6px;">
                            <div style="font-size: 11px; color: #94A3B8; margin-bottom: 4px;">Amount Used</div>
                            <div style="font-weight: 600; color: #3B82F6;">₹16,500</div>
                            <div style="font-size: 10px; color: #64748B;">10 @ ₹1,650.00</div>
                        </div>
                        <div style="background: rgba(6,182,212,0.1); padding: 8px; border-radius: 6px;">
                            <div style="font-size: 11px; color: #94A3B8; margin-bottom: 4px;">Current Value</div>
                            <div style="font-weight: 600; color: #06B6D4;">₹16,750</div>
                            <div style="font-size: 10px; color: #64748B;">10 @ ₹1,675.00</div>
                        </div>
                        <div style="background: rgba(16,185,129,0.1); padding: 8px; border-radius: 6px;">
                            <div style="font-size: 11px; color: #94A3B8; margin-bottom: 4px;">P&L</div>
                            <div style="font-weight: 600; color: #10B981;">+₹250</div>
                            <div style="font-size: 10px; color: #10B981;">+1.52%</div>
                        </div>
                    </div>
                </div>
            `;
            
            renderEl.innerHTML = html;
            log5(`✓ Sample Radar card rendered`, 'success');
        }
        
        function testAPISimulation() {
            const log6 = (msg, type) => log(6, msg, type);
            
            log6('Simulating API responses...', 'info');
            
            // Simulate /api/get-quote response
            const quoteResponse = {
                success: true,
                symbol: 'INFY',
                ltp: 1675.50,
                open: 1650.00,
                high: 1680.00,
                low: 1645.00,
                volume: 1234567,
                timestamp: new Date().toISOString()
            };
            
            log6(`Mock /api/get-quote response:`, 'info');
            log6(`  Symbol: ${quoteResponse.symbol}`, 'success');
            log6(`  LTP: ₹${quoteResponse.ltp}`, 'success');
            log6(`  Volume: ${quoteResponse.volume.toLocaleString()}`, 'success');
            
            // Simulate /api/sync-trades response
            const syncResponse = {
                success: true,
                radar_trades: 3,
                closed_trades: 1,
                total_positions: 3,
                message: 'Synced: 3 open, 1 newly closed'
            };
            
            log6(``, 'info');
            log6(`Mock /api/sync-trades response:`, 'info');
            log6(`  Open trades: ${syncResponse.radar_trades}`, 'success');
            log6(`  Closed trades: ${syncResponse.closed_trades}`, 'success');
            log6(`  Message: ${syncResponse.message}`, 'success');
        }
        
        // Run initial tests on load
        window.addEventListener('load', function() {
            console.log('✓ Test page loaded');
            console.log('👉 Click buttons to run tests');
        });
    </script>
</body>
</html>
