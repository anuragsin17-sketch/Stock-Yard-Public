<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Compounding Signal Feed</title>
    <style>
        :root {
            --bg-main: #0b0f19;
            --bg-panel: #111827;
            --bg-hover: #1e293b;
            --color-primary: #38bdf8;
            --color-success: #4ade80;
            --color-danger: #ef4444;
            --color-text: #f8fafc;
            --color-muted: #94a3b8;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-main); 
            color: var(--color-text); 
            padding: 30px; 
            margin: 0;
        }

        .dashboard-container { 
            max-width: 900px; 
            margin: 0 auto; 
        }

        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        h2 { margin: 0; font-size: 22px; color: var(--color-primary); }
        .mode-badge { background-color: #0369a1; padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; letter-spacing: 0.05em; }

        /* Real-Time Compounding Progress Card Widgets */
        .analytics-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-bottom: 25px; 
        }

        .metric-card { 
            background-color: var(--bg-panel); 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid #1e293b; 
        }

        .metric-label { font-size: 12px; color: var(--color-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px; }
        .metric-value { font-size: 26px; font-weight: bold; }

        /* Dynamic Compounding Progress Bar Widget */
        .progress-box { 
            background-color: var(--bg-panel); 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid #1e293b; 
            margin-bottom: 30px; 
        }

        .progress-labels { display: flex; justify-content: space-between; font-size: 13px; color: var(--color-muted); margin-bottom: 8px; }
        .bar-container { background-color: #1f2937; height: 12px; border-radius: 6px; overflow: hidden; width: 100%; }
        .bar-fill { background: linear-gradient(90deg, #0ea5e9, #4ade80); height: 100%; width: 0%; transition: width 1s ease-in-out; }

        /* Minimal Signal Data Grid Table Grid */
        .signal-table { 
            width: 100%; 
            border-collapse: collapse; 
            background-color: var(--bg-panel); 
            border-radius: 8px; 
            overflow: hidden; 
            border: 1px solid #1e293b;
        }

        .signal-table th { 
            background-color: #1f2937; 
            color: var(--color-muted); 
            padding: 14px 16px; 
            text-align: left; 
            font-size: 13px; 
            text-transform: uppercase; 
            letter-spacing: 0.05em; 
        }

        .signal-table td { padding: 14px 16px; border-bottom: 1px solid #1e293b; font-size: 15px; }
        .signal-table tr:hover { background-color: var(--bg-hover); }
        .ticker-col { font-weight: bold; color: #ffffff; }
        .entry-col { color: var(--color-primary); font-weight: 600; }
        .exit-col { color: var(--color-success); font-weight: 600; }
    </style>
</head>
<body>

<div class="dashboard-container">
    
    <!-- Top Header Area Block -->
    <div class="header-section">
        <h2>📈 System Account Feed</h2>
        <div class="mode-badge" id="compounding-status">TOTAL_EQUITY_COMPOUNDING</div>
    </div>

    <!-- Live Master Account Balance Statistics Widgets -->
    <div class="analytics-grid">
        <div class="metric-card">
            <div class="metric-label">Master Portfolio Pool</div>
            <div class="metric-value" id="ui-master-equity" style="color: var(--color-success);">₹0.00</div>
        </div>
        <div class="metric-card">
            <div class="metric-label">Next Position Target Allocation</div>
            <div class="metric-value" id="ui-slot-allocation">₹0.00</div>
        </div>
    </div>

    <!-- Interactive Account Compounding Tracking Progress Bar Panel -->
    <div class="progress-box">
        <div class="progress-labels">
            <span>Seed Capital Base: ₹5,00,000</span>
            <span id="ui-growth-percentage" style="font-weight: bold; color: var(--color-success);">+0.00% Growth</span>
        </div>
        <div class="bar-container">
            <div class="bar-fill" id="ui-progress-bar"></div>
        </div>
    </div>

    <!-- Clean Black Box Premium Signals Data Table Grid -->
    <h3 style="font-size: 16px; margin: 0 0 12px 0; color: var(--color-muted); text-transform: uppercase; letter-spacing: 0.05em;">Active Signals</h3>
    <table class="signal-table">
        <thead>
            <tr>
                <th>Ticker Target</th>
                <th>Expected Entry Trigger</th>
                <th>Pivot Target Exit</th>
                <th>Pattern Zone</th>
            </tr>
        </thead>
        <tbody id="signal-table-body">
            <tr>
                <td colspan="4" style="text-align: center; color: var(--color-muted); padding: 20px;">Synchronizing database metrics...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    async function loadCompoundedDashboardData() {
        try {
            // Ingest your live system updating metrics config data load file
            const metricsResponse = await fetch('summary_metrics.json');
            const metricsData = await metricsResponse.json();
            
            const state = metricsData.compounding_account_state;
            const seedCapital = 500000.00; // Baseline initial account fund size
            
            // 1. Map real-time account metrics cleanly to text panel layouts
            document.getElementById('ui-master-equity').innerText = `₹${state.master_equity_pool.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
            document.getElementById('ui-slot-allocation').innerText = `₹${state.active_slot_allocation_limit.toLocaleString('en-IN', {minimumFractionDigits: 2})}`;
            document.getElementById('compounding-status').innerText = state.compounding_mode;
            
            // 2. Compute account compound multiplier growth metrics for progress visualization
            const netGrowthPct = ((state.master_equity_pool - seedCapital) / seedCapital) * 100;
            document.getElementById('ui-growth-percentage').innerText = `+${netGrowthPct.toFixed(2)}% Compounded Growth`;
            
            // Calculate progress filling constraint cap (e.g. mapping growth up to a 200% threshold scale)
            let progressFillWidth = (netGrowthPct / 200) * 100;
            if (progressFillWidth > 100) progressFillWidth = 100; // Constrain bar max width limits
            document.getElementById('ui-progress-bar').style.width = `${progressFillWidth}%`;
            
            // 3. Load active trade entries rows payload into presentation grid cells
            const signalTableBody = document.getElementById('signal-table-body');
            signalTableBody.innerHTML = ''; // Clear loading row state
            
            // Fetch trendline screen data
            const signalsResponse = await fetch('trendline_screen.json');
            const signalsData = await signalsResponse.json();
            
            // Display top 10 signals
            signalsData.slice(0, 10).forEach(signal => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="ticker-col">${signal.ticker}</td>
                    <td class="entry-col">₹${signal.triggerPrice.toFixed(2)}</td>
                    <td class="exit-col">₹${signal.positionSizing.pivotTargetExit.toFixed(2)}</td>
                    <td style="font-size: 12px; color: var(--color-muted);">${signal.patternZone}</td>
                `;
                signalTableBody.appendChild(tr);
            });
            
        } catch (error) {
            console.error("Dashboard JSON payload sync error: ", error);
            document.getElementById('signal-table-body').innerHTML = `
                <tr><td colspan="4" style="text-align: center; color: var(--color-danger); padding: 20px;">❌ Error processing network database payload sync. Check credentials.</td></tr>
            `;
        }
    }

    // Initialize layout load configuration
    loadCompoundedDashboardData();
    // Auto sync server assets metrics changes every 60 seconds
    setInterval(loadCompoundedDashboardData, 60000);
</script>

</body>
</html>
