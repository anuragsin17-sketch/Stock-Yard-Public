<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Stock Yard - Live Screening</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            -webkit-text-size-adjust: 100%;
            -webkit-font-smoothing: antialiased;
        }
        .mobile-card {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(148, 163, 184, 0.1);
        }
        .status-dot {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .touch-btn {
            min-height: 48px;
            touch-action: manipulation;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen">
    <!-- Mobile Header -->
    <header class="bg-slate-900/95 backdrop-blur-xl border-b border-slate-800/50 sticky top-0 z-50">
        <div class="px-4 py-3">
            <!-- Status Bar -->
            <div class="flex items-center justify-between mb-3 text-xs">
                <div class="flex items-center space-x-2">
                    <div id="statusDot" class="w-2 h-2 rounded-full bg-green-500 status-dot"></div>
                    <span id="statusText" class="text-slate-400">Live Data</span>
                </div>
                <button id="refreshBtn" class="flex items-center space-x-1 px-3 py-1 bg-slate-800 rounded-lg touch-btn">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                    </svg>
                    <span class="text-xs">Refresh</span>
                </button>
            </div>
            
            <!-- Title -->
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>
                    </svg>
                    <h1 class="text-xl font-bold">Stock Yard</h1>
                </div>
                <span id="lastSync" class="text-xs text-slate-400 font-mono">Loading...</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="px-4 py-4 space-y-4">
        <!-- Quick Stats -->
        <div class="grid grid-cols-2 gap-3">
            <div class="mobile-card rounded-xl p-4">
                <div class="text-xs text-slate-400 mb-1">Total Stocks</div>
                <div id="totalStocks" class="text-2xl font-bold text-slate-100 font-mono">-</div>
            </div>
            <div class="mobile-card rounded-xl p-4">
                <div class="text-xs text-slate-400 mb-1">Opportunities</div>
                <div id="totalOpportunities" class="text-2xl font-bold text-emerald-400 font-mono">-</div>
            </div>
        </div>
        <!-- Navigation Tabs -->
        <div class="mobile-card rounded-xl p-1">
            <div class="flex">
                <button id="fibTab" class="tab-btn flex-1 px-4 py-3 text-sm font-medium rounded-lg transition-all touch-btn bg-blue-500 text-white">
                    📊 Fibonacci
                </button>
                <button id="volTab" class="tab-btn flex-1 px-4 py-3 text-sm font-medium rounded-lg transition-all touch-btn text-slate-400">
                    📈 Volume
                </button>
                <button id="wpatTab" class="tab-btn flex-1 px-4 py-3 text-sm font-medium rounded-lg transition-all touch-btn text-slate-400">
                    📈 W-Pattern
                </button>
            </div>
        </div>

        <!-- Results Container -->
        <div id="resultsContainer" class="space-y-3">
            <div class="mobile-card rounded-xl p-4 text-center text-slate-400">Loading...</div>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="hidden mobile-card rounded-xl p-4 border-red-500/20 bg-red-500/10">
            <div class="flex items-center space-x-2">
                <svg class="w-5 h-5 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span id="errorText" class="text-red-400 text-sm"></span>
            </div>
        </div>
    </main>

    <script>
        // Global variables
        let screeningData = null;
        let currentTab = 'fibonacci';
        
        // Initialize app
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Stock Yard Mobile App Starting...');
            setupEventListeners();
            loadData();
        });
        
        // Setup event listeners
        function setupEventListeners() {
            // Refresh button
            document.getElementById('refreshBtn').addEventListener('click', function() {
                this.disabled = true;
                this.innerHTML = '<svg class="w-4 h-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg><span class="text-xs ml-1">Loading...</span>';
                
                loadData().finally(() => {
                    this.disabled = false;
                    this.innerHTML = '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg><span class="text-xs ml-1">Refresh</span>';
                });
            });
            
            // Tab buttons
            document.getElementById('fibTab').addEventListener('click', () => switchTab('fibonacci'));
            document.getElementById('volTab').addEventListener('click', () => switchTab('volume'));
            document.getElementById('wpatTab').addEventListener('click', () => switchTab('wpattern'));
        }
        
        // Safari-compatible data loading
        async function loadData() {
            console.log('📱 Loading data for mobile Safari...');
            hideError();
            
            try {
                // Safari-specific fetch with proper headers
                const response = await fetch('./data.json', {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'Cache-Control': 'no-cache, no-store, must-revalidate',
                        'Pragma': 'no-cache'
                    },
                    cache: 'no-store'
                });
                
                console.log('📡 Response status:', response.status);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const text = await response.text();
                console.log('📄 Response length:', text.length);
                
                if (text.length < 50) {
                    throw new Error('Response too small - likely not valid JSON');
                }
                
                // Clean the text before parsing (remove any BOM or extra characters)
                const cleanText = text.trim().replace(/^\uFEFF/, '');
                
                try {
                    screeningData = JSON.parse(cleanText);
                } catch (parseError) {
                    console.error('JSON Parse Error:', parseError);
                    console.log('First 200 chars:', cleanText.substring(0, 200));
                    throw new Error(`JSON parsing failed: ${parseError.message}`);
                }
                
                // Validate data structure
                if (!screeningData || typeof screeningData !== 'object') {
                    throw new Error('Invalid data structure');
                }
                
                if (!screeningData.timestamp) {
                    throw new Error('Missing timestamp - not live data');
                }
                
                console.log('✅ Data loaded successfully');
                console.log('📊 Summary:', {
                    timestamp: screeningData.timestamp,
                    fibonacci: screeningData.fibonacci_stocks?.length || 0,
                    volume: screeningData.volume_breakout_stocks?.length || 0,
                    wpattern: screeningData.w_pattern_stocks?.length || 0,
                    total: screeningData.diagnostics?.total_stocks_processed || 0
                });
                
                updateUI();
                updateStatus(true);
                
            } catch (error) {
                console.error('💥 Data loading failed:', error);
                showError(`Failed to load live data: ${error.message}`);
                loadFallbackData();
                updateStatus(false);
            }
        }
        
        // Load fallback data only if absolutely necessary
        function loadFallbackData() {
            console.warn('⚠️ Using fallback data');
            screeningData = {
                timestamp: new Date().toISOString(),
                fibonacci_stocks: [],
                volume_breakout_stocks: [],
                w_pattern_stocks: [],
                diagnostics: {
                    total_stocks_processed: 0,
                    successful_downloads: 0,
                    failed_downloads: 0,
                    fibonacci_matches: 0,
                    volume_breakout_matches: 0,
                    w_pattern_matches: 0,
                    errors: ['Live data unavailable - using fallback']
                }
            };
            updateUI();
        }
        
        // Update UI with loaded data
        function updateUI() {
            if (!screeningData) return;
            
            // Update stats
            const total = screeningData.diagnostics?.total_stocks_processed || 0;
            const opportunities = (screeningData.fibonacci_stocks?.length || 0) + 
                               (screeningData.volume_breakout_stocks?.length || 0) + 
                               (screeningData.w_pattern_stocks?.length || 0);
            
            document.getElementById('totalStocks').textContent = total;
            document.getElementById('totalOpportunities').textContent = opportunities;
            
            // Update timestamp
            if (screeningData.timestamp) {
                const date = new Date(screeningData.timestamp);
                document.getElementById('lastSync').textContent = date.toLocaleTimeString();
            }
            
            // Update current tab
            switchTab(currentTab);
        }
        
        // Switch between tabs
        function switchTab(tab) {
            currentTab = tab;
            
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-blue-500', 'text-white');
                btn.classList.add('text-slate-400');
            });
            
            const activeBtn = document.getElementById(tab === 'fibonacci' ? 'fibTab' : 
                                                   tab === 'volume' ? 'volTab' : 'wpatTab');
            activeBtn.classList.add('bg-blue-500', 'text-white');
            activeBtn.classList.remove('text-slate-400');
            
            // Update results
            displayResults(tab);
        }
        
        // Display results for current tab
        function displayResults(tab) {
            const container = document.getElementById('resultsContainer');
            
            if (!screeningData) {
                container.innerHTML = '<div class="mobile-card rounded-xl p-4 text-center text-slate-400">Loading...</div>';
                return;
            }
            
            let stocks = [];
            let title = '';
            
            switch(tab) {
                case 'fibonacci':
                    stocks = screeningData.fibonacci_stocks || [];
                    title = '';
                    break;
                case 'volume':
                    stocks = screeningData.volume_breakout_stocks || [];
                    title = '';
                    break;
                case 'wpattern':
                    stocks = screeningData.w_pattern_stocks || [];
                    title = '';
                    break;
            }
            
            if (stocks.length === 0) {
                container.innerHTML = `
                    <div class="mobile-card rounded-xl p-6 text-center">
                        <div class="text-slate-400 mb-2">No ${title.split(' ')[0]} opportunities found</div>
                        <div class="text-xs text-slate-500">Check back after market hours for updated screening results</div>
                    </div>
                `;
                return;
            }
            
            let html = '';
            stocks.forEach(stock => {
                html += createStockCard(stock, tab);
            });
            
            container.innerHTML = html;
        }
        
        // Create stock card HTML
        function createStockCard(stock, type) {
            let details = '';
            
            switch(type) {
                case 'fibonacci':
                    details = `
                        <div class="text-xs text-slate-400 mb-1">Near ${stock.level} level</div>
                        <div class="text-lg font-bold text-emerald-400">₹${stock.current_price}</div>
                        <div class="text-xs text-slate-500">Target: ₹${stock.level_price}</div>
                    `;
                    break;
                case 'volume':
                    details = `
                        <div class="text-xs text-slate-400 mb-1">${stock.breakout_volume_ratio}x Volume Spike</div>
                        <div class="text-lg font-bold text-blue-400">₹${stock.current_price || stock.breakout_price}</div>
                        <div class="text-xs text-slate-500">Breakout: ${stock.breakout_date}</div>
                    `;
                    break;
                case 'wpattern':
                    details = `
                        <div class="text-xs text-slate-400 mb-1">${stock.distance_to_neckline_percent}% to breakout</div>
                        <div class="text-lg font-bold text-purple-400">₹${stock.current_price}</div>
                        <div class="text-xs text-slate-500">Target: ₹${stock.neckline_peak_price}</div>
                    `;
                    break;
            }
            
            return `
                <div class="mobile-card rounded-xl p-4">
                    <div class="flex justify-between items-start">
                        <div>
                            <div class="font-bold text-slate-100">${stock.symbol}</div>
                            <div class="text-xs text-slate-400 mb-2">${stock.company_name}</div>
                            ${details}
                        </div>
                        <div class="text-xs text-slate-500 text-right">
                            <div>${stock.industry}</div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Update status indicator
        function updateStatus(isLive) {
            const dot = document.getElementById('statusDot');
            const text = document.getElementById('statusText');
            
            if (isLive) {
                dot.className = 'w-2 h-2 rounded-full bg-green-500 status-dot';
                text.textContent = 'Live Data';
            } else {
                dot.className = 'w-2 h-2 rounded-full bg-red-500 status-dot';
                text.textContent = 'Offline';
            }
        }
        
        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorDiv.classList.remove('hidden');
        }
        
        // Hide error message
        function hideError() {
            document.getElementById('errorMessage').classList.add('hidden');
        }
    </script>
</body>
</html>
